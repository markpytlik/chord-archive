<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="apple-touch-icon" href="favicon.svg" />
<meta name="theme-color" content="#b14a2c" />
<!-- Block search engines and most well-behaved AI/training crawlers from indexing or scraping. -->
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet" />
<meta name="GPTBot" content="noindex, nofollow" />
<meta name="ClaudeBot" content="noindex, nofollow" />
<meta name="referrer" content="no-referrer" />
<title>Chord Archive</title>
<style>
  /* ====================== Reset & Tokens ====================== */
  :root {
    --bg: #fbfaf7;
    --panel: #ffffff;
    --panel-2: #f6f4ee;
    --ink: #14161a;
    --ink-soft: #2c2f36;
    --muted: #6b7180;
    --line: #e7e3d8;
    --line-soft: #f0ede4;
    --accent: #b14a2c;
    --accent-soft: #f7e4dc;
    --accent-deep: #8a3819;
    --chord: #1e3a8a;
    --chord-soft: #e7edfa;
    --chord-bg: #f3f6fc;
    --good: #15803d;
    --good-soft: #e6f3eb;
    --warn: #92400e;
    --warn-soft: #fdf3e0;
    --shadow-sm: 0 1px 2px rgba(20, 22, 26, .04);
    --shadow-md: 0 6px 24px rgba(20, 22, 26, .07), 0 2px 6px rgba(20, 22, 26, .04);
    --shadow-lg: 0 24px 60px rgba(20, 22, 26, .12);
    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --serif: "Iowan Old Style", "Charter", "Source Serif Pro", Georgia, "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--accent-soft); color: var(--accent-deep); }

  /* ====================== Controls ====================== */
  button {
    font: inherit; cursor: pointer; border: 1px solid var(--line);
    background: var(--panel); color: var(--ink);
    padding: 7px 14px; border-radius: var(--radius-sm);
    transition: background .12s ease, border-color .12s ease, transform .04s;
    letter-spacing: -.01em;
  }
  button:hover { background: var(--panel-2); border-color: #d8d3c4; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { background: var(--accent-deep); border-color: var(--accent-deep); }
  button.ghost { background: transparent; border-color: transparent; color: var(--muted); }
  button.ghost:hover { background: var(--panel-2); color: var(--ink); }
  button.danger { color: #b41a1a; border-color: #ebd2d2; }
  button.danger:hover { background: #fceeee; border-color: #e0bcbc; }
  button.subtle { background: var(--panel-2); border-color: transparent; }

  input, select, textarea {
    font: inherit; color: var(--ink);
    background: var(--panel); border: 1px solid var(--line);
    padding: 8px 12px; border-radius: var(--radius-sm);
    width: 100%;
    transition: border-color .12s ease, box-shadow .12s ease;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  textarea { font-family: var(--mono); font-size: 14px; resize: vertical; line-height: 1.55; }
  label {
    font-size: 12px;
    color: var(--muted);
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
    letter-spacing: .02em;
    text-transform: uppercase;
  }
  .row { display: flex; gap: 10px; align-items: center; }
  .stack > * + * { margin-top: 14px; }

  .pill {
    display: inline-flex; align-items: center;
    padding: 2px 9px; border-radius: 999px;
    font-size: 11px; font-weight: 500;
    letter-spacing: .02em;
    background: var(--panel-2); color: var(--muted);
    border: 1px solid var(--line);
    margin-right: 5px;
  }
  .pill.guitar { background: var(--good-soft); color: var(--good); border-color: #c8dec8; }
  .pill.piano  { background: #ece4f5; color: #5a3eb1; border-color: #d3c8e0; }
  .pill.accent { background: var(--accent-soft); color: var(--accent-deep); border-color: #ecccc0; }
  .pill.chord-pill { background: var(--chord-soft); color: var(--chord); border-color: #cdd9ed; cursor: pointer; }
  .pill.chord-pill:hover { background: #d4dff5; }

  .muted { color: var(--muted); }
  .hidden { display: none !important; }
  .small { font-size: 13px; }
  .micro { font-size: 11px; }

  /* ====================== Header ====================== */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 26px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 5;
  }
  header .brand {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -.01em;
    color: var(--ink);
  }
  header .brand .accent { color: var(--accent); font-style: italic; }
  header .brand .glyph { color: var(--accent); margin-right: 4px; }
  header .brand-version {
    font-family: var(--mono);
    font-size: 10px;
    font-style: normal;
    font-weight: 500;
    color: var(--muted);
    background: var(--panel-2);
    padding: 1px 6px;
    border-radius: 999px;
    margin-left: 8px;
    vertical-align: 1px;
    letter-spacing: 0;
  }
  header .grow { flex: 1; }
  header input.search {
    max-width: 280px; padding: 8px 14px;
    background: var(--panel-2); border-color: transparent;
  }
  header input.search:focus { background: var(--panel); border-color: var(--accent); }
  header .header-url-input {
    flex: 1 1 320px; max-width: 460px;
    padding: 8px 14px;
    background: var(--panel-2); border-color: transparent;
  }
  header .header-url-input:focus { background: var(--panel); border-color: var(--chord); }
  header .header-menu { position: relative; display: inline-block; }
  header .header-menu-pop {
    position: absolute; right: 0; top: calc(100% + 4px);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    padding: 4px;
    display: none;
    z-index: 8;
    min-width: 200px;
  }
  header .header-menu:focus-within .header-menu-pop,
  header .header-menu-pop.show { display: block; }
  header .header-menu-pop button {
    width: 100%; text-align: left;
    background: transparent; border: 0;
    padding: 8px 12px; font-size: 13px;
    border-radius: var(--radius-sm);
    color: var(--ink-soft);
  }
  header .header-menu-pop button:hover {
    background: var(--panel-2); color: var(--ink);
  }

  /* ====================== Layout ====================== */
  main {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 60px);
  }
  aside {
    border-right: 1px solid var(--line);
    background: var(--panel);
    overflow-y: auto;
  }
  aside .filter-bar {
    padding: 12px 18px; border-bottom: 1px solid var(--line-soft);
    display: flex; gap: 8px; align-items: center;
    background: var(--panel); position: sticky; top: 0; z-index: 1;
  }
  aside .filter-bar select {
    padding: 5px 10px; font-size: 12px;
    background: var(--panel-2); border-color: transparent; width: auto;
  }

  .song-list { list-style: none; margin: 0; padding: 0; }
  .song-list li {
    padding: 14px 22px;
    border-bottom: 1px solid var(--line-soft);
    cursor: pointer;
    transition: background .1s ease;
  }
  .song-list li:hover { background: var(--panel-2); }
  .song-list li.active { background: var(--accent-soft); }
  .song-list li.active .artist { color: var(--accent-deep); }
  .song-list .artist {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .04em;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .song-list .title {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 18px;
    line-height: 1.2;
    color: var(--ink);
  }
  .song-list .meta {
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
    display: flex; gap: 6px; align-items: center;
  }

  /* ====================== Detail ====================== */
  section.detail {
    overflow-y: auto;
    padding: 40px 56px 100px;
    max-width: 100%;
  }
  .empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--muted); text-align: center; padding: 32px;
    font-family: var(--serif);
  }
  .empty h2 {
    font-family: var(--serif);
    font-weight: 500;
    color: var(--ink); margin-bottom: 12px;
    font-size: 28px;
    letter-spacing: -.01em;
  }
  .empty p { max-width: 460px; line-height: 1.6; font-family: var(--sans); }

  .detail-head {
    display: flex; align-items: flex-start; gap: 16px;
    margin-bottom: 6px; padding-bottom: 18px;
    border-bottom: 1px solid var(--line-soft);
  }
  .detail-head .title-block { flex: 1; min-width: 0; }
  .detail-head .artist {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .detail-head h1 {
    margin: 0;
    font-family: var(--serif);
    font-weight: 500;
    font-size: 36px;
    line-height: 1.1;
    letter-spacing: -.015em;
    color: var(--ink);
  }
  .detail-head h1 .key-inline {
    display: inline-block;
    vertical-align: middle;
    margin-left: 14px;
    margin-bottom: 6px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
    background: var(--accent-soft);
    color: var(--accent-deep);
    border: 1px solid #ecccc0;
    padding: 3px 10px;
    border-radius: 999px;
  }
  .detail-head h1 .key-inline::before { content: "Key "; opacity: .7; }
  .detail-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .meta-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin: 16px 0 28px;
  }

  /* ====================== Lyrics view ====================== */
  .lyrics {
    font-family: var(--mono);
    font-size: 15px; line-height: 1.45;
    background: var(--panel);
    padding: 28px 30px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    white-space: pre-wrap;
    word-wrap: break-word;
    box-shadow: var(--shadow-sm);
  }
  .lyrics .seg {
    display: inline-block; position: relative;
    padding-top: 1.7em; vertical-align: baseline;
  }
  /* Chord-bearing segments need enough horizontal room for the pill so adjacent chords don't overlap */
  .lyrics .seg:has(.chord) {
    min-width: 2.5em;
  }
  .lyrics .seg .chord {
    position: absolute; top: 0; left: 0;
    color: #1a1a1a; font-weight: 700;
    background: #ededeb;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 12.5px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .1s, transform .1s, box-shadow .1s;
    user-select: none;
    font-family: var(--mono);
  }
  .lyrics .seg .chord:hover {
    background: #dcdbd6; transform: translateY(-1px);
    box-shadow: 0 2px 6px rgba(0, 0, 0, .08);
  }
  .lyrics .section-label {
    color: var(--accent);
    font-weight: 700;
    font-style: normal;
    margin-top: 1.6em;
    display: block;
    letter-spacing: .12em;
    text-transform: uppercase;
    font-size: 11px;
    font-family: var(--sans);
  }
  .lyrics .section-label::before { content: "— "; opacity: .5; }
  .lyrics .section-label::after  { content: " —"; opacity: .5; }
  .lyrics .section-label:first-child { margin-top: 0; }
  /* Chord-only lines (intros/outros) — block-level row of inline pills, no absolute positioning */
  .lyrics .chord-only-row {
    display: block;
    line-height: 1.6;
    margin: 0 0 .25em 0;
    padding: 0;
  }
  .lyrics .chord-pill-inline {
    /* Independent class — no overlap with .lyrics .seg .chord (which is absolute-positioned). */
    position: static !important;
    top: auto !important;
    left: auto !important;
    display: inline-block;
    margin-right: 6px;
    color: #1a1a1a;
    background: #ededeb;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
    font-family: var(--mono);
    transition: background .1s, transform .1s;
  }
  .lyrics .chord-pill-inline:hover {
    background: #dcdbd6; transform: translateY(-1px);
  }
  .lyrics .chord-rep {
    display: inline-block;
    margin-left: 8px;
    color: var(--accent);
    font-size: 12.5px;
    font-weight: 600;
    font-style: italic;
    font-family: var(--serif);
  }

  /* ====================== Notes & chord index ====================== */
  .info-block {
    margin-top: 22px; padding: 18px 22px;
    background: var(--warn-soft); border: 1px solid #f0d9b3; border-radius: var(--radius);
    line-height: 1.6;
  }
  .info-block.chords { background: var(--chord-bg); border-color: #cfd9ed; }
  .info-block h4 {
    margin: 0 0 8px;
    font-size: 11px;
    color: var(--warn);
    letter-spacing: .12em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .info-block.chords h4 { color: var(--chord); }
  .info-block .body { white-space: pre-wrap; color: var(--ink-soft); }

  /* ====================== Hover popover ====================== */
  .chord-popover {
    position: fixed;
    z-index: 30;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    padding: 16px 18px 12px;
    min-width: 260px;
    max-width: 400px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity .12s ease, transform .12s ease;
    pointer-events: none;
  }
  .chord-popover.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .chord-popover .pop-header {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    text-align: center;
    letter-spacing: -.01em;
    margin-bottom: 10px;
  }
  .chord-popover .pop-row {
    display: flex; gap: 14px; align-items: flex-start; justify-content: center;
  }
  .chord-popover .pop-row.single { justify-content: center; }
  .chord-popover .diag-mini { text-align: center; }
  .chord-popover .diag-mini .label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 6px;
  }
  .chord-popover .pop-cycler {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin-top: 8px;
    color: var(--muted);
    font-size: 12.5px;
  }
  .chord-popover .pop-cycler .arrow {
    cursor: pointer;
    background: transparent; border: 0; padding: 4px 8px;
    color: var(--muted); font-size: 16px; line-height: 1;
    border-radius: 4px;
  }
  .chord-popover .pop-cycler .arrow:hover:not(:disabled) {
    color: var(--ink); background: var(--panel-2);
  }
  .chord-popover .pop-cycler .arrow:disabled { opacity: 0.3; cursor: default; }
  .chord-popover .pop-cycler .count {
    min-width: 50px; text-align: center; font-variant-numeric: tabular-nums;
  }
  .chord-popover .pop-actions {
    display: flex; gap: 4px; justify-content: center; margin-top: 8px;
    padding-top: 10px; border-top: 1px solid var(--line-soft);
  }
  .chord-popover .pop-actions button {
    background: transparent; border: 0; color: var(--muted);
    padding: 4px 8px; font-size: 11.5px; cursor: pointer; border-radius: 4px;
  }
  .chord-popover .pop-actions button:hover {
    background: var(--panel-2); color: var(--ink);
  }
  .chord-popover .pop-actions button.danger:hover { color: #b41a1a; background: #fceeed; }
  .chord-popover .voicing-note {
    margin-top: 8px;
    padding: 7px 11px;
    background: var(--warn-soft);
    border-left: 3px solid #f0d9b3;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.4;
  }

  /* ====================== Editor ====================== */
  .editor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px 16px;
  }
  .editor-grid .full { grid-column: 1 / -1; }
  .editor-tools {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
  }
  .editor-tools button { font-size: 13px; padding: 5px 11px; }
  .editor-tools button.prominent {
    background: var(--chord-bg);
    border-color: #cdd9ed;
    color: var(--chord);
    font-weight: 600;
  }
  .editor-tools button.prominent:hover {
    background: #d8e1f5; border-color: #a9bde0;
  }
  .helper-msg {
    color: var(--muted); font-size: 12px;
    margin-top: 6px; min-height: 18px;
    transition: color .1s;
  }
  .helper-msg.ok { color: var(--good); }
  .helper-msg.err { color: #b41a1a; }
  .helper-msg.busy { color: var(--accent); }

  /* Instrument toggle buttons (replace plain checkboxes) */
  .instrument-toggles {
    display: inline-flex; gap: 6px; padding-top: 4px;
  }
  .instrument-toggles .pill-btn {
    cursor: pointer;
    user-select: none;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    background: var(--panel);
    color: var(--muted);
    border: 1px solid var(--line);
    transition: all .12s ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .instrument-toggles .pill-btn:hover {
    background: var(--panel-2);
    color: var(--ink);
  }
  .instrument-toggles .pill-btn.on {
    background: var(--accent-soft);
    color: var(--accent-deep);
    border-color: #ecccc0;
  }
  .instrument-toggles .pill-btn.on::before {
    content: "✓";
    font-weight: 700;
    color: var(--accent);
  }
  .instrument-toggles input[type=checkbox] {
    position: absolute; opacity: 0; pointer-events: none;
  }

  /* Import-from-URL strip */
  .url-import {
    display: flex; gap: 8px; align-items: center;
    background: var(--chord-bg); border: 1px solid #d8e0f0;
    padding: 10px 14px; border-radius: var(--radius);
    margin-bottom: 14px;
  }
  .url-import input { flex: 1; background: var(--panel); }
  .url-import .label {
    font-size: 11px; color: var(--chord); font-weight: 600;
    text-transform: uppercase; letter-spacing: .08em;
    flex-shrink: 0; padding-right: 6px;
  }

  /* ====================== Modal ====================== */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(20, 16, 12, .42);
    display: flex; align-items: center; justify-content: center;
    z-index: 20; padding: 24px;
    animation: fadein .15s ease;
  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--panel);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    padding: 28px;
    width: 100%; max-width: 720px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal h3 {
    margin: 0 0 4px;
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -.01em;
  }
  .modal .modal-sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 18px;
  }
  .modal .actions {
    display: flex; gap: 8px; justify-content: flex-end;
    margin-top: 20px; padding-top: 16px;
    border-top: 1px solid var(--line-soft);
  }
  .modal-bg.chord-modal .modal { max-width: 600px; }

  /* Aligned guitar/piano cards in chord modal */
  .diag-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 4px;
  }
  .diag-card {
    display: flex; flex-direction: column;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
  }
  .diag-card h4 {
    margin: 0 0 10px;
    font-size: 11px; color: var(--muted);
    letter-spacing: .12em; text-transform: uppercase;
    font-weight: 600;
    text-align: center;
  }
  .diag-card .badge {
    color: var(--accent);
    margin-left: 4px;
    text-transform: none;
    font-size: 10px;
    letter-spacing: .04em;
  }
  .diag-card .canvas {
    flex: 1; display: flex; align-items: center; justify-content: center;
    min-height: 170px;
  }
  .diag-card .meta {
    font-size: 11px; color: var(--muted);
    text-align: center; margin-top: 10px;
    font-family: var(--mono);
  }
  .diag-card.no-show { opacity: .35; }

<script>
//=============================================================
// VERSION
//=============================================================
// App version — bumped on every meaningful push so Mark can verify deploys.
// Displayed next to the brand in the header.
const APP_VERSION = "1.3.5";

//=============================================================
// STORAGE
//=============================================================
const STORE_KEY = "chordarchive_v1";
const SCHEMA_VERSION = 2;

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.warn(e); }
  return { version: SCHEMA_VERSION, songs: [] };
}
function saveState(state) {
  state.version = SCHEMA_VERSION;
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}
async function fetchSeed() {
  const inline = document.getElementById("seed-data");
  if (inline?.textContent?.trim()) {
    try { return JSON.parse(inline.textContent); }
    catch (e) { console.warn("Inline seed parse failed:", e); }
  }
  try {
    const res = await fetch("data.json", { cache: "no-cache" });
    if (res.ok) return await res.json();
  } catch (e) { /* file:// blocks fetch */ }
  return null;
}
function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4); }
function now() { return Date.now(); }

// Strip noise from scraped/parsed song titles: "(chords)", "(tab)", trailing "Chords", etc.
function cleanScrapedTitle(t) {
  if (!t) return t;
  let out = t;
  for (let i = 0; i < 3; i++) {
    out = out.replace(/\s*[\(\[]\s*(?:chords?|tabs?|lyrics?|guitar\s*pro|gp|bass|ukulele|drum|power\s*tab|piano|keyboard|chord\s*pro)\s*[\)\]]\s*$/i, "");
  }
  out = out.replace(/\s+(?:chords?|tabs?|lyrics?|tablature)\s*$/i, "");
  return out.trim();
}

//=============================================================
// MUSIC THEORY
//=============================================================
const NOTE_PC = { C:0,"C#":1,Db:1,D:2,"D#":3,Eb:3,E:4,F:5,"F#":6,Gb:6,G:7,"G#":8,Ab:8,A:9,"A#":10,Bb:10,B:11 };
const PC_SHARP = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const PC_FLAT  = ["C","Db","D","Eb","E","F","Gb","G","Ab","A","Bb","B"];

function normalizeAccidental(s) { return s.replace(/♯/g,"#").replace(/♭/g,"b"); }

function splitChord(name) {
  if (!name) return null;
  const cleaned = normalizeAccidental(name.trim());
  const m = cleaned.match(/^([A-G])([#b]?)(.*?)(?:\/([A-G])([#b]?))?$/);
  if (!m) return null;
  const rootStr = m[1] + (m[2] || "");
  const qualPart = m[3] || "";
  const bassStr = m[4] ? (m[4] + (m[5] || "")) : null;
  const root = NOTE_PC[rootStr];
  const bass = bassStr ? NOTE_PC[bassStr] : null;
  if (root === undefined) return null;
  return { root, rootStr, quality: qualPart, bass, bassStr, raw: cleaned };
}

function qualityToIntervals(quality) {
  const ivs = new Set([0]);
  const orig = quality;
  let q = quality;

  let triadAdded = false;
  const isHalfDim = quality.includes("ø");
  if (isHalfDim) {
    ivs.add(3); ivs.add(6); triadAdded = true;
    q = q.replace(/ø/g, "");
  }
  const susMatch = !triadAdded ? q.match(/sus([24])?/i) : null;
  if (susMatch) {
    if (susMatch[1] === "2") { ivs.add(2); ivs.add(7); }
    else                     { ivs.add(5); ivs.add(7); }
    triadAdded = true;
    q = q.replace(/sus[24]?/i, "");
  }
  if (!triadAdded) {
    if (/^dim/i.test(q) || q.startsWith("°")) {
      ivs.add(3); ivs.add(6); triadAdded = true;
      q = q.replace(/^(dim|°)/i, "");
    } else if (/^aug/i.test(q) || q.startsWith("+")) {
      ivs.add(4); ivs.add(8); triadAdded = true;
      q = q.replace(/^(aug|\+)/i, "");
    } else if (/^min/i.test(q) || (/^m/.test(q) && !/^maj|^M(?!\d)/.test(q) && !/^M$/.test(q))) {
      ivs.add(3); ivs.add(7); triadAdded = true;
      q = q.replace(/^(min|m)/i, "");
    }
  }
  if (!triadAdded) {
    ivs.add(4); ivs.add(7);
    q = q.replace(/^(maj|M)(?=\d|$|aj)/i, "");
  }

  const isMaj7 = /maj7|M7|Δ/.test(orig);
  const hasAnyAdd = /add\d/.test(orig);
  const hasPlain7 = /(?<!ad)7/.test(orig);
  if (isMaj7) ivs.add(11);
  else if (hasPlain7 && !isMaj7) ivs.add(10);
  if (isHalfDim) ivs.add(10);

  if (/(?<!\d)6(?!\d)/.test(orig)) ivs.add(9);

  const has9  = /(?<!1)9(?!th)/.test(orig);
  const has11 = /11/.test(orig);
  const has13 = /13/.test(orig);
  if (has9)  ivs.add(14);
  if (has11) ivs.add(17);
  if (has13) { ivs.add(21); ivs.add(14); }
  if ((has9 || has11 || has13) && !hasAnyAdd && !ivs.has(10) && !ivs.has(11)) {
    ivs.add(10);
  }
  if (isMaj7 || /maj(9|11|13)|M(9|11|13)/.test(orig)) {
    ivs.delete(10); ivs.add(11);
  }

  if (/add9/i.test(orig))  ivs.add(14);
  if (/add11/i.test(orig)) ivs.add(17);
  if (/add13/i.test(orig)) ivs.add(21);

  if (/b5/.test(orig)) { ivs.delete(7); ivs.add(6); }
  if (/#5/.test(orig)) { ivs.delete(7); ivs.add(8); }
  if (/b9/.test(orig)) ivs.add(13);
  if (/#9/.test(orig)) ivs.add(15);
  if (/#11/.test(orig)) ivs.add(18);
  if (/b13/.test(orig)) ivs.add(20);

  return [...ivs].sort((a,b) => a - b);
}

// ---- Key auto-detection ----
// Score each major + minor key by how many of the song's chords are diatonic.
// Bonus weight for matches at the start/end of the chord progression.
const MAJOR_DIATONIC_QUALITIES = ["", "m", "m", "", "", "m", "dim"]; // I ii iii IV V vi vii°
const MINOR_DIATONIC_QUALITIES = ["m", "dim", "", "m", "m", "", ""]; // i ii° III iv v VI VII (natural minor)
const MAJOR_DEGREES = [0, 2, 4, 5, 7, 9, 11];
const MINOR_DEGREES = [0, 2, 3, 5, 7, 8, 10];

function buildDiatonicSet(rootPc, isMinor) {
  const degrees = isMinor ? MINOR_DEGREES : MAJOR_DEGREES;
  const qualities = isMinor ? MINOR_DIATONIC_QUALITIES : MAJOR_DIATONIC_QUALITIES;
  const out = new Set();
  for (let i = 0; i < 7; i++) {
    out.add(((rootPc + degrees[i]) % 12) + ":" + qualities[i]);
  }
  return out;
}

function chordSimpleKey(chord) {
  // Returns "<rootPc>:<basicQuality>" — basicQuality is "", "m", or "dim"
  if (!chord) return null;
  const ivs = qualityToIntervals(chord.quality);
  const set = new Set(ivs);
  let q = "";
  if (set.has(3) && set.has(7))      q = "m";
  else if (set.has(3) && set.has(6)) q = "dim";
  else if (set.has(4) && set.has(8)) q = ""; // aug — treat like major for diatonic match
  // sus / extensions: drop them, treat as major triad
  return chord.root + ":" + q;
}

function detectKey(chordNames) {
  if (!chordNames || !chordNames.length) return null;
  const parsed = chordNames.map(c => splitChord(c)).filter(Boolean);
  if (!parsed.length) return null;

  let best = null, bestScore = -Infinity;
  for (let root = 0; root < 12; root++) {
    for (const isMinor of [false, true]) {
      const dia = buildDiatonicSet(root, isMinor);
      let score = 0;
      for (const c of parsed) {
        const key = chordSimpleKey(c);
        if (dia.has(key)) score += 1;
      }
      // First/last chord matching the tonic gets a boost (first is a stronger signal)
      const tonicKey = root + ":" + (isMinor ? "m" : "");
      if (chordSimpleKey(parsed[0]) === tonicKey) score += 2.5;
      if (chordSimpleKey(parsed[parsed.length - 1]) === tonicKey) score += 1.5;
      // V→I cadence boost: if any consecutive pair is dominant→tonic, strong signal for the key
      const dominantPc = (root + 7) % 12;
      const dominantKey = dominantPc + ":";  // major V (works in both major and "harmonic minor" usage)
      for (let p = 0; p < parsed.length - 1; p++) {
        if (chordSimpleKey(parsed[p]) === dominantKey && chordSimpleKey(parsed[p+1]) === tonicKey) {
          score += 1.5; break;
        }
      }
      // Slight preference for major when scores tie (more common in pop/folk)
      if (!isMinor) score += 0.1;
      // Prefer simpler keys (fewer accidentals): C major / G major / D major / etc.
      if ([0, 5, 7, 9, 2, 4].includes(root)) score += 0.05;

      if (score > bestScore) {
        bestScore = score;
        best = { root, isMinor };
      }
    }
  }
  if (!best || bestScore < 1) return null;
  return pcToName(best.root, false) + (best.isMinor ? "m" : "");
}

// Reverse chord lookup: given a set of pitch classes, find a chord name that matches.
// Tries each note as root with each known quality template.
const CHORD_QUALITY_TEMPLATES = [
  ["",      [0, 4, 7]],
  ["m",     [0, 3, 7]],
  ["dim",   [0, 3, 6]],
  ["aug",   [0, 4, 8]],
  ["sus2",  [0, 2, 7]],
  ["sus4",  [0, 5, 7]],
  ["6",     [0, 4, 7, 9]],
  ["m6",    [0, 3, 7, 9]],
  ["7",     [0, 4, 7, 10]],
  ["maj7",  [0, 4, 7, 11]],
  ["m7",    [0, 3, 7, 10]],
  ["m7b5",  [0, 3, 6, 10]],
  ["dim7",  [0, 3, 6, 9]],
  ["7sus4", [0, 5, 7, 10]],
  ["add9",  [0, 4, 7, 14 % 12]],
  ["9",     [0, 4, 7, 10, 14 % 12]],
  ["maj9",  [0, 4, 7, 11, 14 % 12]],
  ["m9",    [0, 3, 7, 10, 14 % 12]],
];

function chordNameFromPcs(pcs) {
  const uniq = [...new Set(pcs.map(pc => ((pc % 12) + 12) % 12))];
  if (uniq.length < 2) return null;
  for (const candidateRoot of uniq) {
    for (const [quality, intervals] of CHORD_QUALITY_TEMPLATES) {
      const expected = new Set(intervals.map(i => (candidateRoot + i) % 12));
      if (expected.size !== uniq.length) continue;
      let match = true;
      for (const pc of expected) if (!uniq.includes(pc)) { match = false; break; }
      if (match) return pcToName(candidateRoot) + quality;
    }
  }
  return null;
}

// Parse a string like "C E G B" or "C4, E4, G4, B4" into pitch classes
function parsePianoNotesString(s) {
  if (!s || !s.trim()) return [];
  const tokens = s.replace(/,/g, " ").split(/\s+/).filter(Boolean);
  const pcs = [];
  for (const tok of tokens) {
    const m = tok.match(/^([A-Ga-g])([#b♯♭]?)(\d)?$/);
    if (!m) continue;
    const noteName = m[1].toUpperCase() + (m[2] || "").replace("♯", "#").replace("♭", "b");
    const pc = NOTE_PC[noteName];
    if (pc !== undefined) pcs.push(pc);
  }
  return pcs;
}

function chordNotes(chord) {
  const ivs = qualityToIntervals(chord.quality);
  const notes = ivs.map(i => ({ pc: (chord.root + i) % 12, isRoot: i === 0, isBass: false }));
  if (chord.bass !== null) {
    let already = notes.find(n => n.pc === chord.bass);
    if (already) already.isBass = true;
    else notes.unshift({ pc: chord.bass, isRoot: false, isBass: true });
  }
  return notes;
}

function pcToName(pc, preferFlat=false) {
  return (preferFlat ? PC_FLAT : PC_SHARP)[((pc % 12) + 12) % 12];
}

const E_SHAPE_TEMPLATES = {
  "":    [0,2,2,1,0,0],
  "m":   [0,2,2,0,0,0],
  "7":   [0,2,0,1,0,0],
  "m7":  [0,2,0,0,0,0],
  "maj7":[0,2,1,1,0,0],
  "sus4":[0,2,2,2,0,0],
};

function lookupShape(chordName) {
  if (GUITAR_SHAPES[chordName]) return GUITAR_SHAPES[chordName];
  const parsed = splitChord(chordName);
  if (!parsed) return null;
  const q = parsed.quality;
  let key = null;
  if (q === "" || q === "M" || q === "maj") key = "";
  else if (q === "m" || q === "min") key = "m";
  else if (q === "7") key = "7";
  else if (/^m7$|^min7$/.test(q)) key = "m7";
  else if (/^maj7$|^M7$/.test(q)) key = "maj7";
  else if (/^sus4?$/.test(q)) key = "sus4";
  if (key === null) return null;
  const tpl = E_SHAPE_TEMPLATES[key];
  if (!tpl) return null;

  const offset = ((parsed.root - 4) + 12) % 12;
  if (offset === 0) return { frets: tpl.slice(), derived: true };
  const frets = tpl.map(f => f === -1 ? -1 : f + offset);
  return { frets, derived: true, barre: { fret: offset, from: 0, to: 5 } };
}

//=============================================================
// SVG: Guitar
//=============================================================
function svgGuitar(chordName, custom, size="md") {
  const shape = custom || lookupShape(chordName);
  if (!shape) {
    return `<div class="muted small" style="text-align:center;padding:24px 0;">No diagram for <b>${escapeHtml(chordName)}</b><br><span class="micro">Add a custom shape below.</span></div>`;
  }
  const frets = shape.frets;
  const fingers = shape.fingers || [];
  const minFret = Math.max(0, Math.min(...frets.filter(f => f > 0)) || 0);
  const useFretsFrom = (Math.max(...frets) > 4 && minFret > 0) ? minFret : 0;
  const NUM_FRETS = 5;
  const dim = size === "sm" ? { W: 110, H: 138, padTop: 24, padBot: 14, padX: 16 } :
              size === "lg" ? { W: 150, H: 180, padTop: 32, padBot: 20, padX: 22 } :
                              { W: 130, H: 160, padTop: 28, padBot: 16, padX: 18 };
  const { W, H, padTop, padBot, padX } = dim;
  const stringGap = (W - padX*2) / 5;
  const fretGap = (H - padTop - padBot) / NUM_FRETS;

  let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  for (let s = 0; s < 6; s++) {
    const x = padX + s * stringGap;
    const f = frets[s];
    if (f === -1) {
      svg += `<text x="${x}" y="${padTop - 8}" text-anchor="middle" font-size="13" fill="#b41a1a" font-family="ui-monospace,monospace">×</text>`;
    } else if (f === 0) {
      svg += `<circle cx="${x}" cy="${padTop - 8}" r="4" fill="none" stroke="#14161a" stroke-width="1.4"/>`;
    }
  }
  for (let s = 0; s < 6; s++) {
    const x = padX + s * stringGap;
    svg += `<line x1="${x}" y1="${padTop}" x2="${x}" y2="${H - padBot}" stroke="#bbb" stroke-width="1"/>`;
  }
  for (let i = 0; i <= NUM_FRETS; i++) {
    const y = padTop + i * fretGap;
    const w = (i === 0 && useFretsFrom === 0) ? 3 : 1;
    svg += `<line x1="${padX}" y1="${y}" x2="${W - padX}" y2="${y}" stroke="#14161a" stroke-width="${w}"/>`;
  }
  if (useFretsFrom > 0) {
    svg += `<text x="${padX - 5}" y="${padTop + fretGap*0.7}" text-anchor="end" font-size="11" fill="#6b7180" font-family="ui-monospace,monospace">${useFretsFrom}fr</text>`;
  }
  if (shape.barre) {
    const b = shape.barre;
    const relFret = b.fret - useFretsFrom;
    if (relFret >= 0 && relFret < NUM_FRETS) {
      const y = padTop + (relFret - 0.5) * fretGap + fretGap;
      const x1 = padX + b.from * stringGap;
      const x2 = padX + b.to * stringGap;
      svg += `<rect x="${x1 - 7}" y="${y - 7}" width="${x2 - x1 + 14}" height="14" rx="7" fill="#14161a" opacity="0.85"/>`;
    }
  }
  for (let s = 0; s < 6; s++) {
    const f = frets[s];
    if (f > 0) {
      const relFret = f - useFretsFrom;
      if (relFret > 0 && relFret <= NUM_FRETS) {
        const x = padX + s * stringGap;
        const cy = padTop + (relFret - 0.5) * fretGap;
        svg += `<circle cx="${x}" cy="${cy}" r="6.5" fill="#14161a"/>`;
        if (fingers[s]) {
          svg += `<text x="${x}" y="${cy + 3}" text-anchor="middle" font-size="9" fill="#fff" font-family="ui-sans-serif">${fingers[s]}</text>`;
        }
      }
    }
  }
  svg += `</svg>`;
  return svg;
}

//=============================================================
// SVG: Piano
//=============================================================
const WHITE_KEYS_PC = [0, 2, 4, 5, 7, 9, 11];
const BLACK_KEYS = [
  { afterWhite: 0, pc: 1 },
  { afterWhite: 1, pc: 3 },
  { afterWhite: 3, pc: 6 },
  { afterWhite: 4, pc: 8 },
  { afterWhite: 5, pc: 10 },
];

function svgPiano(chordName, octaves=2, size="md") {
  const parsed = splitChord(chordName);
  if (!parsed) return `<div class="muted small">No piano diagram for ${escapeHtml(chordName)}</div>`;
  const notes = chordNotes(parsed);
  const noteSet = new Set(notes.map(n => n.pc));
  const rootPc = parsed.root;
  const bassPc = parsed.bass;
  const dim = size === "sm" ? { whiteW: 18, whiteH: 80, blackW: 11, blackH: 50 } :
              size === "lg" ? { whiteW: 26, whiteH: 110, blackW: 16, blackH: 70 } :
                              { whiteW: 22, whiteH: 100, blackW: 13, blackH: 62 };
  const { whiteW, whiteH, blackW, blackH } = dim;
  const totalWhites = 7 * octaves;
  const W = whiteW * totalWhites, H = whiteH;
  let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;

  for (let i = 0; i < totalWhites; i++) {
    const pc = WHITE_KEYS_PC[i % 7];
    const isHit = noteSet.has(pc);
    const isRoot = (pc === rootPc);
    const x = i * whiteW;
    const fill = isRoot ? "#b14a2c" : (isHit ? "#1e3a8a" : "#fff");
    svg += `<rect x="${x}" y="0" width="${whiteW}" height="${whiteH}" fill="${fill}" stroke="#14161a" stroke-width="1"/>`;
    if (isHit) {
      svg += `<text x="${x + whiteW/2}" y="${whiteH - 10}" text-anchor="middle" font-size="9" fill="#fff" font-family="ui-sans-serif" font-weight="600">${pcToName(pc)}</text>`;
    }
  }
  for (let oct = 0; oct < octaves; oct++) {
    for (const bk of BLACK_KEYS) {
      const i = oct * 7 + bk.afterWhite;
      const x = (i + 1) * whiteW - blackW/2;
      const isHit = noteSet.has(bk.pc);
      const isRoot = (bk.pc === rootPc);
      const fill = isRoot ? "#b14a2c" : (isHit ? "#1e3a8a" : "#14161a");
      svg += `<rect x="${x}" y="0" width="${blackW}" height="${blackH}" fill="${fill}" stroke="#14161a" stroke-width="1"/>`;
      if (isHit) {
        svg += `<text x="${x + blackW/2}" y="${blackH - 8}" text-anchor="middle" font-size="8" fill="#fff" font-family="ui-sans-serif" font-weight="600">${pcToName(bk.pc)}</text>`;
      }
    }
  }
  svg += `</svg>`;
  return svg;
}

// CHORD-SHEET PARSING (paste flow)
//=============================================================
function isChordToken(tok) {
  return /^[A-G][#b]?(maj|min|m|M|dim|aug|sus|add|°|ø|\+)?(\d{1,2})?(b\d|#\d|♯\d|♭\d)*(\/[A-G][#b]?)?$/.test(tok);

  if (/^\[[A-G][^\]]*\](\s+\[[A-G][^\]]*\])*\s*$/.test(stripped)) return true;
  const toks = stripped.split(/\s+/).filter(Boolean);
  if (toks.length === 0) return false;
  if (/^[A-Z][a-zA-Z ]*:?$/.test(stripped) && !isChordToken(toks[0])) return false;
  return toks.every(isChordToken);
}

  const s = line.trim();
  if (/^\[[A-Za-z][A-Za-z0-9 ]*\]$/.test(s)) return true;
  if (/^\([A-Za-z][A-Za-z0-9 ]*\)$/.test(s)) return true;
  if (/^[A-Z][A-Za-z]+( \d+)?:$/.test(s)) return true;
  return false;

function isTabLine(line) {

  if (/^[eBGDAEbgda]\|/.test(s) && /[-\d]/.test(s)) return true;
  return false;
}

  if (!lyricLine) lyricLine = "";

  let i = 0;
  while (i < chordLine.length) {
    if (chordLine[i] === " " || chordLine[i] === "\t") { i++; continue; }
    let j = i;
    while (j < chordLine.length && chordLine[j] !== " " && chordLine[j] !== "\t") j++;
    insertions.push({ col: i, chord: chordLine.slice(i, j) });
    i = j;
  }
  const lastCol = insertions.length ? insertions[insertions.length - 1].col : 0;
  if (lyricLine.length < lastCol + 4) lyricLine = lyricLine.padEnd(lastCol + 4, " ");
  const snapped = insertions.map((ins, idx) => {
    let col = ins.col;
    const nextCol = idx + 1 < insertions.length ? insertions[idx + 1].col : Infinity;
    if (col < lyricLine.length && /\s/.test(lyricLine[col])) {
      let scan = col;
      while (scan < lyricLine.length && /\s/.test(lyricLine[scan]) && scan < nextCol) scan++;
      if (scan < nextCol) col = scan;
    }
    return { col, chord: ins.chord };

  for (const ins of snapped) {
    out += lyricLine.slice(cursor, ins.col);

    const inner = /^\[(.+)\]$/.test(ins.chord) ? ins.chord.match(/^\[(.+)\]$/)[1] : ins.chord;

// Convert inline ChordPro ("I [F]sucked the [Am]moon") to chord-line-above-lyric format,
// with a blank line between each chord/lyric block. Section labels stay tight to the next block.
// The detail view always renders from the ChordPro storage; this is just for the editor.
function chordProToChordSheet(text) {
  if (!text) return "";
  const blocks = []; // { kind: 'section'|'pair'|'plain'|'chord-only', text }
  for (const line of text.split("\n")) {
    if (!line.trim()) continue; // drop input blanks; we add our own
    const sec = line.match(/^\s*\{([^}]+)\}\s*$/);
    if (sec) {
      blocks.push({ kind: "section", text: "[" + sec[1].trim() + "]" });
      continue;
    }
    if (!/\[[^\]]+\]/.test(line)) {
      blocks.push({ kind: "plain", text: line });
      continue;
    }
    // Build chord line and lyric line in parallel
    const parts = line.split(/(\[[^\]]+\])/g).filter(p => p.length > 0);
    let chordLine = "", lyricLine = "";
    for (const part of parts) {
      if (/^\[[^\]]+\]$/.test(part)) {
        const chord = part.slice(1, -1);
        const targetCol = Math.max(lyricLine.length, chordLine.length === 0 ? 0 : chordLine.length + 1);
        while (chordLine.length < targetCol) chordLine += " ";
        chordLine += chord;
      } else {
        lyricLine += part;
      }
    }
    chordLine = chordLine.replace(/\s+$/, "");
    const trimmedLyric = lyricLine.replace(/\s+$/, "");
    if (!trimmedLyric) blocks.push({ kind: "chord-only", text: chordLine });
    else if (!chordLine) blocks.push({ kind: "plain", text: lyricLine });
    else blocks.push({ kind: "pair", text: chordLine + "\n" + trimmedLyric });
  }

  const out = [];
  let prevWasSection = true; // treat start as if after a section, so first block gets no leading blank
  for (const b of blocks) {
    if (out.length > 0 && !prevWasSection) out.push("");
    out.push(b.text);
    prevWasSection = (b.kind === "section");
  }

// After conversion, chord brackets may land mid-word because UG's [ch]F[/ch] (9 chars)
// shrinks to [F] (3 chars), shifting column alignment. This pass walks each line
// and moves any chord that landed inside a word back to that word's start.
function snapChordsInLine(line) {
  if (!/\[[^\]]+\]/.test(line)) return line;
  // Skip section labels like "{Verse}" — those aren't chord lines
  if (/^\s*\{[^}]+\}\s*$/.test(line)) return line;
  const parts = line.split(/(\[[^\]]+\])/g).filter(s => s.length > 0);
  let result = "";
  const pending = [];
  for (let i = 0; i < parts.length; i++) {
    const part = parts[i];
    if (/^\[[^\]]+\]$/.test(part)) {
      pending.push(part);
      continue;
    }
    if (pending.length === 0) { result += part; continue; }
    // We have pending chord(s) coming before this text part.
    const partFirstIsNonSpace = part.length > 0 && /\S/.test(part[0]);
    const resultEndsWithNonSpace = result.length > 0 && /\S/.test(result[result.length - 1]);
    if (partFirstIsNonSpace && resultEndsWithNonSpace) {
      // Mid-word: snap chord(s) back to the start of the current word.
      // If there are already chords at that word-start, insert AFTER them so order is preserved.
      const lastSpace = result.lastIndexOf(" ");
      const afterSpace = lastSpace + 1; // 0 if no prior space
      let insertAt = afterSpace;
      while (insertAt < result.length && result[insertAt] === "[") {
        const close = result.indexOf("]", insertAt);
        if (close === -1) break;
        insertAt = close + 1;
      }
      result = result.slice(0, insertAt) + pending.join("") + result.slice(insertAt) + part;
    } else {
      result += pending.join("") + part;
    }
    pending.length = 0;
  }

  if (pending.length) result += pending.join("");

}
function snapChordsToWordBoundaries(text) {
  return text.split("\n").map(snapChordsInLine).join("\n");
}

function parseChordSheet(text) {
  if (!text || !text.trim()) return { lyrics: "" };
  const lines = text.replace(/\r\n/g, "\n").split("\n");
  const out = [];
  let title = null, artist = null, key = null;
  const remaining = [];
  for (const ln of lines) {
    const dm = ln.match(/^\s*\{\s*(title|t|artist|a|subtitle|st|key|k)\s*:\s*([^}]+)\}\s*$/i);
    if (dm) {
      const tag = dm[1].toLowerCase(); const val = dm[2].trim();
      if (tag === "title" || tag === "t") title = val;
      else if (tag === "artist" || tag === "a" || tag === "subtitle" || tag === "st") artist = val;
      else if (tag === "key" || tag === "k") key = val;
      continue;
    }
    if (/^\s*\{[^}]+\}\s*$/.test(ln)) continue;
    remaining.push(ln);
  }
  if (!title && remaining.length) {
    const first = remaining[0].trim();
    const m = first.match(/^(.{2,80}?)\s+[-–—]\s+(.{2,80})$/);
    if (m && !isChordLine(first) && !isSectionLabel(first)) {
      title = m[1].trim(); artist = m[2].trim(); remaining.shift();
    }
  }
  let i = 0;
  while (i < remaining.length) {
    const ln = remaining[i];
    if (!ln.trim()) { out.push(""); i++; continue; }
    if (isSectionLabel(ln)) {
      const stripped = ln.trim().replace(/^[\[(]|[\])]$/g, "").replace(/:$/, "");
      out.push("{" + stripped + "}");
      i++; continue;
    }
    if (isChordLine(ln)) {
      const next = remaining[i + 1];
      // Don't merge a chord line into a tab line — render the chord line standalone instead.
      if (next !== undefined && next.trim() && !isChordLine(next) && !isSectionLabel(next) && !isTabLine(next)) {
        out.push(mergeChordsIntoLyric(ln, next));
        i += 2;
      } else {
        // Standalone chord line — preserve already-bracketed tokens, wrap bare ones
        const toks = ln.trim().split(/\s+/);
        out.push(toks.map(t => /^\[.+\]$/.test(t) ? t : "[" + t + "]").join(" "));
        i++;
      }
    } else {
      out.push(ln);
      i++;
    }
  }
  // Snap any mid-word chord brackets back to the start of their word.
  // Catches the common UG case where [ch]F[/ch] → [F] shifts column alignment.
  const cleaned = snapChordsToWordBoundaries(out.join("\n")).trim();
  return { lyrics: cleaned, title, artist, key };
}

async function lookupMusicBrainz(title, artist) {
  const q = `recording:"${title.replace(/"/g, "\\\"")}" AND artist:"${artist.replace(/"/g, "\\\"")}"`;
  const url = `https://musicbrainz.org/ws/2/recording/?query=${encodeURIComponent(q)}&fmt=json&limit=5`;

// ----- Best-effort scraper for chord-site URLs -----
const CORS_PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,

async function fetchViaProxy(url) {
  let lastErr = null;
  for (const proxify of CORS_PROXIES) {
    try {
      const res = await fetch(proxify(url), { cache: "no-cache" });
      if (res.ok) {
        const txt = await res.text();
        if (txt && txt.length > 200) return txt;
        lastErr = new Error("Empty body");
      } else {
        lastErr = new Error("Proxy " + res.status);
      }
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error("All proxies failed");
}

function decodeHtmlEntities(s) {

  ta.innerHTML = s;
  return ta.value;
}

    .replace(/\[ch\]([^\[]+)\[\/ch\]/g, (_, c) => "[" + c.trim() + "]")
    .replace(/\[\/?tab\]/g, "");
}

// Recursively search a parsed JSON for any key matching the regex; used as a robust fallback
function deepFindKey(obj, keyPattern, depth = 0) {
  if (depth > 8 || !obj || typeof obj !== "object") return null;
  for (const k of Object.keys(obj)) {
    if (keyPattern.test(k)) {
      const v = obj[k];
      if (typeof v === "string" && v.trim() && v.length < 200) return v.trim();
    }
  }
  for (const k of Object.keys(obj)) {
    const v = obj[k];
    if (v && typeof v === "object") {
      const found = deepFindKey(v, keyPattern, depth + 1);
      if (found) return found;
    }
  }
  return null;
}

function parseUltimateGuitar(html) {

  const og = html.match(/<meta[^>]+property=["']og:title["'][^>]+content=["']([^"']+)/i);
  if (og) {
    const t = decodeHtmlEntities(og[1]);
    let m = t.match(/^(.+?)\s+(?:Chords?|Tabs?|Bass|Ukulele|Drum|Pro|Lyrics)\s+(?:by|–|—|-)\s+([^|@\-–—]+?)(?:\s*[\|@\-–—].*)?$/i);
    if (!m) m = t.match(/^(.+?)\s+(?:by)\s+([^|@\-–—]+?)(?:\s*[\|@\-–—].*)?$/i);
    if (!m) m = t.match(/^(.+?)\s+[-–—]\s+([^|@\-–—]+?)(?:\s*[\|@\-–—].*)?$/);

    try {
      const json = JSON.parse(decodeHtmlEntities(storeMatch[1]));
      const data = json?.store?.page?.data;
      const tab = data?.tab_view?.wiki_tab?.content || data?.tab?.wiki_tab?.content;
      if (tab) lyrics = ugMarkupToChordPro(tab);
      if (!artist) artist = deepFindKey(json, /^(artist_name|artist|band|musician|performer|song_band|byArtist)$/i);
      if (!title)  title  = deepFindKey(json, /^(song_name|song_title|title|name|track_name)$/i);
    } catch (e) { console.warn("UG JSON parse failed", e); }
  }

    const m = html.match(/<pre[^>]*>([\s\S]*?)<\/pre>/);
    if (m) {
      const content = decodeHtmlEntities(m[1].replace(/<[^>]+>/g, ""));
      if (/\[ch\]/.test(content)) lyrics = ugMarkupToChordPro(content);

  if (!m) m = html.match(/<pre[^>]*>([\s\S]*?)<\/pre>/);

  if (!matches.length) return null;
  matches.sort((a, b) => b[1].length - a[1].length);
  const content = decodeHtmlEntities(matches[0][1].replace(/<[^>]+>/g, ""));

  if (og) {
    const t = decodeHtmlEntities(og[1]);
    const m = t.match(/^(.+?)\s+(?:Chords|Tab|Lyrics)?\s+(?:by|–|—|-)\s+(.+?)(?:\s*[\|@].*)?$/i);
    if (m) return { title: m[1].trim(), artist: m[2].trim() };

// Fallback: extract artist from a UG URL path, e.g. /tab/radiohead/sail-to-the-moon-... → "Radiohead"
function artistFromUgUrl(url) {
  try {
    const m = new URL(url).pathname.match(/^\/tab\/([^\/]+)\//i);
    if (!m) return null;
    return m[1].replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
  } catch (e) { return null; }
}

async function importFromUrl(url) {
  if (!/^https?:\/\//i.test(url)) throw new Error("Please paste a full URL (https://…)");
  const host = new URL(url).hostname.replace(/^www\./, "");
  const isUG = /ultimate-guitar\.com/.test(host);

  let html;
  try {
    html = await fetchViaProxy(url);
  } catch (e) {
    throw new Error("Proxy fetch failed: " + e.message + ". Use the bookmarklet for sites that block proxies (UG, etc.).");
  }
  if (isCloudflareChallenge(html)) {
    throw new Error("This site (e.g. Ultimate Guitar) is behind Cloudflare bot-protection and can't be fetched by a CORS proxy. Use the bookmarklet — it runs in your browser session, where you're a real user.");
  }

  let parsed = null;
  if (isUG) {
    parsed = parseUltimateGuitar(html);
  } else if (/e-chords\.com$/.test(host)) {
    parsed = parseEChords(html);
  }
  if (!parsed || !parsed.lyrics) parsed = parseGenericPre(html);
  if (!parsed || !parsed.lyrics) {
    throw new Error("Couldn't find a chord chart on that page. Try paste-and-parse, or use the bookmarklet.");
  }
  if (!parsed.title || !parsed.artist) {
    const meta = parseTitleArtistFromHtml(html);
    parsed.title = parsed.title || meta.title;
    parsed.artist = parsed.artist || meta.artist;
  }
  // Last resort: pull artist from UG URL path
  if (isUG && !parsed.artist) {
    parsed.artist = artistFromUgUrl(url);
  }
  return parsed;
}

// ----- Bookmarklet — runs in user's logged-in browser, bypasses CF + CORS -----
// On click: scrape current page → open Chord Archive with a #new= hash that
// auto-populates the new-song editor. No clipboard, no paste step.
function bookmarkletSource() {
  const fn = function() {
    let lyrics = "", title = "", artist = "";
    const host = location.hostname;
    function ugToChordPro(s) {
      return s.replace(/\[ch\]([^\[]+)\[\/ch\]/g, (_, c) => "[" + c.trim() + "]")
              .replace(/\[\/?tab\]/g, "");
    }
    if (/ultimate-guitar\.com/.test(host)) {
      // og:title is most reliable on UG for title/artist split
      const og = document.querySelector('meta[property="og:title"]');
      if (og) {
        const t = og.getAttribute("content") || "";
        const m = t.match(/^(.+?)\s+(?:Chords|Chord|Tab|Tabs|Bass|Ukulele|Drum|Pro|Lyrics)\s+(?:by|-|–|—)\s+([^|@\-–—]+?)(?:\s*[\|@\-–—].*)?$/i);
        if (m) { title = m[1].trim(); artist = m[2].trim(); }
      }
      const store = document.querySelector(".js-store");
      if (store && store.dataset && store.dataset.content) {
        try {
          const data = JSON.parse(store.dataset.content);
          const root = data?.store?.page?.data || {};
          const tab = root?.tab_view?.wiki_tab?.content || root?.tab?.wiki_tab?.content;
          if (tab) lyrics = ugToChordPro(tab);
          if (!artist) {
            const ac = [root?.tab?.artist_name, root?.tab?.artist, root?.tab_view?.versions?.[0]?.artist_name].find(c => typeof c === "string" && c.trim());
            if (ac) artist = ac;
          }
          if (!title) {
            const tc = [root?.tab?.song_name, root?.tab?.title, root?.tab_view?.versions?.[0]?.song_name].find(c => typeof c === "string" && c.trim());
            if (tc) title = tc;
          }
        } catch (e) {}
      }
      // Last-ditch: derive artist from /tab/<artist-slug>/... in the URL path
      if (!artist) {
        const m = location.pathname.match(/^\/tab\/([^\/]+)\//i);
        if (m) artist = m[1].replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      }
    }
    if (!lyrics && /e-chords\.com/.test(host)) {
      const pre = document.querySelector("pre#core") || document.querySelector("pre");
      if (pre) lyrics = ugToChordPro(pre.textContent);
    }
    if (!lyrics) {
      const pres = [...document.querySelectorAll("pre")]
        .filter(p => p.textContent.length > 100)
        .sort((a,b) => b.textContent.length - a.textContent.length);
      if (pres[0]) lyrics = pres[0].textContent;
    }
    if (!title) {
      title = document.querySelector("h1")?.textContent?.trim()
            || document.title.replace(/\s*[\|@\-–—].*/, "").trim();
    }
    if (!lyrics) { alert("Chord Archive: couldn't find a chord chart on this page."); return; }

    const payload = btoa(unescape(encodeURIComponent(JSON.stringify({
      title, artist, lyrics, sourceUrl: location.href
    }))));
    const target = "https://songs.markpytlik.com/#new=" + payload;
    if (target.length > 500000) {
      alert("Chord Archive: chart is too large for direct import. Falling back to clipboard.");
      navigator.clipboard.writeText(lyrics);
      window.open("https://songs.markpytlik.com/", "_blank");
      return;
    }
    window.open(target, "_blank");
  };
  const body = "(" + fn.toString().replace(/\s+/g, " ") + ")();";
  return "javascript:" + encodeURIComponent(body);
}

// HTML helpers
//=============================================================
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"})[c]);
}
function renderLyrics(text) {
  if (!text) return `<div class="muted">No lyrics yet — click <em>Edit</em> to add some.</div>`;
  const rawLines = text.replace(/\r\n/g, "\n").split("\n");
  // Pre-condense: if two chord-only lines have identical chord sets, merge them
  // (skipping any blank lines in between).
  const lines = [];
  for (let i = 0; i < rawLines.length; i++) {
    const ln = rawLines[i];
    if (/^\s*(?:\[[^\]]+\]\s*)+$/.test(ln)) {
      const sig = ln.replace(/\s+/g, " ").trim();
      let count = 1;
      let j = i + 1;
      while (j < rawLines.length) {
        if (!rawLines[j].trim()) { j++; continue; }
        const next = rawLines[j];
        if (/^\s*(?:\[[^\]]+\]\s*)+$/.test(next) && next.replace(/\s+/g, " ").trim() === sig) {
          count++; j++;
        } else break;
      }
      lines.push({ kind: "chord-only", text: ln, count });
      i = j - 1;
    } else {
      lines.push(ln);
    }
  }

  const out = [];
  for (const line of lines) {
    if (typeof line === "object" && line.kind === "chord-only") {
      const re = /\[([^\]]+)\]/g;
      let m, html = "";
      while ((m = re.exec(line.text)) !== null) {
        html += `<span class="chord-pill-inline" data-chord="${escapeHtml(m[1])}">${escapeHtml(m[1])}</span>`;
      }
      const repHtml = line.count > 1 ? `<span class="chord-rep">× ${line.count}</span>` : "";
      out.push(`<div class="chord-only-row">${html}${repHtml}</div>`);
      continue;
    }
    if (!line.trim()) { out.push(""); continue; }
    const sec = line.match(/^\s*\{([^}]+)\}\s*$/);
    if (sec) {
      out.push(`<span class="section-label">${escapeHtml(sec[1])}</span>`);
      continue;
    }
    // Mixed chord + lyric line — chord pills sit absolute-positioned above each lyric segment.
    // Each chord-bearing segment gets a min-width sized to its chord name so adjacent pills don't overlap.
    let html = "";
    const re = /\[([^\]]+)\]([^\[]*)|([^\[]+)/g;
    let m;
    while ((m = re.exec(line)) !== null) {
      if (m[1] !== undefined) {
        const chord = m[1];
        const text = m[2] || "";
        const safeText = text.length === 0 ? "&nbsp;" : escapeHtml(text);
        // Pill is ~0.7em per char + padding/border. Floor at 2.5em for short names.
        const minW = Math.max(2.5, chord.length * 0.72 + 0.5).toFixed(2);
        html += `<span class="seg" style="min-width:${minW}em;"><span class="chord" data-chord="${escapeHtml(chord)}">${escapeHtml(chord)}</span>${safeText}</span>`;
      } else {
        html += `<span class="seg">${escapeHtml(m[3])}</span>`;
      }
    }
    out.push(html);
  }
  return out.join("\n");
}
function extractChords(text) {
  if (!text) return [];
  const re = /\[([^\]]+)\]/g;
  const set = new Set(); let m;
  while ((m = re.exec(text)) !== null) {
    const c = m[1].trim();
    if (splitChord(c)) set.add(c);
  }
  return [...set];
}

const state = {
  songs: [],
  selectedId: null,
  search: "",
  filterInstrument: "all",
  sort: "updated",
  editing: false,
};

function getFiltered() {
  let list = state.songs.slice();
  if (state.filterInstrument !== "all") {
    list = list.filter(s => {
      if (state.filterInstrument === "both") return s.instruments?.length === 2;
      return (s.instruments || []).includes(state.filterInstrument);
    });
  }
  if (state.search) {
    const q = state.search.toLowerCase();
    list = list.filter(s =>
      (s.title || "").toLowerCase().includes(q) ||
      (s.artist || "").toLowerCase().includes(q) ||
      (s.lyrics || "").toLowerCase().includes(q)
    );
  }
  if (state.sort === "title") list.sort((a,b) => (a.title || "").localeCompare(b.title || ""));
  else if (state.sort === "artist") list.sort((a,b) => (a.artist || "").localeCompare(b.artist || ""));
  else list.sort((a,b) => (b.updatedAt || 0) - (a.updatedAt || 0));
  return list;
}

    ${chordList.length ? `
      <div class="info-block chords">
        <h4>Chords used</h4>
        <div>${chordList.map(c => `<span class="pill chord-pill" data-chord="${escapeHtml(c)}">${escapeHtml(c)}</span>`).join(" ")}</div>
      </div>` : ""}
  `;
  document.getElementById("btn-play").addEventListener("click", () => openPlayMode(song));
  document.getElementById("btn-edit").addEventListener("click", () => startEdit(song));
  document.getElementById("btn-duplicate").addEventListener("click", () => duplicateSong(song));
  document.getElementById("btn-delete").addEventListener("click", () => deleteSong(song));
  el.querySelectorAll("[data-chord]").forEach(c => {
    c.addEventListener("click", e => openChordModal(e.currentTarget.dataset.chord, song));
  });
  attachHoverPopover(el, song);
}

function renderEditor(el) {
  // "new" string OR an unsaved draft object (e.g. from #new= hash) both render as fresh
  const isImported = state.editing && typeof state.editing === "object" && !state.songs.find(s => s.id === state.editing.id);
  const isNew = state.editing === "new" || isImported;
  const song = state.editing === "new" ? blankSong() : Object.assign({}, state.editing);
  el.innerHTML = `
    <div class="detail-head">
      <div class="title-block">

        <input id="f-title" value="${escapeHtml(song.title || "")}" placeholder="e.g. Sail to the Moon" />
      </div>
      <div class="full">
        <label>Instruments</label>
        <div class="instrument-toggles">
          <label class="pill-btn ${song.instruments?.includes("guitar") ? "on" : ""}" data-tg="guitar">
            <input type="checkbox" id="f-i-guitar" ${song.instruments?.includes("guitar") ? "checked" : ""} /> Guitar
          </label>
          <label class="pill-btn ${song.instruments?.includes("piano") ? "on" : ""}" data-tg="piano">
            <input type="checkbox" id="f-i-piano" ${song.instruments?.includes("piano") ? "checked" : ""} /> Piano
          </label>
        </div>
      </div>

      <div class="full">
        <label>Lyrics &amp; Chords <span class="muted" style="text-transform:none; letter-spacing:0; font-weight:400;">— chord names go on the line above the lyric, aligned to the word where the chord changes</span></label>
        <textarea id="f-lyrics" rows="14" placeholder="[Verse 1]
   F          Am          F          Am
I sucked the moon...I spoke too soon

Section labels go in [brackets]. Use the monospace font — chord positions align to the lyrics below.">${escapeHtml(chordProToChordSheet(song.lyrics || ""))}</textarea>
        <div class="editor-tools">
          <button id="t-tidy" type="button">Tidy &amp; align ↻</button>
          <button id="t-strip-tabs" type="button" class="prominent" title="Remove tablature lines (e|---0---0---|)">🗑 Remove tablature</button>
          <button id="t-fill-meta" type="button">Autofill metadata</button>
          <button id="t-fill-lyrics" type="button">Autofill lyrics</button>
        </div>
        <div class="helper-msg" id="helper"></div>
      </div>

      <!-- Footer fields — key, capo (guitar-only), source URL -->
      <div>
        <label>Key <button type="button" id="t-detect-key" class="ghost" style="float:right; padding:0 6px; font-size:11px; text-transform:none; letter-spacing:0;">auto-detect ↻</button></label>
        <input id="f-key" value="${escapeHtml(song.key || "")}" placeholder="e.g. G, Em, F#m" />

        <label>Capo</label>

  document.getElementById("btn-cancel").addEventListener("click", () => {
    state.editing = false; renderDetail();
  });
  document.getElementById("btn-save").addEventListener("click", () => saveEdit(isNew, song));

  document.getElementById("t-tidy").addEventListener("click", () => {
    const ta = document.getElementById("f-lyrics");
    // Round-trip through parseChordSheet → chordProToChordSheet to clean up alignment
    const parsed = parseChordSheet(ta.value);
    ta.value = chordProToChordSheet(parsed.lyrics);
    if (parsed.title && !document.getElementById("f-title").value) document.getElementById("f-title").value = parsed.title;
    if (parsed.artist && !document.getElementById("f-artist").value) document.getElementById("f-artist").value = parsed.artist;
    if (parsed.key && !document.getElementById("f-key").value) document.getElementById("f-key").value = parsed.key;
    setHelper("Tidied — chords aligned to word starts.", "ok");
  });

  // Swap artist <-> title for cases where the scraper got them backwards
  document.getElementById("t-swap").addEventListener("click", () => {
    const a = document.getElementById("f-artist");
    const t = document.getElementById("f-title");
    [a.value, t.value] = [t.value, a.value];
    setHelper("Swapped artist and title.", "ok");
  });

  // Strip tablature lines (e|---0---|, B|---1---|, etc.) — defensive in case button is missing
  const stripBtn = document.getElementById("t-strip-tabs");
  if (stripBtn) stripBtn.addEventListener("click", () => {
    const ta = document.getElementById("f-lyrics");
    // Tab line patterns: starts with one of e B G D A E (case-sensitive guitar/uke strings) or numbers, followed by | and dashes/digits/dots
    // Common forms:  e|--3--3--|   B|--0--0--|   |---3-2-0---|
    const before = ta.value.split("\n").length;
    const cleaned = ta.value
      .split("\n")
      .filter(line => !/^\s*[eBGDAEbgda]?\s*\|[-\d\.\s|h\/\\\(\)]+\|?\s*$/.test(line))
      .filter(line => !/^\s*[eBGDAEbgda]\|/.test(line.trim()))   // catches lines like "e|-4---4--..."
      .join("\n")
      .replace(/\n{3,}/g, "\n\n");
    const removed = before - cleaned.split("\n").length;
    ta.value = cleaned;
    setHelper(removed > 0 ? `Stripped ${removed} tablature line${removed === 1 ? "" : "s"}.` : "No tablature lines found.", removed > 0 ? "ok" : "");
  });

  // Instrument toggle — manual toggle so the visual state always matches, even though the
  // checkbox is visually hidden. Without this, the label/checkbox association can fail to
  // bubble through `pointer-events:none` on the input.
  document.querySelectorAll(".instrument-toggles .pill-btn").forEach(btn => {
    btn.addEventListener("click", e => {
      e.preventDefault();
      const cb = btn.querySelector('input[type="checkbox"]');
      if (!cb) return;
      cb.checked = !cb.checked;
      btn.classList.toggle("on", cb.checked);
      if (btn.dataset.tg === "guitar") {
        const capoRow = document.getElementById("f-capo-row");
        if (capoRow) capoRow.style.display = cb.checked ? "" : "none";
      }
    });
  });

  document.getElementById("t-detect-key").addEventListener("click", () => {
    const lyrics = document.getElementById("f-lyrics").value;
    const chords = extractChords(lyrics);
    if (!chords.length) { setHelper("Add some chords first.", "err"); return; }
    const k = detectKey(chords);
    if (k) {
      document.getElementById("f-key").value = k;
      setHelper("Detected key: " + k + " (best fit for " + chords.length + " chord" + (chords.length !== 1 ? "s" : "") + ")", "ok");
    } else {
      setHelper("Couldn't determine a clear key from this chord set.", "err");
    }
  });

  document.getElementById("t-fill-meta").addEventListener("click", async () => {
    const t = document.getElementById("f-title").value.trim();
    const a = document.getElementById("f-artist").value.trim();
    if (!t || !a) { setHelper("Type a title and artist first.", "err"); return; }
    setHelper("Looking up on MusicBrainz…", "busy");
    try {
      const r = await lookupMusicBrainz(t, a);
      if (!r) { setHelper("No match on MusicBrainz.", "err"); return; }
      if (r.title) document.getElementById("f-title").value = r.title;
      if (r.artist) document.getElementById("f-artist").value = r.artist;
      setHelper(`Match: ${r.artist} — ${r.title}`, "ok");
    } catch (e) {
      setHelper("MusicBrainz error: " + e.message, "err");
    }
  });

  document.getElementById("t-fill-lyrics").addEventListener("click", async () => {
    const t = document.getElementById("f-title").value.trim();
    const a = document.getElementById("f-artist").value.trim();
    if (!t || !a) { setHelper("Type a title and artist first.", "err"); return; }
    const ta = document.getElementById("f-lyrics");
    if (ta.value.trim() && !confirm("Replace existing lyrics with autofilled lyrics?")) return;
    setHelper("Looking up lyrics…", "busy");
    try {
      const lyrics = await lookupLyrics(t, a);
      if (!lyrics) { setHelper("No lyrics found.", "err"); return; }
      ta.value = lyrics;
      setHelper("Lyrics loaded. They have no chords yet — paste chords above lyrics or add [Chord] markers, then hit Parse.", "ok");
    } catch (e) {
      setHelper("Lyrics fetch error: " + e.message, "err");
    }
  });

}

function setHelper(msg, kind="") {
  const el = document.getElementById("helper");
  if (!el) return;
  el.textContent = msg;
  el.className = "helper-msg " + kind;
}

function blankSong() {
  // Both instruments off by default — user picks per-song what they want diagrams for
  return { id: uid(), title: "", artist: "", key: "", capo: 0, instruments: [], lyrics: "", notes: "", sourceUrl: "", voicings: {}, createdAt: now(), updatedAt: now() };
}

// ---- Voicings model ----
// song.voicings[chordName] = [ { frets:[…], pianoNotes:[pc,…]?, note:"…" }, … ]
// User-added voicings live in song.voicings.
// Built-in shapes are auto-included as voicing #0 EXCEPT for simple major/minor triads
// (since the player already knows those — only complex/jazz/extended chords get auto-diagrams).
function isSimpleMajorOrMinor(chordName) {
  const parsed = splitChord(chordName);
  if (!parsed) return false;
  if (parsed.bass !== null) return false;  // slash chord — show diagram
  const q = parsed.quality;
  return q === "" || q === "M" || q === "maj" || q === "m" || q === "min";
}

function getVoicings(song, chordName) {
  // Migration shim: old { customShapes, voicingNotes } → new voicings array
  if (song.customShapes || song.voicingNotes) {
    song.voicings = song.voicings || {};
    for (const [name, shape] of Object.entries(song.customShapes || {})) {
      if (!song.voicings[name]) {
        song.voicings[name] = [{
          frets: shape.frets,
          fingers: shape.fingers,
          barre: shape.barre,
          note: (song.voicingNotes || {})[name] || "",
        }];
      }
    }
    delete song.customShapes;
    delete song.voicingNotes;
  }
  song.voicings = song.voicings || {};
  const list = [];
  // Built-in shape — but skip for simple major/minor triads
  if (!isSimpleMajorOrMinor(chordName)) {
    const builtIn = lookupShape(chordName);
    if (builtIn) {
      list.push({
        frets: builtIn.frets,
        fingers: builtIn.fingers,
        barre: builtIn.barre,
        note: builtIn.derived ? "Movable barre shape" : "",
        builtIn: true,
      });
    }
  }
  // Append user voicings (always shown)
  for (const v of (song.voicings[chordName] || [])) {
    list.push(Object.assign({ builtIn: false }, v));
  }
  return list;
}

function saveVoicing(song, chordName, voicing, index) {
  song.voicings = song.voicings || {};
  song.voicings[chordName] = song.voicings[chordName] || [];
  const arr = song.voicings[chordName];
  if (typeof index === "number" && index >= 0 && index < arr.length) {
    arr[index] = voicing;
  } else {
    arr.push(voicing);
  }
  song.updatedAt = now();
}
function deleteVoicing(song, chordName, index) {
  if (!song.voicings || !song.voicings[chordName]) return;
  song.voicings[chordName].splice(index, 1);
  if (song.voicings[chordName].length === 0) delete song.voicings[chordName];
  song.updatedAt = now();
}
function startEdit(song) { state.editing = song; renderDetail(); }
function saveEdit(isNew, songSnapshot) {
  const id = songSnapshot.id;
  const instruments = [];
  if (document.getElementById("f-i-guitar").checked) instruments.push("guitar");
  if (document.getElementById("f-i-piano").checked) instruments.push("piano");
  // The textarea holds chord-line-above-lyric format; parse it back to ChordPro for storage.
  const rawLyrics = document.getElementById("f-lyrics").value;
  const parsedLyrics = parseChordSheet(rawLyrics).lyrics;

  const updates = {
    id,
    title: document.getElementById("f-title").value.trim(),
    artist: document.getElementById("f-artist").value.trim(),
    key: document.getElementById("f-key").value.trim(),
    capo: parseInt(document.getElementById("f-capo").value) || 0,
    instruments,
    sourceUrl: document.getElementById("f-source").value.trim(),
    lyrics: parsedLyrics,
    notes: songSnapshot.notes || "",  // notes textarea was removed from editor; preserve existing value
    updatedAt: now(),
  };
  if (!updates.title) { setHelper("A title is required.", "err"); return; }
  if (isNew) {
    const newSong = Object.assign(blankSong(), updates, { id });
    state.songs.push(newSong);
    state.selectedId = id;
  } else {
    const idx = state.songs.findIndex(s => s.id === id);
    if (idx === -1) { state.songs.push(Object.assign(blankSong(), updates, { id })); state.selectedId = id; }
    else state.songs[idx] = Object.assign({}, state.songs[idx], updates);
  }
  saveState({ songs: state.songs });
  state.editing = false;
  renderList(); renderDetail();
}
function deleteSong(song) {
  if (!confirm(`Delete "${song.title}"? This can't be undone.`)) return;
  state.songs = state.songs.filter(s => s.id !== song.id);
  state.selectedId = null;
  saveState({ songs: state.songs });
  renderList(); renderDetail();
}
function duplicateSong(song) {
  const copy = Object.assign({}, song, { id: uid(), title: song.title + " (copy)", createdAt: now(), updatedAt: now() });
  state.songs.push(copy);
  state.selectedId = copy.id;
  saveState({ songs: state.songs });
  renderList(); renderDetail();
}

let playState = null;

function openPlayMode(song) {
  hidePopover();
  const overlay = document.createElement("div");
  overlay.className = "play-mode";
  overlay.innerHTML = `
    <div class="play-controls">
      <div class="play-title">
        <div class="artist">${escapeHtml(song.artist || "—")}${song.key ? " · Key " + escapeHtml(song.key) : ""}${song.capo ? " · Capo " + song.capo : ""}</div>
        <div>${escapeHtml(song.title || "Untitled")}</div>
      </div>
      <div class="speed-controls">
        <button id="play-slower" title="Slower (↓)">−</button>
        <input id="play-speed" type="range" min="0" max="40" step="1" value="15" title="Scroll speed (px/s)" />
        <button id="play-faster" title="Faster (↑)">+</button>
        <span class="speed-label" id="speed-label">15 px/s</span>
      </div>
      <button id="play-toggle" class="primary" title="Play/Pause (Space)">▶ Play</button>
      <button id="play-close" title="Close (Esc)">Close ✕</button>
    </div>
    <div class="play-content" id="play-content">
      <div class="lyrics-large">${renderLyrics(song.lyrics || "")}</div>
    </div>
  `;
  document.body.appendChild(overlay);

  const content = overlay.querySelector("#play-content");
  const speedInput = overlay.querySelector("#play-speed");
  const speedLabel = overlay.querySelector("#speed-label");
  const toggleBtn = overlay.querySelector("#play-toggle");

  // Scroll loop driven by requestAnimationFrame; speed in px/s.
  let isPlaying = false;
  let speedPxs = parseFloat(speedInput.value) || 20;
  let lastT = 0;
  let rafId = null;

  function step(t) {
    if (!isPlaying) return;
    if (lastT === 0) lastT = t;
    const dt = (t - lastT) / 1000;
    lastT = t;
    content.scrollTop += speedPxs * dt;
    // Stop when we hit the bottom
    if (content.scrollTop + content.clientHeight >= content.scrollHeight - 1) {
      isPlaying = false;
      toggleBtn.textContent = "▶ Replay";
      return;
    }
    rafId = requestAnimationFrame(step);
  }
  function play() {
    if (isPlaying) return;
    if (content.scrollTop + content.clientHeight >= content.scrollHeight - 1) content.scrollTop = 0;
    isPlaying = true;
    lastT = 0;
    toggleBtn.textContent = "⏸ Pause";
    rafId = requestAnimationFrame(step);
  }
  function pause() {
    isPlaying = false;
    toggleBtn.textContent = "▶ Play";
    if (rafId) cancelAnimationFrame(rafId);
  }
  function setSpeed(v) {
    speedPxs = Math.max(0, parseFloat(v) || 0);
    speedLabel.textContent = `${speedPxs.toFixed(0)} px/s`;
  }
  setSpeed(speedInput.value);

  toggleBtn.addEventListener("click", () => isPlaying ? pause() : play());
  speedInput.addEventListener("input", e => setSpeed(e.target.value));
  overlay.querySelector("#play-slower").addEventListener("click", () => {
    speedInput.value = Math.max(0, parseFloat(speedInput.value) - 2);
    setSpeed(speedInput.value);
  });
  overlay.querySelector("#play-faster").addEventListener("click", () => {
    speedInput.value = Math.min(40, parseFloat(speedInput.value) + 2);
    setSpeed(speedInput.value);
  });

  function close() {
    pause();
    overlay.remove();
    document.removeEventListener("keydown", onKey);
    playState = null;
  }
  function onKey(e) {
    if (e.key === "Escape") { close(); }
    else if (e.key === " " || e.code === "Space") {
      e.preventDefault();
      isPlaying ? pause() : play();
    } else if (e.key === "ArrowUp") {
      speedInput.value = Math.min(40, parseFloat(speedInput.value) + 2);
      setSpeed(speedInput.value);
    } else if (e.key === "ArrowDown") {
      speedInput.value = Math.max(0, parseFloat(speedInput.value) - 2);
      setSpeed(speedInput.value);
    }
  }
  overlay.querySelector("#play-close").addEventListener("click", close);
  document.addEventListener("keydown", onKey);
  playState = { close };
}
