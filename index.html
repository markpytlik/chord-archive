//=============================================================
// HOVER POPOVER  (visual phrasings, cycles through voicings)
//=============================================================
let popoverEl = null;
let popoverTimer = null;
let popoverState = null; // { chordName, song, index, occ, pinned }

function ensurePopover() {
  if (popoverEl) return popoverEl;
  popoverEl = document.createElement("div");
  popoverEl.className = "chord-popover";
  document.body.appendChild(popoverEl);
  // Keep popover open while hovering inside it
  popoverEl.addEventListener("mouseenter", () => clearTimeout(popoverTimer));
  popoverEl.addEventListener("mouseleave", () => {
    clearTimeout(popoverTimer);
    popoverTimer = setTimeout(hidePopover, 150);
  });
  return popoverEl;
}

// Build the parenthetical voicing-name suffix for a chord title (e.g. "D" → "D (inverted)").
// Standard/built-in voicings get nothing in parens — they're the default, no qualifier needed.
// Strips a redundant leading copy of the chord name from the voicing name so we don't get "D (d inverted)".
function voicingTitleSuffix(chordName, v) {
  if (!v || v.builtIn) return "";
  let label = voicingLabel(v);
  if (!label || label === "Standard") return "";
  // Tidy: lowercase first letter and drop redundant chord-name prefix.
  let lower = label.toLowerCase();
  const cn = chordName.toLowerCase();
  if (lower.startsWith(cn + " ")) lower = lower.slice(cn.length + 1);
  else if (lower === cn) return "";
  return ` (${lower})`;
}

function renderPopover(target) {
  const pop = ensurePopover();
  if (!popoverState) return;
  const { chordName, song, index, occ } = popoverState;
  const wantGuitar = !!song?.instruments?.includes("guitar");
  const wantPiano  = !!song?.instruments?.includes("piano");
  const voicings = (wantGuitar || wantPiano) ? getVoicings(song, chordName, occ) : [];
  const current = voicings[index] || null;
  const total = voicings.length;
  // Guitar diagram — bigger in popover (md size) so it's easy to read at a glance
  const guitarHtml = wantGuitar
    ? `<div class="diag-mini">
        ${current && current.frets
          ? svgGuitar(chordName, { frets: current.frets, fingers: current.fingers, barre: current.barre }, "lg")
          : (current ? "" : `<div class="muted small" style="padding:18px 6px; text-align:center; min-width:130px;">No saved voicing<br><span class="micro">click <b>+ Add</b> below</span></div>`)
        }
      </div>`
    : "";
  const pianoHtml = wantPiano
    ? `<div class="diag-mini">
        ${current && current.pianoNotes && current.pianoNotes.length
          ? svgPianoFromPcs(current.pianoNotes, splitChord(chordName)?.root, 2, "lg")
          : svgPiano(chordName, 2, "lg")}
      </div>`
    : "";
  const both = wantGuitar && wantPiano;
  const cyclerHtml = (wantGuitar && total > 1) ? `
    <div class="pop-cycler">
      <button class="arrow" data-action="prev" ${index === 0 ? "disabled" : ""} title="Previous voicing">‹</button>
      <span class="count">${index + 1} of ${total}</span>
      <button class="arrow" data-action="next" ${index === total - 1 ? "disabled" : ""} title="Next voicing">›</button>
    </div>` : "";
  const noteHtml = (current && current.note) ? `<div class="voicing-note">${escapeHtml(current.note)}</div>` : "";
  const pinned = !!popoverState.pinned;
  const actionsHtml = `
    <div class="pop-actions">
      <button data-action="pin" class="pin-toggle ${pinned ? "active" : ""}" title="${pinned ? "Unpin (allow auto-close)" : "Pin (keep open)"}">${pinned ? "📌 Pinned" : "📌"}</button>
      <button data-action="add" title="Add a new voicing">+ Add voicing</button>
      ${current && !current.builtIn ? `
        <button data-action="edit" title="Edit this voicing">Edit</button>
        <button data-action="delete" class="danger" title="Delete this voicing">Delete</button>
      ` : current && current.builtIn ? `<button data-action="edit-from-builtin" title="Customize this chord">Customize</button>` : ""}
    </div>`;

  const titleSuffix = voicingTitleSuffix(chordName, current);
  pop.innerHTML = `
    <div class="pop-header">${escapeHtml(chordName)}${titleSuffix ? `<span class="pop-header-sub">${escapeHtml(titleSuffix)}</span>` : ""}</div>
    <div class="pop-row ${both ? "" : "single"}">
      ${guitarHtml}${pianoHtml}
    </div>
    ${cyclerHtml}
    ${noteHtml}
    ${actionsHtml}
  `;

  pop.querySelectorAll("button[data-action]").forEach(btn => {
    btn.addEventListener("click", e => {
      const action = e.currentTarget.dataset.action;
      if (action === "prev") { popoverState.index = Math.max(0, index - 1); renderPopover(target); }
      else if (action === "next") { popoverState.index = Math.min(total - 1, index + 1); renderPopover(target); }
      else if (action === "pin") { popoverState.pinned = !popoverState.pinned; renderPopover(target); }
      else if (action === "add") { hidePopover(true); openVoicingEditor(chordName, song, null, null, occ); }
      else if (action === "edit") {
        hidePopover(true);
        if (current.perOccurrence) {
          openVoicingEditor(chordName, song, null, current, occ);
        } else {
          openVoicingEditor(chordName, song, getUserVoicingIndex(song, chordName, current), null, occ);
        }
      }
      else if (action === "edit-from-builtin") { hidePopover(true); openVoicingEditor(chordName, song, null, current, occ); }
      else if (action === "delete") {
        if (confirm(`Delete this voicing of ${chordName}?`)) {
          if (current.perOccurrence) {
            pushUndo(song);
            song.positionVoicings = song.positionVoicings || {};
            delete song.positionVoicings[chordName + "@" + occ];
            song.updatedAt = now();
          } else {
            deleteVoicing(song, chordName, getUserVoicingIndex(song, chordName, current));
          }
          saveState({ songs: state.songs });
          // After delete, rebuild and re-render at safe index
          const newVoicings = wantGuitar ? getVoicings(song, chordName, occ) : [];
          popoverState.index = Math.min(index, Math.max(0, newVoicings.length - 1));
          renderPopover(target);
        }
      }
    });
  });
}

function getUserVoicingIndex(song, chordName, voicing) {
  // Map a popover voicing back to its index in song.voicings[chordName]
  if (!song.voicings || !song.voicings[chordName]) return -1;
  return song.voicings[chordName].findIndex(v =>
    JSON.stringify(v.frets) === JSON.stringify(voicing.frets)
  );
}

function showPopover(target, chordName, song, occ) {
  const safeOcc = (typeof occ === "number" && occ >= 0) ? occ : null;
  popoverState = { chordName, song, index: 0, occ: safeOcc, pinned: false };
  const pop = ensurePopover();
  renderPopover(target);
  // Position
  const rect = target.getBoundingClientRect();
  pop.style.visibility = "hidden";
  pop.classList.add("show");
  const popRect = pop.getBoundingClientRect();
  let top = rect.bottom + 8;
  if (top + popRect.height > window.innerHeight - 8) {
    top = rect.top - popRect.height - 8;
  }
  let left = rect.left + (rect.width / 2) - (popRect.width / 2);
  left = Math.max(8, Math.min(window.innerWidth - popRect.width - 8, left));
  pop.style.top = top + "px";
  pop.style.left = left + "px";
  pop.style.visibility = "visible";
}

function hidePopover(force) {
  if (!popoverEl) return;
  // Don't auto-hide a pinned popover unless the caller explicitly forces it (e.g. opening editor).
  if (popoverState && popoverState.pinned && !force) return;
  popoverEl.classList.remove("show");
  popoverState = null;
}

function attachHoverPopover(rootEl, song) {
  rootEl.addEventListener("mouseover", e => {
    const t = e.target.closest("[data-chord]");
    if (!t) return;
    if (popoverState && popoverState.pinned) return; // pinned popover stays put
    if (window._chordDragInProgress) return; // never show shape popover during a drag
    const occ = t.dataset.occ !== undefined ? parseInt(t.dataset.occ, 10) : null;
    clearTimeout(popoverTimer);
    popoverTimer = setTimeout(() => showPopover(t, t.dataset.chord, song, occ), 220);
  });
  rootEl.addEventListener("mouseout", e => {
    if (!e.target.closest("[data-chord]")) return;
    if (popoverState && popoverState.pinned) return; // pinned: don't auto-hide on mouseout
    clearTimeout(popoverTimer);
    popoverTimer = setTimeout(hidePopover, 200);
  });
  // Belt-and-braces: any dragstart on a chord pill should immediately hide an open popover.
  rootEl.addEventListener("dragstart", e => {
    if (!e.target.closest("[data-chord]")) return;
    clearTimeout(popoverTimer);
    hidePopover(true);
  }, true);
}

//=============================================================
// VOICING EDITOR  (add/edit a single voicing)
//=============================================================
// Two-button modal: "Change just this X chord" vs "Change all X chords in the song".
// done(scope) is called with "this" or "all" depending on which the user picked. Cancel = no save.
//   opts: { oldName, newName, count, renamed, canApplyToOne, done }
//   - renamed: chord name actually changed (e.g. Gm → G); affects copy
//   - canApplyToOne: whether the editor knows which specific occurrence the user opened
//                    (i.e. came from a chord pill, not from a global "+ Add voicing" entry)
function showScopeChoice(opts) {
  const { oldName, newName, count, renamed, canApplyToOne, done } = opts;
  const bg = document.createElement("div");
  bg.className = "modal-bg";
  bg.style.zIndex = "30";
  const title = renamed
    ? `Rename ${escapeHtml(oldName)} → ${escapeHtml(newName)}?`
    : `Change voicing of ${escapeHtml(oldName)}?`;
  const sub = `${count === 1 ? "There is 1 instance" : `There are ${count} instances`} of <b>[${escapeHtml(oldName)}]</b> in this song's lyrics.`;
  const justBtn = canApplyToOne ? `
    <button id="rc-just" style="padding:11px 14px; text-align:left; line-height:1.4;">
      <b>Just this ${escapeHtml(oldName)} chord</b><br>
      <span class="muted small">${renamed
        ? `Rename only this one [${escapeHtml(oldName)}] in the lyrics to [${escapeHtml(newName)}] and use this voicing here. Other ${escapeHtml(oldName)} chords stay as they are.`
        : `Use this voicing only at this spot. Other ${escapeHtml(oldName)} chords keep their previous voicing.`}</span>
    </button>` : "";
  const allCopy = renamed
    ? `Rename every [${escapeHtml(oldName)}] in the lyrics to [${escapeHtml(newName)}] and use this voicing for all of them.`
    : `Apply this voicing to every [${escapeHtml(oldName)}] in this song.`;
  bg.innerHTML = `
    <div class="modal" style="max-width:480px;">
      <h3>${title}</h3>
      <div class="modal-sub">${sub}</div>
      <div style="display:flex; flex-direction:column; gap:10px; margin-top:18px;">
        ${justBtn}
        <button id="rc-all" class="primary" style="padding:11px 14px; text-align:left; line-height:1.4;">
          <b>Change all ${escapeHtml(oldName)} chords in the song</b><br>
          <span style="opacity:.85;" class="small">${allCopy}</span>
        </button>
      </div>
      <div class="actions">
        <button id="rc-cancel" class="ghost">Cancel</button>
      </div>
    </div>
  `;
  document.body.appendChild(bg);
  bg.addEventListener("click", e => { if (e.target === bg) bg.remove(); });
  if (canApplyToOne) bg.querySelector("#rc-just").addEventListener("click", () => { bg.remove(); done("this"); });
  bg.querySelector("#rc-all").addEventListener("click", () => { bg.remove(); done("all"); });
  bg.querySelector("#rc-cancel").addEventListener("click", () => bg.remove());
}

function openVoicingEditor(chordName, song, editIndex, seedFromBuiltin, occ) {
  const isEdit = typeof editIndex === "number" && editIndex >= 0;
  const existing = isEdit ? song.voicings?.[chordName]?.[editIndex] : null;
  const seed = existing || seedFromBuiltin || null;
  // Did the user open this editor from a specific chord pill? (vs the global "+ Add voicing" path)
  const knowOcc = typeof occ === "number" && occ >= 0;
  const initFrets = seed?.frets ? fretsToString(seed.frets) : "";
  const initPiano = seed?.pianoNotes ? seed.pianoNotes.map(pc => pcToName(pc)).join(" ") : "";
  const initNote = seed?.note || "";

  // Show fields for instruments selected; if NEITHER is selected, show both (so user can still add).
  const wantGuitar = !!song?.instruments?.includes("guitar");
  const wantPiano  = !!song?.instruments?.includes("piano");
  const showGuitar = wantGuitar || (!wantGuitar && !wantPiano);
  const showPiano  = wantPiano  || (!wantGuitar && !wantPiano);

  const bg = document.createElement("div");
  bg.className = "modal-bg";
  bg.innerHTML = `
    <div class="modal" style="max-width:560px;">
      <h3>${isEdit ? "Edit voicing" : "Add voicing"} · <span id="ve-name">${escapeHtml(chordName)}</span></h3>
      <div class="modal-sub" id="ve-notes">${describeNotes(chordName)}</div>
      <div class="helper-msg" id="ve-detected" style="margin-bottom:10px;"></div>
      <div style="margin-bottom:14px;">
        <label>Chord name <span class="muted">(auto-detected from notes; type to override)</span></label>
        <input id="ve-chord-name" value="${escapeHtml(chordName)}" placeholder="e.g. Cmaj9" />
      </div>
      <div style="margin-bottom:14px;">
        <label>Voicing name <span class="muted">(optional, e.g. "Open shape", "Rootless RH", "Drop 2")</span></label>
        <input id="ve-voicing-name" value="${escapeHtml(seed?.name || "")}" placeholder="e.g. Open shape" />
      </div>

      <div class="modal-form stack">
        ${showGuitar ? `
          <div>
            <label>Guitar shape <span class="muted">(low-E to high-E; <code>x</code> = muted, <code>0</code> = open)</span></label>
            <input id="ve-frets" placeholder="x32010" value="${escapeHtml(initFrets)}" />
            <div class="helper-msg" id="ve-preview-guitar" style="text-align:center;"></div>
          </div>
        ` : ""}
        ${showPiano ? `
          <div>
            <label>Piano voicing <span class="muted">(click the keys you actually play)</span> <button type="button" id="ve-piano-clear" class="ghost" style="float:right; padding:0 8px; font-size:11px; text-transform:none; letter-spacing:0;">Clear all</button></label>
            <div id="ve-piano-kbd" style="text-align:center; padding:6px 0;"></div>
            <div class="helper-msg" id="ve-preview-piano" style="text-align:center;"></div>
          </div>
        ` : ""}
        <div>
          <label>Note for this voicing <span class="muted">(optional, e.g. "rootless RH; open G ringing")</span></label>
          <input id="ve-note" placeholder="" value="${escapeHtml(initNote)}" />
        </div>
      </div>

      <div class="actions">
        <button id="ve-cancel">Cancel</button>
        ${isEdit ? `<button id="ve-delete" class="danger">Delete</button>` : ""}
        <button id="ve-save" class="primary">${isEdit ? "Save" : "Add"}</button>
      </div>
    </div>
  `;
  document.body.appendChild(bg);
  bg.addEventListener("click", e => { if (e.target === bg) bg.remove(); });

  // Live previews + chord-name detection.
  let resolvedName = chordName;
  // Initial keyboard state. New voicings store positions (0-23). Legacy data may store pcs (<12) —
  // for those, stack ascending from root to get sensible positions in the F-to-E layout.
  let pianoPcs = [];
  if (seed?.pianoNotes && seed.pianoNotes.length) {
    const hasOctave = seed.pianoNotes.some(n => n >= 12);
    pianoPcs = hasOctave ? seed.pianoNotes.slice() : stackChordFromRoot(seed.pianoNotes, splitChord(chordName)?.root);
  }
  const fretsInput  = showGuitar ? bg.querySelector("#ve-frets") : null;
  const pianoMount  = showPiano  ? bg.querySelector("#ve-piano-kbd") : null;
  const previewG    = showGuitar ? bg.querySelector("#ve-preview-guitar") : null;
  const previewP    = showPiano  ? bg.querySelector("#ve-preview-piano")  : null;
  const detectedEl  = bg.querySelector("#ve-detected");
  const nameEl      = bg.querySelector("#ve-name");
  const notesEl     = bg.querySelector("#ve-notes");

  // If we have a piano mount, build the clickable keyboard (root highlighted from chord name)
  let clickPiano = null;
  if (pianoMount) {
    const initialRoot = splitChord(chordName)?.root;
    clickPiano = buildClickablePianoKeyboard(pianoPcs, positions => { pianoPcs = positions; updateAll(); }, initialRoot);
    pianoMount.appendChild(clickPiano);
    const clearBtn = bg.querySelector("#ve-piano-clear");
    if (clearBtn) clearBtn.addEventListener("click", () => {
      pianoPcs = [];
      clickPiano.setSelectedPositions([]);
      updateAll();
    });
  }

  function fretsToPcs(frets) {
    const open = [4, 9, 2, 7, 11, 4]; // E A D G B e — open-string pitch classes
    const pcs = [];
    for (let i = 0; i < 6; i++) {
      const f = frets[i];
      if (f >= 0) pcs.push((open[i] + f) % 12);
    }
    return pcs;
  }
  function updateAll() {
    let allPcs = [];
    if (showGuitar && fretsInput) {
      const frets = stringToFrets(fretsInput.value.trim());
      if (frets) {
        previewG.innerHTML = svgGuitar(chordName, { frets }, "sm");
        previewG.className = "helper-msg";
        allPcs = allPcs.concat(fretsToPcs(frets));
      } else {
        previewG.textContent = fretsInput.value.trim() ? "Invalid shape — use 6 chars: digits or x. Example: x32010" : "";
        previewG.className = "helper-msg err";
      }
    }
    if (showPiano && previewP) {
      if (pianoPcs.length) {
        // Positions are F-to-E indices (0-23) — convert via fePcOfPosition, NOT plain mod 12.
        const pcsForLabel = pianoPcs.map(p => fePcOfPosition(p));
        previewP.textContent = "Notes: " + pcsForLabel.map(pc => pcToName(pc)).join("  ·  ");
        previewP.className = "helper-msg";
        allPcs = allPcs.concat(pcsForLabel);
      } else {
        previewP.textContent = "Click keys above to build a voicing.";
        previewP.className = "helper-msg";
      }
    }
    // Detect chord name from combined input — auto-fills the name field unless user has typed.
    // Anchor on the current chord's root if known, so e.g. {D, G#, A} is parsed as D-rooted.
    // Preserve the original chord name's accidental: if the song has [Bb7], new voicings stay Bb (not A#).
    const currentNameForRoot = bg.querySelector("#ve-chord-name").value || chordName;
    const knownRoot = splitChord(currentNameForRoot)?.root;
    const preferFlat = /b/.test(chordName.split("/")[0]);
    const detected = chordNameFromPcs(allPcs, knownRoot, preferFlat);
    const nameInput = bg.querySelector("#ve-chord-name");
    if (detected && !nameInput.dataset.userEdited) {
      nameInput.value = detected;
    }
    if (detected && detected !== chordName) {
      detectedEl.innerHTML = `These notes look like <b>${escapeHtml(detected)}</b> — saving will rename the chord (or override the name above).`;
      detectedEl.className = "helper-msg ok";
    } else if (allPcs.length && !detected) {
      detectedEl.innerHTML = `Couldn't auto-identify a chord — type a custom name above.`;
      detectedEl.className = "helper-msg";
    } else {
      detectedEl.textContent = "";
      detectedEl.className = "helper-msg";
    }
    nameEl.textContent = nameInput.value || chordName;
    notesEl.textContent = describeNotes(nameInput.value || chordName);
    resolvedName = nameInput.value || chordName;
  }
  fretsInput?.addEventListener("input", updateAll);
  bg.querySelector("#ve-chord-name").addEventListener("input", e => {
    e.target.dataset.userEdited = "1";
    // When user types a recognized chord name, sync the keyboard to that chord's notes
    // so they get a fresh starting point for the new chord they want to voice.
    const newName = e.target.value.trim();
    const parsed = splitChord(newName);
    if (parsed && clickPiano) {
      const ivs = qualityToIntervals(parsed.quality);
      const pcs = ivs.map(i => (parsed.root + i) % 12);
      const positions = stackChordFromRoot(pcs, parsed.root);
      pianoPcs = positions;
      clickPiano.setSelectedPositions(positions);
      clickPiano.setRootPc(parsed.root);
    }
    updateAll();
  });
  updateAll();

  bg.querySelector("#ve-cancel").addEventListener("click", () => bg.remove());
  bg.querySelector("#ve-save").addEventListener("click", () => {
    const voicing = {
      note: bg.querySelector("#ve-note").value.trim(),
      name: (bg.querySelector("#ve-voicing-name")?.value || "").trim(),
    };
    if (showGuitar && fretsInput && fretsInput.value.trim()) {
      const frets = stringToFrets(fretsInput.value.trim());
      if (!frets) { alert("Invalid guitar shape — use 6 characters (digits or 'x'). Example: x32010"); return; }
      voicing.frets = frets;
    }
    if (showPiano && pianoPcs.length) {
      voicing.pianoNotes = pianoPcs.slice();
    }
    if (!voicing.frets && !voicing.pianoNotes) {
      alert("Add at least a guitar shape or piano notes."); return;
    }
    // Use whatever the chord-name input currently has (auto-detected OR user-overridden).
    const inputName = bg.querySelector("#ve-chord-name").value.trim();
    const targetName = inputName || chordName;
    const renamed = targetName !== chordName;

    const escName = chordName.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const occRe = new RegExp("\\[" + escName + "\\]", "g");
    const totalOccs = ((song.lyrics || "").match(occRe) || []).length;

    // Finalize the save under a chosen scope. "this" → rename ONLY this Nth instance + per-position voicing.
    // "all" (or no occ context) → rename every [oldName] globally + global voicing.
    const doSave = (scope) => {
      pushUndo(song);
      song.positionVoicings = song.positionVoicings || {};
      const isThisScope = scope === "this" && knowOcc;

      // RENAME — scope-aware
      if (renamed && totalOccs > 0) {
        if (isThisScope) {
          // Only this single occurrence in the lyrics
          song.lyrics = replaceNthChord(song.lyrics, chordName, occ, targetName);
        } else {
          // Every [oldName] in the lyrics
          song.lyrics = (song.lyrics || "").replace(occRe, "[" + targetName + "]");
          // Migrate per-occurrence override keys from OLD name to NEW name (positions unchanged)
          for (const k of Object.keys(song.positionVoicings)) {
            if (k.startsWith(chordName + "@")) {
              const suffix = k.slice(chordName.length);
              song.positionVoicings[targetName + suffix] = song.positionVoicings[k];
              delete song.positionVoicings[k];
            }
          }
          // Drop the edited user voicing from the OLD name (it moves under targetName via saveVoicing below)
          if (isEdit) deleteVoicing(song, chordName, editIndex);
        }
      }

      // VOICING SCOPE
      if (isThisScope) {
        song.positionVoicings[targetName + "@" + occ] = voicing;
      } else {
        saveVoicing(song, targetName, voicing, isEdit && !renamed ? editIndex : undefined);
        if (knowOcc) {
          delete song.positionVoicings[targetName + "@" + occ];
        }
      }
      song.updatedAt = now();
      saveState({ songs: state.songs });
      bg.remove();
      if (state.selectedId === song.id) renderDetail();
    };

    // Only ASK when there's a real choice — i.e. the user came from a specific chord pill
    // AND the chord has multiple instances. Otherwise just apply globally:
    //   - rename + no occ context → always rename in lyrics + save voicing under new name
    //   - rename + only 1 instance → no real choice, do "all" (which renames that single instance)
    //   - phrasing change without occ context or single instance → just save globally
    const askForScope = knowOcc && totalOccs > 1;
    if (askForScope) {
      showScopeChoice({
        oldName: chordName,
        newName: targetName,
        count: totalOccs,
        renamed,
        canApplyToOne: knowOcc,
        done: doSave,
      });
      return;
    }
    doSave("all");
  });
  if (isEdit) {
    bg.querySelector("#ve-delete").addEventListener("click", () => {
      if (!confirm(`Delete this voicing of ${chordName}?`)) return;
      deleteVoicing(song, chordName, editIndex);
      saveState({ songs: state.songs });
      bg.remove();
    });
  }
}

//=============================================================
// CHORD MODAL (click) — manage all voicings for a chord
//=============================================================
function openChordModal(chordName, song, occ) {
  hidePopover();
  // Chord modal manages YOUR saved voicings only — auto/built-in suggestions only appear in the hover popover
  // (where they're labeled "Standard"). Showing them here was confusing because there's nothing to delete.
  const userVoicings = (song.voicings && song.voicings[chordName]) || [];
  const voicings = userVoicings.map(v => Object.assign({ builtIn: false }, v));
  const knowOcc = typeof occ === "number" && occ >= 0;

  const bg = document.createElement("div");
  bg.className = "modal-bg chord-modal";
  bg.innerHTML = `
    <div class="modal" role="dialog" aria-modal="true" style="max-width:680px;">
      <h3>${escapeHtml(chordName)}</h3>
      <div class="modal-sub">${describeNotes(chordName)}</div>

      ${(!song?.instruments?.length || song.instruments.includes("piano")) ? `
        <div class="diag-card" style="margin-top:12px;">
          <h4>Piano (suggested)</h4>
          <div class="canvas">${svgPiano(chordName)}</div>
        </div>
      ` : ""}

      <div style="display:flex; align-items:center; justify-content:space-between; margin: 18px 0 10px;">
        <h4 style="margin:0; font-size:11px; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; font-weight:600;">Voicings</h4>
        <button id="cm-add" class="primary" style="font-size:13px; padding:5px 12px;">+ Add voicing</button>
      </div>
      ${voicings.length === 0 ? `
        <div class="muted small" style="text-align:center; padding:24px 0; background:var(--panel-2); border-radius:var(--radius);">
          No voicings saved for ${escapeHtml(chordName)}.<br>
          <span class="micro">Click <b>+ Add voicing</b> to save a custom shape.</span>
        </div>
      ` : `
        <div id="cm-voicings" class="diag-grid" style="grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));">
          ${voicings.map((v, i) => {
            // Honor song instruments — but if the voicing has data only for the OTHER instrument,
            // still show it (otherwise the card is mysteriously empty).
            const sel = song?.instruments?.length ? song.instruments : ["guitar", "piano"];
            const hasFrets = v.frets && v.frets.length;
            const hasPiano = v.pianoNotes && v.pianoNotes.length;
            const showFrets = hasFrets && (sel.includes("guitar") || !hasPiano);
            const showPiano = hasPiano && (sel.includes("piano")  || !hasFrets);
            return `
            <div class="diag-card" data-vidx="${i}" data-builtin="${v.builtIn}">
              <h4>${v.name ? escapeHtml(v.name) : "Voicing " + (i + 1)}</h4>
              <div class="canvas">
                ${showFrets ? svgGuitar(chordName, { frets: v.frets, fingers: v.fingers, barre: v.barre }, "md") : ""}
                ${showPiano ? `<div style="margin-top:6px;">${svgPianoFromPcs(v.pianoNotes, splitChord(chordName)?.root, undefined, "md")}</div>` : ""}
                ${!hasFrets && !hasPiano ? `<div class="muted small" style="text-align:center;">(this voicing has no notes saved — click <b>Edit</b> to add some)</div>` : ""}
              </div>
              ${showFrets ? `<div class="meta">${fretsToString(v.frets)}</div>` : ""}
              ${v.note ? `<div class="meta" style="margin-top:6px; color:var(--ink-soft); font-family:var(--sans); font-size:12px;">${escapeHtml(v.note)}</div>` : ""}
              ${!v.builtIn ? `
                <div style="display:flex; gap:4px; justify-content:center; margin-top:8px;">
                  <button class="ghost" data-vaction="edit" style="font-size:11.5px; padding:3px 8px;">Edit</button>
                  <button class="danger" data-vaction="delete" style="font-size:11.5px; padding:3px 8px;">Delete</button>
                </div>
              ` : ""}
            </div>
          `;}).join("")}
        </div>
      `}

      <div class="actions">
        <button id="cm-close">Close</button>
      </div>
    </div>
  `;
  document.body.appendChild(bg);
  bg.addEventListener("click", e => { if (e.target === bg) bg.remove(); });
  bg.querySelector("#cm-close").addEventListener("click", () => bg.remove());
  bg.querySelector("#cm-add").addEventListener("click", () => {
    bg.remove();
    openVoicingEditor(chordName, song, null, null, knowOcc ? occ : undefined);
  });
  bg.querySelectorAll("[data-vaction]").forEach(btn => {
    btn.addEventListener("click", e => {
      const card = e.currentTarget.closest("[data-vidx]");
      const i = parseInt(card.dataset.vidx);
      const v = voicings[i];
      const userIdx = getUserVoicingIndex(song, chordName, v);
      const action = e.currentTarget.dataset.vaction;
      if (action === "edit") {
        bg.remove();
        openVoicingEditor(chordName, song, userIdx, null, knowOcc ? occ : undefined);
      } else if (action === "delete") {
        if (confirm(`Delete this voicing of ${chordName}?`)) {
          deleteVoicing(song, chordName, userIdx);
          saveState({ songs: state.songs });
          bg.remove();
          openChordModal(chordName, song, knowOcc ? occ : null);
        }
      }
    });
  });
}
function fretsToString(frets) {
  return frets.map(f => f === -1 ? "x" : String(f)).join("");
}
function stringToFrets(s) {
  if (!s) return null;
  const cleaned = s.toLowerCase().replace(/\s+/g, "");
  if (cleaned.length === 6 && /^[x0-9]{6}$/.test(cleaned)) {
    return [...cleaned].map(c => c === "x" ? -1 : parseInt(c));
  }
  const parts = s.toLowerCase().split(/\s+/).filter(Boolean);
  if (parts.length === 6 && parts.every(p => p === "x" || /^\d+$/.test(p))) {
    return parts.map(p => p === "x" ? -1 : parseInt(p));
  }
  return null;
}
function describeNotes(chordName) {
  const c = splitChord(chordName);
  if (!c) return "—";
  const notes = chordNotes(c);
  const usesFlat = /b/.test(c.rootStr);
  return notes.map(n => pcToName(n.pc, usesFlat) + (n.isRoot ? " (root)" : "") + (n.isBass ? " (bass)" : "")).join("  ·  ");
}

//=============================================================
// IMPORT / EXPORT
//=============================================================
function exportJson() {
  const blob = new Blob([JSON.stringify({ version: SCHEMA_VERSION, exportedAt: new Date().toISOString(), songs: state.songs }, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "chord-archive.json";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function importJsonFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data.songs)) throw new Error("No songs array in JSON");
      if (!confirm(`Import ${data.songs.length} song(s)? This will merge with your existing collection.`)) return;
      const map = new Map(state.songs.map(s => [s.id, s]));
      for (const s of data.songs) {
        const existing = map.get(s.id);
        if (!existing || (s.updatedAt || 0) > (existing.updatedAt || 0)) map.set(s.id, s);
      }
      state.songs = [...map.values()];
      saveState({ songs: state.songs });
      renderList(); renderDetail();
    } catch (e) { alert("Import failed: " + e.message); }
  };
  reader.readAsText(file);
}

//=============================================================
// INIT
//=============================================================
// Build a draft song from an extension/bookmarklet payload {title, artist, lyrics, sourceUrl, key?}.
// Always runs the chord-sheet parser — handles inline ChordPro, chord-line-above-lyrics, and ChordPro directives.
function importSongFromPayload(payload) {
  const parsed = parseChordSheet(payload.lyrics || "");
  let key = payload.key || parsed.key || "";
  if (!key) {
    const chords = extractChords(parsed.lyrics || payload.lyrics || "");
    const detected = detectKey(chords);
    if (detected) key = detected;
  }
  return Object.assign(blankSong(), {
    title: cleanScrapedTitle(payload.title || parsed.title || ""),
    artist: cleanScrapedTitle(payload.artist || parsed.artist || ""),
    key,
    lyrics: parsed.lyrics || payload.lyrics || "",
    sourceUrl: payload.sourceUrl || "",
  });
}

function consumeImportHash() {
  const h = location.hash;
  if (!h.startsWith("#new=")) return null;
  try {
    const raw = decodeURIComponent(escape(atob(h.slice(5))));
    const payload = JSON.parse(raw);
    const song = importSongFromPayload(payload);
    // Clear the hash so reload doesn't double-create
    history.replaceState(null, "", location.pathname + location.search);
    return song;
  } catch (e) {
    console.warn("Failed to parse #new= payload:", e);
    return null;
  }
}

async function init() {
  // Show the app version in the brand
  const v = document.getElementById("brand-version");
  if (v) v.textContent = "v" + APP_VERSION;

  // Global Escape: close the topmost modal (or pinned popover) so users aren't trapped.
  document.addEventListener("keydown", e => {
    if (e.key !== "Escape") return;
    // 1. Pinned popover takes priority (no other modal logic to interfere with).
    if (popoverState && popoverState.pinned) { hidePopover(true); return; }
    // 2. Close topmost modal-bg (chord modal, voicing editor, scope choice, etc.)
    const modals = [...document.querySelectorAll(".modal-bg")];
    if (modals.length) { modals[modals.length - 1].remove(); return; }
    // 3. Otherwise drop transient popover
    if (popoverState) hidePopover(true);
  });

  const persisted = loadState();
  state.songs = persisted.songs || [];
  if (state.songs.length === 0) {
    const seed = await fetchSeed();
    if (seed && Array.isArray(seed.songs)) {
      state.songs = seed.songs;
      saveState({ songs: state.songs });
    }
  }

  // Initialize Supabase auth — this'll fire onSignIn/onSignOut once the session is restored.
  initAuth();
  renderAuthArea();

  // Direct-import from extension/bookmarklet via URL hash
  const imported = consumeImportHash();
  if (imported) {
    state.editing = imported;  // open editor with pre-filled values
  }

  // In-tab import from the browser extension. Preferred over opening a new chordpad
  // tab — two tabs sharing one Supabase session can wedge each other's SDK (the
  // newer tab's auth.client gets stuck with every method hung indefinitely, even
  // though the network and auth token are fine). The extension dispatches this
  // event into an already-open chordpad tab via chrome.scripting.executeScript.
  window.addEventListener("chordpad:import", e => {
    if (!e || !e.detail) return;
    try {
      const song = importSongFromPayload(e.detail);
      state.editing = song;
      renderDetail();
    } catch (err) {
      console.warn("chordpad:import failed:", err);
    }
  });

  document.getElementById("btn-new").addEventListener("click", () => {
    state.editing = "new"; renderDetail();
  });
  document.getElementById("btn-practice").addEventListener("click", () => openPracticeMode());

  // Header URL import — fetch via proxy, fall back to bookmarklet on CF block
  async function headerImportUrl() {
    const url = document.getElementById("header-url").value.trim();
    if (!url) return;
    const btn = document.getElementById("header-fetch");
    const orig = btn.textContent;
    btn.disabled = true; btn.textContent = "Fetching…";
    try {
      const result = await importFromUrl(url);
      // Build a draft song and open the editor
      const parsed = parseChordSheet(result.lyrics || "");
      const chords = extractChords(parsed.lyrics || "");
      const detected = detectKey(chords);
      const draft = Object.assign(blankSong(), {
        title: cleanScrapedTitle(result.title || parsed.title || ""),
        artist: cleanScrapedTitle(result.artist || parsed.artist || ""),
        key: parsed.key || detected || "",
        lyrics: parsed.lyrics || "",
        sourceUrl: url,
      });
      state.editing = draft;
      document.getElementById("header-url").value = "";
      renderDetail();
    } catch (e) {
      openImportFailedModal(url, e.message);
    } finally {
      btn.disabled = false; btn.textContent = orig;
    }
  }
  document.getElementById("header-fetch").addEventListener("click", headerImportUrl);
  document.getElementById("header-url").addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); headerImportUrl(); }
  });

  // Kebab menu replaced by user-menu Settings (see openSettingsModal).
  // We keep the hidden file input wired so Import-from-file still works.
  document.getElementById("import-file").addEventListener("change", e => {
    const f = e.target.files[0]; if (f) importJsonFile(f); e.target.value = "";
  });
  document.getElementById("search").addEventListener("input", e => { state.search = e.target.value; renderList(); });
  document.getElementById("filter-instrument").addEventListener("change", e => { state.filterInstrument = e.target.value; renderList(); });
  document.getElementById("sort").addEventListener("change", e => { state.sort = e.target.value; renderList(); });
  renderList();
  renderDetail();
}
init();
</script>
