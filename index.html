  });
  // Reset to original key
  el.querySelectorAll(".transpose-btn[data-reset]").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const semis = semitonesToOriginalKey(song);
      if (semis === 0) return;
      pushUndo(song);
      transposeSong(song, semis);
      saveState({ songs: state.songs });
      renderDetail();
    });
  });
  document.getElementById("btn-duplicate").addEventListener("click", () => duplicateSong(song));
  document.getElementById("btn-delete").addEventListener("click", () => deleteSong(song));
  el.querySelectorAll("[data-chord]").forEach(c => {
    c.addEventListener("click", e => {
      // A drag just finished — swallow the click so we don't pop the phrasing modal.
      if (window._chordDragInProgress) {
        e.preventDefault(); e.stopPropagation();
        return;
      }
      const t = e.currentTarget;
      const occ = t.dataset.occ !== undefined ? parseInt(t.dataset.occ, 10) : null;
      openChordModal(t.dataset.chord, song, isNaN(occ) ? null : occ);
    });
  });
  attachHoverPopover(el, song);
  attachLyricsDragDrop(el, song);
}

// === Drag-and-drop chord re-anchoring on the songsheet ===
// User can drag any chord pill to a different position in the lyrics. The drop point's
// caret position (text node + offset) is mapped back to a character index inside the
// raw lyrics line, and the [Chord] marker is moved there.
function attachLyricsDragDrop(detailEl, song) {
  const lyricsEl = detailEl.querySelector("#lyrics-view");
  if (!lyricsEl) return;
  // Make every chord pill draggable
  lyricsEl.querySelectorAll(".chord, .chord-pill-inline").forEach(pill => {
    pill.draggable = true;
    pill.addEventListener("dragstart", e => {
      const lineEl = pill.closest(".lyric-line");
      if (!lineEl) return;
      const sourceLineIdx = parseInt(lineEl.dataset.lineIdx, 10);
      const sourcePillIdx = parseInt(pill.dataset.pillIdx, 10);
      e.dataTransfer.setData("application/x-chordpad-chord", JSON.stringify({
        chord: pill.dataset.chord,
        sourceLineIdx, sourcePillIdx,
      }));
      e.dataTransfer.effectAllowed = "move";
      // Module-level flag tells the chord-click handler to swallow the next click
      // (which fires on the source pill once drag completes in some browsers).
      window._chordDragInProgress = true;
      // Slight delay so the snapshot includes the pill before we hide it
      setTimeout(() => pill.classList.add("dragging"), 0);
    });
    pill.addEventListener("dragend", () => {
      pill.classList.remove("dragging");
      // Keep the flag set briefly so any straggler "click" event after dragend gets eaten.
      setTimeout(() => { window._chordDragInProgress = false; }, 80);
    });
  });
  // Hover feedback + drop handling on the lyrics container
  let lastHover = null;
  function clearHover() {
    if (lastHover) lastHover.classList.remove("drop-target");
    lastHover = null;
  }
  // Visual drop indicator — a thin vertical line that follows the caret position
  // during dragover so the user sees exactly where the chord will land.
  let dropIndicator = null;
  function showDropIndicator(x, lineEl) {
    if (!dropIndicator) {
      dropIndicator = document.createElement("div");
      dropIndicator.className = "chord-drop-indicator";
      lyricsEl.appendChild(dropIndicator);
    }
    const lineRect = lineEl.getBoundingClientRect();
    const lyricsRect = lyricsEl.getBoundingClientRect();
    dropIndicator.style.left = (x - lyricsRect.left) + "px";
    dropIndicator.style.top  = (lineRect.top - lyricsRect.top + 4) + "px";
    dropIndicator.style.height = (lineRect.height - 8) + "px";
    dropIndicator.style.display = "block";
  }
  function hideDropIndicator() {
    if (dropIndicator) dropIndicator.style.display = "none";
  }

  lyricsEl.addEventListener("dragover", e => {
    if (![...e.dataTransfer.types].includes("application/x-chordpad-chord")) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    const targetLine = lineFromPoint(e.clientX, e.clientY);
    if (targetLine !== lastHover) {
      clearHover();
      if (targetLine) { targetLine.classList.add("drop-target"); lastHover = targetLine; }
    }
    if (targetLine) showDropIndicator(e.clientX, targetLine);
    else hideDropIndicator();
  });
  lyricsEl.addEventListener("dragleave", e => {
    if (!e.relatedTarget || !lyricsEl.contains(e.relatedTarget)) {
      clearHover();
      hideDropIndicator();
    }
  });
  lyricsEl.addEventListener("drop", e => {
    clearHover();
    hideDropIndicator();
    const raw = e.dataTransfer.getData("application/x-chordpad-chord");
    if (!raw) return;
    e.preventDefault();
    let payload;
    try { payload = JSON.parse(raw); } catch (err) { return; }
    const targetLineEl = lineFromPoint(e.clientX, e.clientY);
    if (!targetLineEl) return;
    const targetLineIdx = parseInt(targetLineEl.dataset.lineIdx, 10);
    if (isNaN(targetLineIdx)) return;
    // Pure caret-position-based drop. No "swap with neighbor" heuristic — the chord
    // lands exactly at the character closest to where the user dropped it.
    const targetCharIdx = textOffsetInLineFromPoint(targetLineEl, e.clientX, e.clientY);
    moveChordInLyrics(song, payload, targetLineIdx, { textOffset: targetCharIdx });
  });

  function lineFromPoint(x, y) {
    const el = document.elementFromPoint(x, y);
    if (!el) return null;
    return el.closest(".lyric-line");
  }
  // Walk the line's text content (excluding chord pill text & rn-tags) to compute
  // a char index that lines up with the raw lyrics line minus its chord markers.
  function textOffsetInLineFromPoint(lineEl, x, y) {
    let range = null;
    if (document.caretRangeFromPoint) range = document.caretRangeFromPoint(x, y);
    else if (document.caretPositionFromPoint) {
      const p = document.caretPositionFromPoint(x, y);
      if (p) { range = document.createRange(); range.setStart(p.offsetNode, p.offset); range.setEnd(p.offsetNode, p.offset); }
    }
    let dropNode = range ? range.startContainer : null;
    let dropOffset = range ? range.startOffset : 0;
    // If the drop landed on a chord pill, snap to its host seg's text start.
    if (dropNode && dropNode.nodeType !== Node.TEXT_NODE) {
      // try to find the next text node
      const tn = firstTextNodeIn(dropNode);
      if (tn) { dropNode = tn; dropOffset = 0; }
    }
    // Walk the line's text nodes in order, summing char counts of "lyric" text only
    // (skipping chord pill labels and rn-tags). When we hit dropNode, add dropOffset.
    let acc = 0;
    let found = false;
    function walk(node) {
      if (found) return;
      if (node.nodeType === Node.TEXT_NODE) {
        const inChord = !!node.parentElement?.closest(".chord, .chord-pill-inline, .rn-tag, .chord-rep, .lyric-dot, .section-label");
        if (node === dropNode) {
          if (!inChord) acc += dropOffset;
          found = true; return;
        }
        if (!inChord) acc += node.nodeValue.length;
      } else {
        for (const c of node.childNodes) { walk(c); if (found) return; }
      }
    }
    walk(lineEl);
    return acc;
  }
  function firstTextNodeIn(node) {
    if (node.nodeType === Node.TEXT_NODE) return node;
    for (const c of node.childNodes) {
      const r = firstTextNodeIn(c);
      if (r) return r;
    }
    return null;
  }
}

// Mutate song.lyrics to move a chord marker. payload identifies the source
// (line idx + which pill in that line); slot is one of:
//   { textOffset: N }            — split a text token at character N
//   { beforeChordPillIdx: K }    — insert immediately before the K-th chord pill in target line
//                                  (used so dropping ON the LEFT half of an existing pill puts the
//                                  new chord BEFORE that pill — fixes the "can only move right" bug)
function moveChordInLyrics(song, payload, targetLineIdx, slot) {
  // Back-compat: accept a bare number as textOffset.
  if (typeof slot === "number") slot = { textOffset: slot };
  const rawLines = (song.lyrics || "").replace(/\r\n/g, "\n").split("\n");
  if (payload.sourceLineIdx < 0 || payload.sourceLineIdx >= rawLines.length) return;
  if (targetLineIdx < 0 || targetLineIdx >= rawLines.length) return;

  // Tokenize a line into chord and text pieces, in order.
  function tokenize(line) {
    const tokens = [];
    const re = /\[([^\]]+)\]|([^\[]+)/g;
    let m;
    while ((m = re.exec(line)) !== null) {
      if (m[1] !== undefined) tokens.push({ kind: "chord", name: m[1] });
      else tokens.push({ kind: "text", str: m[2] });
    }
    return tokens;
  }
  function serialize(tokens) {
    return tokens.map(t => t.kind === "chord" ? "[" + t.name + "]" : t.str).join("");
  }
  function findKthChordTokenIdx(tokens, k) {
    let chordCounter = 0;
    for (let i = 0; i < tokens.length; i++) {
      if (tokens[i].kind === "chord") {
        if (chordCounter === k) return i;
        chordCounter++;
      }
    }
    return -1;
  }

  // ---- Remove source chord ----
  const srcTokens = tokenize(rawLines[payload.sourceLineIdx]);
  const srcChordTokenIdx = findKthChordTokenIdx(srcTokens, payload.sourcePillIdx);
  if (srcChordTokenIdx === -1) return;
  const sourceIsTarget = payload.sourceLineIdx === targetLineIdx;
  // For same-line moves, when slot is "before pill K" and source pill IS K, that's a no-op.
  if (sourceIsTarget && slot.beforeChordPillIdx === payload.sourcePillIdx) return;
  srcTokens.splice(srcChordTokenIdx, 1);

  // ---- Build target tokens ----
  let tgtTokens = sourceIsTarget ? srcTokens : tokenize(rawLines[targetLineIdx]);

  if (slot.beforeChordPillIdx !== undefined) {
    // For same-line moves: if the source pill (now removed) had a smaller idx than the
    // target pill, the target pill's index has shifted down by 1.
    let pillIdx = slot.beforeChordPillIdx;
    if (sourceIsTarget && payload.sourcePillIdx < slot.beforeChordPillIdx) pillIdx -= 1;
    let insertAt = findKthChordTokenIdx(tgtTokens, pillIdx);
    if (insertAt === -1) {
      // Couldn't find the pill (e.g. it was the only one and we just removed it) — fallback to start.
      insertAt = 0;
    }
    tgtTokens.splice(insertAt, 0, { kind: "chord", name: payload.chord });
  } else {
    // textOffset path: walk text tokens until we've consumed `targetTextOffset` characters.
    // Snap the requested offset away from existing chord anchors so dragging left can't
    // collide with another chord (which used to render as [A][B] looking like a swap).
    let target = slot.textOffset || 0;
    const occupied = new Set();
    {
      let acc = 0;
      for (const t of tgtTokens) {
        if (t.kind === "chord") occupied.add(acc);
        else acc += t.str.length;
      }
      const totalLen = acc;
      // If our target lands on an occupied anchor, push forward until it doesn't
      // (or back, if we're at the end). Each snap moves by 1 character.
      if (occupied.has(target)) {
        let fwd = target;
        while (fwd <= totalLen && occupied.has(fwd)) fwd++;
        let back = target;
        while (back >= 0 && occupied.has(back)) back--;
        // Pick the closer of (fwd, back). Prefer forward (more natural for drag-left).
        const dFwd = fwd - target;
        const dBack = target - back;
        target = (dBack < dFwd && back >= 0 && !occupied.has(back)) ? back : fwd;
        if (target > totalLen) target = totalLen;
      }
    }
    let remaining = target;
    let inserted = false;
    for (let i = 0; i < tgtTokens.length && !inserted; i++) {
      const t = tgtTokens[i];
      if (t.kind !== "text") continue;
      if (remaining <= t.str.length) {
        const left = t.str.slice(0, remaining);
        const right = t.str.slice(remaining);
        const replacement = [];
        if (left) replacement.push({ kind: "text", str: left });
        replacement.push({ kind: "chord", name: payload.chord });
        if (right) replacement.push({ kind: "text", str: right });
        tgtTokens.splice(i, 1, ...replacement);
        inserted = true;
      } else {
        remaining -= t.str.length;
      }
    }
    if (!inserted) tgtTokens.push({ kind: "chord", name: payload.chord });
  }

  // ---- Write back ----
  if (sourceIsTarget) {
    rawLines[targetLineIdx] = serialize(tgtTokens);
  } else {
    rawLines[payload.sourceLineIdx] = serialize(srcTokens);
    rawLines[targetLineIdx] = serialize(tgtTokens);
  }
  pushUndo(song);
  song.lyrics = rawLines.join("\n");
  song.updatedAt = Date.now();
  saveState({ songs: state.songs });
  renderDetail();
}

function renderEditor(el) {
  // "new" string OR an unsaved draft object (e.g. from #new= hash) both render as fresh
  const isImported = state.editing && typeof state.editing === "object" && !state.songs.find(s => s.id === state.editing.id);
  const isNew = state.editing === "new" || isImported;
  const song = state.editing === "new" ? blankSong() : Object.assign({}, state.editing);
  el.innerHTML = `
    <div class="detail-head">
      <div class="title-block">
        <div class="artist">${isImported ? "IMPORTED · REVIEW &amp; SAVE" : isNew ? "NEW SONG" : "EDITING"}</div>
        <h1>${isImported ? escapeHtml(song.title || "Imported song") : isNew ? "Add a song" : escapeHtml(song.title || "Untitled")}</h1>
      </div>
      <div class="detail-actions">
        <button id="btn-cancel" class="ghost">Cancel</button>
        <button id="btn-save" class="primary">Save</button>
      </div>
    </div>

    <div class="editor-grid">
      <div>
        <label>Artist</label>
        <input id="f-artist" value="${escapeHtml(song.artist || "")}" placeholder="e.g. Radiohead" />
      </div>
      <div>
        <label>Title <button type="button" id="t-swap" class="ghost" style="float:right; padding:0 6px; font-size:11px; text-transform:none; letter-spacing:0;" title="Swap artist and title">⇄ swap</button></label>
        <input id="f-title" value="${escapeHtml(song.title || "")}" placeholder="e.g. Sail to the Moon" />
      </div>
      <div class="full">
        <label>Instruments</label>
        <div class="instrument-toggles">
          <label class="pill-btn ${song.instruments?.includes("guitar") ? "on" : ""}" data-tg="guitar">
            <input type="checkbox" id="f-i-guitar" ${song.instruments?.includes("guitar") ? "checked" : ""} /> Guitar
          </label>
          <label class="pill-btn ${song.instruments?.includes("piano") ? "on" : ""}" data-tg="piano">
            <input type="checkbox" id="f-i-piano" ${song.instruments?.includes("piano") ? "checked" : ""} /> Piano
          </label>
        </div>
      </div>

      <div class="full">
        <label>Lyrics &amp; Chords <span class="muted" style="text-transform:none; letter-spacing:0; font-weight:400;">— chord names go on the line above the lyric, aligned to the word where the chord changes</span></label>
        <textarea id="f-lyrics" rows="14" placeholder="[Verse 1]
   F          Am          F          Am
I sucked the moon...I spoke too soon

Section labels go in [brackets]. Use the monospace font — chord positions align to the lyrics below.">${escapeHtml(chordProToChordSheet(song.lyrics || ""))}</textarea>
        <div class="editor-tools">
          <button id="t-tidy" type="button">Tidy &amp; align ↻</button>
          <button id="t-strip-tabs" type="button" class="prominent" title="Remove tablature lines (e|---0---0---|)">🗑 Remove tablature</button>
          <button id="t-fill-meta" type="button">Autofill metadata</button>
          <button id="t-fill-lyrics" type="button">Autofill lyrics</button>
        </div>
        <div class="helper-msg" id="helper"></div>
      </div>

      <!-- Footer fields — key, capo (guitar-only), source URL -->
      <div>
        <label>Key <button type="button" id="t-detect-key" class="ghost" style="float:right; padding:0 6px; font-size:11px; text-transform:none; letter-spacing:0;">auto-detect ↻</button></label>
        <input id="f-key" value="${escapeHtml(song.key || "")}" placeholder="e.g. G, Em, F#m" />
      </div>
      <div id="f-capo-row" style="${song.instruments?.includes("guitar") ? "" : "display:none;"}">
        <label>Capo</label>
        <input id="f-capo" type="number" min="0" max="12" value="${song.capo ?? ""}" placeholder="0" style="max-width: 100px;" />
      </div>
      <div class="full">
        <label>Source URL</label>
        <input id="f-source" value="${escapeHtml(song.sourceUrl || "")}" placeholder="https://… (where you originally found it)" />
      </div>
    </div>
  `;

  document.getElementById("btn-cancel").addEventListener("click", () => {
    state.editing = false; renderDetail();
  });
  document.getElementById("btn-save").addEventListener("click", () => saveEdit(isNew, song));

  document.getElementById("t-tidy").addEventListener("click", () => {
    const ta = document.getElementById("f-lyrics");
    // Round-trip through parseChordSheet → chordProToChordSheet to clean up alignment
    const parsed = parseChordSheet(ta.value);
    ta.value = chordProToChordSheet(parsed.lyrics);
    if (parsed.title && !document.getElementById("f-title").value) document.getElementById("f-title").value = parsed.title;
    if (parsed.artist && !document.getElementById("f-artist").value) document.getElementById("f-artist").value = parsed.artist;
    if (parsed.key && !document.getElementById("f-key").value) document.getElementById("f-key").value = parsed.key;
    setHelper("Tidied — chords aligned to word starts.", "ok");
  });

  // Swap artist <-> title for cases where the scraper got them backwards
  document.getElementById("t-swap").addEventListener("click", () => {
    const a = document.getElementById("f-artist");
    const t = document.getElementById("f-title");
    [a.value, t.value] = [t.value, a.value];
    setHelper("Swapped artist and title.", "ok");
  });

  // Strip tablature lines (e|---0---|, B|---1---|, etc.) — defensive in case button is missing
  const stripBtn = document.getElementById("t-strip-tabs");
  if (stripBtn) stripBtn.addEventListener("click", () => {
    const ta = document.getElementById("f-lyrics");
    // Tab line patterns: starts with one of e B G D A E (case-sensitive guitar/uke strings) or numbers, followed by | and dashes/digits/dots
    // Common forms:  e|--3--3--|   B|--0--0--|   |---3-2-0---|
    const before = ta.value.split("\n").length;
    const cleaned = ta.value
      .split("\n")
      .filter(line => !/^\s*[eBGDAEbgda]?\s*\|[-\d\.\s|h\/\\\(\)]+\|?\s*$/.test(line))
      .filter(line => !/^\s*[eBGDAEbgda]\|/.test(line.trim()))   // catches lines like "e|-4---4--..."
      .join("\n")
      .replace(/\n{3,}/g, "\n\n");
    const removed = before - cleaned.split("\n").length;
    ta.value = cleaned;
    setHelper(removed > 0 ? `Stripped ${removed} tablature line${removed === 1 ? "" : "s"}.` : "No tablature lines found.", removed > 0 ? "ok" : "");
  });

  // Instrument toggle — manual toggle so the visual state always matches, even though the
  // checkbox is visually hidden. Without this, the label/checkbox association can fail to
  // bubble through `pointer-events:none` on the input.
  document.querySelectorAll(".instrument-toggles .pill-btn").forEach(btn => {
    btn.addEventListener("click", e => {
      e.preventDefault();
      const cb = btn.querySelector('input[type="checkbox"]');
      if (!cb) return;
      cb.checked = !cb.checked;
      btn.classList.toggle("on", cb.checked);
      if (btn.dataset.tg === "guitar") {
        const capoRow = document.getElementById("f-capo-row");
        if (capoRow) capoRow.style.display = cb.checked ? "" : "none";
      }
    });
  });

  document.getElementById("t-detect-key").addEventListener("click", () => {
    const lyrics = document.getElementById("f-lyrics").value;
    const chords = extractChords(lyrics);
    if (!chords.length) { setHelper("Add some chords first.", "err"); return; }
    const k = detectKey(chords);
    if (k) {
      document.getElementById("f-key").value = k;
      setHelper("Detected key: " + k + " (best fit for " + chords.length + " chord" + (chords.length !== 1 ? "s" : "") + ")", "ok");
    } else {
      setHelper("Couldn't determine a clear key from this chord set.", "err");
    }
  });

  document.getElementById("t-fill-meta").addEventListener("click", async () => {
    const t = document.getElementById("f-title").value.trim();
    const a = document.getElementById("f-artist").value.trim();
    if (!t || !a) { setHelper("Type a title and artist first.", "err"); return; }
    setHelper("Looking up on MusicBrainz…", "busy");
    try {
      const r = await lookupMusicBrainz(t, a);
      if (!r) { setHelper("No match on MusicBrainz.", "err"); return; }
      if (r.title) document.getElementById("f-title").value = r.title;
      if (r.artist) document.getElementById("f-artist").value = r.artist;
      setHelper(`Match: ${r.artist} — ${r.title}`, "ok");
    } catch (e) {
      setHelper("MusicBrainz error: " + e.message, "err");
    }
  });

  document.getElementById("t-fill-lyrics").addEventListener("click", async () => {
    const t = document.getElementById("f-title").value.trim();
    const a = document.getElementById("f-artist").value.trim();
    if (!t || !a) { setHelper("Type a title and artist first.", "err"); return; }
    const ta = document.getElementById("f-lyrics");
    if (ta.value.trim() && !confirm("Replace existing lyrics with autofilled lyrics?")) return;
    setHelper("Looking up lyrics…", "busy");
    try {
      const lyrics = await lookupLyrics(t, a);
      if (!lyrics) { setHelper("No lyrics found.", "err"); return; }
      ta.value = lyrics;
      setHelper("Lyrics loaded. They have no chords yet — paste chords above lyrics or add [Chord] markers, then hit Parse.", "ok");
    } catch (e) {
      setHelper("Lyrics fetch error: " + e.message, "err");
    }
  });

}

function setHelper(msg, kind="") {
  const el = document.getElementById("helper");
  if (!el) return;
  el.textContent = msg;
  el.className = "helper-msg " + kind;
}

function blankSong() {
  // Both instruments off by default — user picks per-song what they want diagrams for
  return { id: uid(), title: "", artist: "", key: "", capo: 0, instruments: [], lyrics: "", notes: "", sourceUrl: "", voicings: {}, createdAt: now(), updatedAt: now() };
}

// ---- Voicings model ----
// song.voicings[chordName] = [ { frets:[…], pianoNotes:[pc,…]?, note:"…" }, … ]
// User-added voicings live in song.voicings.
// Built-in shapes are auto-included as voicing #0 EXCEPT for simple major/minor triads
// (since the player already knows those — only complex/jazz/extended chords get auto-diagrams).
function isSimpleMajorOrMinor(chordName) {
  const parsed = splitChord(chordName);
  if (!parsed) return false;
  if (parsed.bass !== null) return false;  // slash chord — show diagram
  const q = parsed.quality;
  return q === "" || q === "M" || q === "maj" || q === "m" || q === "min";
}

// Build the human-readable label shown above each diagram in the popover/voicing card.
function voicingLabel(v) {
  if (!v) return "";
  if (v.perOccurrence) return v.name ? v.name + " · this spot" : "Just this spot";
  if (v.builtIn) return "Standard";
  return v.name ? v.name : "Custom";
}

// Replace only the Nth occurrence of [chordName] in lyrics with [newName].
function replaceNthChord(lyrics, chordName, n, newName) {
  if (!lyrics) return lyrics || "";
  const re = new RegExp("\\[" + chordName.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\]", "g");
  let count = 0;
  return lyrics.replace(re, (m) => (count++ === n) ? "[" + newName + "]" : m);
}

function getVoicings(song, chordName, occ) {
  // Migration shim: old { customShapes, voicingNotes } → new voicings array
  if (song.customShapes || song.voicingNotes) {
    song.voicings = song.voicings || {};
    for (const [name, shape] of Object.entries(song.customShapes || {})) {
      if (!song.voicings[name]) {
        song.voicings[name] = [{
          frets: shape.frets,
          fingers: shape.fingers,
          barre: shape.barre,
          note: (song.voicingNotes || {})[name] || "",
        }];
      }
    }
    delete song.customShapes;
    delete song.voicingNotes;
  }
  song.voicings = song.voicings || {};
  song.positionVoicings = song.positionVoicings || {};
  const list = [];
  const userVoicings = song.voicings[chordName] || [];

  // Per-occurrence override — only for the specific position the user opened the popover from.
  // Comes FIRST so it's the default-shown voicing at that pill.
  if (typeof occ === "number" && occ >= 0) {
    const ov = song.positionVoicings[chordName + "@" + occ];
    if (ov) list.push(Object.assign({}, ov, { builtIn: false, perOccurrence: true }));
  }

  // User voicings come next so they're the default everywhere else
  for (const v of userVoicings) {
    list.push(Object.assign({ builtIn: false }, v));
  }

  // Built-in suggested voicing — when no user voicing exists.
  // Show suggestion for ALL chords when guitar-only is selected (since guitarists benefit from a shape
  // even for plain major/minor); skip simple triads otherwise (pianists usually know them).
  if (list.length === 0) {
    const wantGuitar = !song?.instruments?.length || song.instruments.includes("guitar");
    const wantPiano  = !song?.instruments?.length || song.instruments.includes("piano");
    const isGuitarOnly = wantGuitar && !wantPiano;
    if (isGuitarOnly || !isSimpleMajorOrMinor(chordName)) {
      const parsed = splitChord(chordName);
      const builtIn = wantGuitar ? lookupShape(chordName) : null;
      const pianoNotes = wantPiano && parsed ? qualityToIntervals(parsed.quality).map(i => (parsed.root + i) % 12) : null;
      if (builtIn || (pianoNotes && pianoNotes.length)) {
        list.push({
          frets:     builtIn?.frets,
          fingers:   builtIn?.fingers,
          barre:     builtIn?.barre,
          pianoNotes: pianoNotes,
          note:      builtIn?.derived ? "Movable barre shape" : "",
          builtIn:   true,
        });
      }
    }
  }
  return list;
}

function saveVoicing(song, chordName, voicing, index) {
  pushUndo(song);
  song.voicings = song.voicings || {};
  song.voicings[chordName] = song.voicings[chordName] || [];
  const arr = song.voicings[chordName];
  if (typeof index === "number" && index >= 0 && index < arr.length) {
    arr[index] = voicing;
  } else {
    arr.push(voicing);
  }
  song.updatedAt = now();
}
function deleteVoicing(song, chordName, index) {
  if (!song.voicings || !song.voicings[chordName]) return;
  pushUndo(song);
  song.voicings[chordName].splice(index, 1);
  if (song.voicings[chordName].length === 0) delete song.voicings[chordName];
  song.updatedAt = now();
}
function startEdit(song) { state.editing = song; renderDetail(); }
function saveEdit(isNew, songSnapshot) {
  const id = songSnapshot.id;
  const instruments = [];
  if (document.getElementById("f-i-guitar").checked) instruments.push("guitar");
  if (document.getElementById("f-i-piano").checked) instruments.push("piano");
  // The textarea holds chord-line-above-lyric format; parse it back to ChordPro for storage.
  const rawLyrics = document.getElementById("f-lyrics").value;
  const parsedLyrics = parseChordSheet(rawLyrics).lyrics;

  const updates = {
    id,
    title: document.getElementById("f-title").value.trim(),
    artist: document.getElementById("f-artist").value.trim(),
    key: document.getElementById("f-key").value.trim(),
    capo: parseInt(document.getElementById("f-capo").value) || 0,
    instruments,
    sourceUrl: document.getElementById("f-source").value.trim(),
    lyrics: parsedLyrics,
    notes: songSnapshot.notes || "",  // notes textarea was removed from editor; preserve existing value
    updatedAt: now(),
  };
  if (!updates.title) { setHelper("A title is required.", "err"); return; }
  if (isNew) {
    const newSong = Object.assign(blankSong(), updates, { id });
    state.songs.push(newSong);
    state.selectedId = id;
  } else {
    const idx = state.songs.findIndex(s => s.id === id);
    if (idx === -1) { state.songs.push(Object.assign(blankSong(), updates, { id })); state.selectedId = id; }
    else state.songs[idx] = Object.assign({}, state.songs[idx], updates);
  }
  saveState({ songs: state.songs });
  state.editing = false;
  renderList(); renderDetail();
}
function deleteSong(song) {
  if (!confirm(`Delete "${song.title}"? This can't be undone.`)) return;
  state.songs = state.songs.filter(s => s.id !== song.id);
  state.selectedId = null;
  saveState({ songs: state.songs });
  renderList(); renderDetail();
}
function duplicateSong(song) {
  const copy = Object.assign({}, song, { id: uid(), title: song.title + " (copy)", createdAt: now(), updatedAt: now() });
  state.songs.push(copy);
  state.selectedId = copy.id;
  saveState({ songs: state.songs });
  renderList(); renderDetail();
}

//=============================================================
// PLAY MODE — full-screen auto-scrolling chord/lyric view
//=============================================================
let playState = null;

function openPlayMode(song) {
  hidePopover();
  const overlay = document.createElement("div");
  overlay.className = "play-mode";
  overlay.innerHTML = `
    <div class="play-controls">
      <div class="play-title">
        <div class="artist">${escapeHtml(song.artist || "—")}${song.key ? " · Key " + escapeHtml(song.key) : ""}${song.capo ? " · Capo " + song.capo : ""}</div>
        <div>${escapeHtml(song.title || "Untitled")}</div>
      </div>
      <div class="speed-controls">
        <button id="play-slower" title="Slower (↓)">−</button>
        <input id="play-speed" type="range" min="0" max="40" step="1" value="25" title="Scroll speed (px/s)" />
        <button id="play-faster" title="Faster (↑)">+</button>
        <span class="speed-label" id="speed-label">25 px/s</span>
      </div>
      <button id="play-shapes" title="Show chord shapes as the song plays">⌗ Shapes</button>
      <button id="play-rewind" title="Rewind to top (R)">⏮</button>
      <button id="play-toggle" class="primary" title="Play/Pause (Space)">▶ Play</button>
      <button id="play-close" title="Close (Esc)">Close ✕</button>
    </div>
    <div class="play-scrub">
      <input type="range" id="play-scrub-slider" min="0" max="1000" step="1" value="0" title="Scrub through the song" aria-label="Scrub position" />
    </div>
    <div id="play-shape-panel" class="play-shape-panel" style="display:none; height:220px;">
      <div class="play-shape-diagram" id="play-shape-diagram"></div>
      <div class="panel-resize" id="play-shape-resize" title="Drag to resize"></div>
    </div>
    <div class="play-content" id="play-content">
      <div class="lyrics-large">${renderLyrics(song.lyrics || "", song)}</div>
    </div>
  `;
  document.body.appendChild(overlay);

  const content = overlay.querySelector("#play-content");
  const speedInput = overlay.querySelector("#play-speed");
  const speedLabel = overlay.querySelector("#speed-label");
  const toggleBtn = overlay.querySelector("#play-toggle");

  // Scroll loop with a virtual accumulator — scrollTop rounds to int each frame,
  // which would lose sub-pixel motion at low speeds. Track the float position separately.
  let isPlaying = false;
  let speedPxs = parseFloat(speedInput.value) || 20;
  let lastT = 0;
  let rafId = null;
  let virtualScroll = 0;

  function step(t) {
    if (!isPlaying) return;
    if (lastT === 0) lastT = t;
    const dt = (t - lastT) / 1000;
    lastT = t;
    virtualScroll += speedPxs * dt;
    content.scrollTop = virtualScroll;
    // Stop when we hit the bottom
    if (content.scrollTop + content.clientHeight >= content.scrollHeight - 1) {
      isPlaying = false;
      toggleBtn.textContent = "▶ Replay";
      return;
    }
    rafId = requestAnimationFrame(step);
  }
  function play() {
    if (isPlaying) return;
    if (content.scrollTop + content.clientHeight >= content.scrollHeight - 1) {
      content.scrollTop = 0;
    }
    virtualScroll = content.scrollTop;
    isPlaying = true;
    lastT = 0;
    toggleBtn.textContent = "⏸ Pause";
    rafId = requestAnimationFrame(step);
  }
  function pause() {
    isPlaying = false;
    toggleBtn.textContent = "▶ Play";
    if (rafId) cancelAnimationFrame(rafId);
  }
  function setSpeed(v) {
    speedPxs = Math.max(0, parseFloat(v) || 0);
    speedLabel.textContent = `${speedPxs.toFixed(0)} px/s`;
  }
  setSpeed(speedInput.value);

  toggleBtn.addEventListener("click", () => isPlaying ? pause() : play());
  speedInput.addEventListener("input", e => setSpeed(e.target.value));

  // Rewind: jump back to the top, reset the virtual scroll accumulator, keep play state as-is.
  function rewind() {
    pause();
    content.scrollTop = 0;
    virtualScroll = 0;
    toggleBtn.textContent = "▶ Play";
  }
  overlay.querySelector("#play-rewind").addEventListener("click", rewind);

  // Scrub slider — tracks scroll position; dragging it jumps to that position.
  const scrubInput = overlay.querySelector("#play-scrub-slider");
  let scrubbing = false;
  const SCRUB_MAX = 1000;
  function syncScrubFromScroll() {
    if (scrubbing) return; // user is dragging — don't fight them
    const max = content.scrollHeight - content.clientHeight;
    scrubInput.value = max > 0 ? Math.round((content.scrollTop / max) * SCRUB_MAX) : 0;
  }
  scrubInput.addEventListener("input", e => {
    scrubbing = true;
    const max = content.scrollHeight - content.clientHeight;
    if (max > 0) {
      const pct = parseFloat(e.target.value) / SCRUB_MAX;
      content.scrollTop = max * pct;
      virtualScroll = content.scrollTop;
    }
  });
  scrubInput.addEventListener("change", () => { scrubbing = false; });
  content.addEventListener("scroll", syncScrubFromScroll);

  // Chord-shape overlay — toggle, then update on scroll to show the chord nearest the top of the visible area
  let shapesOn = false;
  const shapesBtn = overlay.querySelector("#play-shapes");
  const shapePanel = overlay.querySelector("#play-shape-panel");
  const shapeDiag = overlay.querySelector("#play-shape-diagram");
  function renderCurrentShape() {
    if (!shapesOn) return;
    const allChordEls = [...content.querySelectorAll("[data-chord]")];
    if (!allChordEls.length) {
      shapeDiag.innerHTML = "";
      return;
    }
    const contentRect = content.getBoundingClientRect();
    const focusY = contentRect.top + 60; // a bit below the top of the scroll area
    // Find the chord nearest the focus line
    let focused = null;
    let nearestDist = Infinity;
    for (const el of allChordEls) {
      const r = el.getBoundingClientRect();
      if (r.bottom < contentRect.top || r.top > contentRect.bottom) continue;
      const dist = Math.abs(r.top - focusY);
      if (dist < nearestDist) { nearestDist = dist; focused = el; }
    }
    // Mark the focused chord's line as active so CSS can show the dot ONLY there.
    // Also mark the NEXT line with chords as `.active-next` so the player can preview
    // what's coming. "Next" = the next .lyric-line.has-chord after the active one.
    const newActive = focused ? focused.closest(".lyric-line") : null;
    const prevActive = content.querySelector(".lyric-line.active");
    if (prevActive !== newActive) {
      if (prevActive) prevActive.classList.remove("active");
      if (newActive) newActive.classList.add("active");
    }
    const prevNext = content.querySelector(".lyric-line.active-next");
    let newNext = null;
    if (newActive) {
      let n = newActive.nextElementSibling;
      while (n) {
        if (n.classList && n.classList.contains("lyric-line") && n.classList.contains("has-chord")) {
          newNext = n; break;
        }
        n = n.nextElementSibling;
      }
    }
    if (prevNext !== newNext) {
      if (prevNext) prevNext.classList.remove("active-next");
      if (newNext) newNext.classList.add("active-next");
    }
    if (!focused) {
      shapeDiag.innerHTML = "";
      return;
    }
    // Shape panel is gated separately — if it's off, we still want the line marker.
    if (!shapesOn) return;
    // Find every chord pill on the SAME LINE as the focused one (by similar top coordinate)
    // — then dedupe by name preserving order, so a line "D A#maj7 Cadd9 D" yields three shapes.
    const focusedTop = focused.getBoundingClientRect().top;
    const sameLine = allChordEls.filter(el => {
      const t = el.getBoundingClientRect().top;
      return Math.abs(t - focusedTop) < 10;
    });
    const seen = new Set();
    const lineChords = [];
    for (const el of sameLine) {
      const ch = el.dataset.chord;
      if (seen.has(ch)) continue;
      seen.add(ch);
      const occRaw = el.dataset.occ;
      lineChords.push({ name: ch, occ: occRaw !== undefined ? parseInt(occRaw, 10) : null });
    }
    // Dedup signature includes name + count + panel height — re-render when any of those change so
    // resizing the panel actually re-picks the shape size.
    const panelH = shapePanel.clientHeight;
    const panelW = shapePanel.clientWidth;
    const sig = lineChords.map(c => c.name).join("|") + "@" + panelH + "x" + panelW;
    if (shapeDiag.dataset.last === sig) return;
    shapeDiag.dataset.last = sig;

    // Always render at the largest intrinsic size — CSS scales it down to fit each cell,
    // so wider panels / fewer chords = bigger shapes (no wasted whitespace below).
    const size = "lg";

    const wantGuitar = !song?.instruments?.length || song.instruments.includes("guitar");
    const wantPiano  = !song?.instruments?.length || song.instruments.includes("piano");

    let html = "";
    for (const { name, occ } of lineChords) {
      const voicings = getVoicings(song, name, occ);
      const v = voicings[0] || null;
      let cellInner = "";
      if (wantGuitar) {
        if (v?.frets) {
          cellInner += svgGuitar(name, { frets: v.frets, fingers: v.fingers, barre: v.barre }, size);
        } else if (!isSimpleMajorOrMinor(name)) {
          const builtIn = lookupShape(name);
          if (builtIn) cellInner += svgGuitar(name, { frets: builtIn.frets, fingers: builtIn.fingers, barre: builtIn.barre }, size);
        }
      }
      if (wantPiano) {
        if (v?.pianoNotes && v.pianoNotes.length) {
          cellInner += svgPianoFromPcs(v.pianoNotes, splitChord(name)?.root, undefined, size);
        } else {
          cellInner += svgPiano(name, undefined, size);
        }
      }
      html += `<div class="shape-cell"><div class="shape-cell-name">${escapeHtml(name)}</div><div class="shape-svgs">${cellInner || `<div class="muted small">no shape</div>`}</div></div>`;
    }
    shapeDiag.innerHTML = html;
  }
  shapesBtn.addEventListener("click", () => {
    shapesOn = !shapesOn;
    shapesBtn.classList.toggle("shape-on", shapesOn);
    shapePanel.style.display = shapesOn ? "flex" : "none";
    delete shapeDiag.dataset.last;
    renderCurrentShape();
  });
  // Always run on scroll — the active-line marker (dot) needs to update even when shapes are off.
  content.addEventListener("scroll", renderCurrentShape);
  // Light up the initial active line on entry (before any scroll).
  setTimeout(renderCurrentShape, 0);

  // Resize the shape panel — drag the bottom handle to set its height (clamped 100..70vh).
  const resizeHandle = overlay.querySelector("#play-shape-resize");
  let dragStartY = 0, dragStartH = 0, dragging = false;
  resizeHandle.addEventListener("mousedown", e => {
    e.preventDefault();
    dragging = true;
    dragStartY = e.clientY;
    dragStartH = shapePanel.getBoundingClientRect().height;
    document.body.style.userSelect = "none";
  });
  document.addEventListener("mousemove", e => {
    if (!dragging) return;
    const newH = Math.max(100, Math.min(window.innerHeight * 0.7, dragStartH + (e.clientY - dragStartY)));
    shapePanel.style.height = newH + "px";
    // Re-pick the size class so shapes scale up/down with the panel height.
    if (shapesOn) {
      delete shapeDiag.dataset.last; // bypass the "no change" early return
      renderCurrentShape();
    }
  });
  document.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    document.body.style.userSelect = "";
  });
  overlay.querySelector("#play-slower").addEventListener("click", () => {
    speedInput.value = Math.max(0, parseFloat(speedInput.value) - 2);
    setSpeed(speedInput.value);
  });
  overlay.querySelector("#play-faster").addEventListener("click", () => {
    speedInput.value = Math.min(40, parseFloat(speedInput.value) + 2);
    setSpeed(speedInput.value);
  });

  function close() {
    pause();
    overlay.remove();
    document.removeEventListener("keydown", onKey);
    playState = null;
  }
  function onKey(e) {
    if (e.key === "Escape") { close(); }
    else if (e.key === " " || e.code === "Space") {
      e.preventDefault();
      isPlaying ? pause() : play();
    } else if (e.key === "r" || e.key === "R") {
      rewind();
    } else if (e.key === "ArrowUp") {
      speedInput.value = Math.min(40, parseFloat(speedInput.value) + 2);
      setSpeed(speedInput.value);
    } else if (e.key === "ArrowDown") {
      speedInput.value = Math.max(0, parseFloat(speedInput.value) - 2);
      setSpeed(speedInput.value);
    }
  }
  overlay.querySelector("#play-close").addEventListener("click", close);
  document.addEventListener("keydown", onKey);
  playState = { close };
}

//=============================================================
// PRACTICE MODE — guided piano drills (circle of fifths, scales,
// ii–V–I, diatonic triads, inversions). Full-screen overlay; same
// piano render that powers chord voicings (root marked with white dot).
//=============================================================
const PC_NAMES_SHARP = ["C","C♯","D","D♯","E","F","F♯","G","G♯","A","A♯","B"];
const PC_NAMES_FLAT  = ["C","D♭","D","E♭","E","F","G♭","G","A♭","A","B♭","B"];

// Helper: name a pitch class with sharps OR flats based on context (key signature).
function pcNameWithAccidentals(pc, preferFlat) {
  return preferFlat ? PC_NAMES_FLAT[(pc % 12 + 12) % 12] : PC_NAMES_SHARP[(pc % 12 + 12) % 12];
}

// Major-key signature flats/sharps: which keys are flat-flavored.
const FLAT_KEYS = new Set([5, 10, 3, 8, 1, 6]); // F, B♭, E♭, A♭, D♭, G♭

function drillCircleOfFifths() {
  const order = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5];
  return order.map(root => {
    const flat = FLAT_KEYS.has(root);
    const naming = pc => pcNameWithAccidentals(pc, flat);
    const intervals = [0, 4, 7];
    return {
      label: naming(root) + " major",
      detail: intervals.map(iv => naming((root + iv) % 12)).join(" – "),
      notes: intervals.map(iv => (root + iv) % 12),
      rootPc: root,
    };
  });
}

function drillMajorScales() {
  const order = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5];
  const intervals = [0, 2, 4, 5, 7, 9, 11];
  return order.map(root => {
    const flat = FLAT_KEYS.has(root);
    const naming = pc => pcNameWithAccidentals(pc, flat);
    return {
      label: naming(root) + " major scale",
      detail: intervals.map(iv => naming((root + iv) % 12)).join(" – "),
      notes: intervals.map(iv => (root + iv) % 12),
      rootPc: root,
    };
  });
}

function drillNaturalMinorScales() {
  // Order around the circle of fifths starting at A minor (relative to C major)
  const order = [9, 4, 11, 6, 1, 8, 3, 10, 5, 0, 7, 2];
  // Mirror flat-flavor for relative-minor keys: A,E,B,F♯,C♯ minor → sharp; the rest → flat
  const sharpMinors = new Set([9, 4, 11, 6, 1]);
  const intervals = [0, 2, 3, 5, 7, 8, 10];
  return order.map(root => {
    const flat = !sharpMinors.has(root);
    const naming = pc => pcNameWithAccidentals(pc, flat);
    return {
      label: naming(root) + " minor (natural)",
      detail: intervals.map(iv => naming((root + iv) % 12)).join(" – "),
      notes: intervals.map(iv => (root + iv) % 12),
      rootPc: root,
    };
  });
}

function drillIIVI() {
  const keyOrder = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5];
  const out = [];
  for (const tonic of keyOrder) {
    const flat = FLAT_KEYS.has(tonic);
    const naming = pc => pcNameWithAccidentals(pc, flat);
    const ii  = (tonic + 2) % 12;
    const V   = (tonic + 7) % 12;
    const m7  = [0, 3, 7, 10];
    const dom7 = [0, 4, 7, 10];
    const maj7 = [0, 4, 7, 11];
    out.push({
      label: `ii in ${naming(tonic)}: ${naming(ii)}m7`,
      detail: m7.map(iv => naming((ii + iv) % 12)).join(" – "),
      notes: m7.map(iv => (ii + iv) % 12), rootPc: ii,
    });
    out.push({
      label: `V in ${naming(tonic)}: ${naming(V)}7`,
      detail: dom7.map(iv => naming((V + iv) % 12)).join(" – "),
      notes: dom7.map(iv => (V + iv) % 12), rootPc: V,
    });
    out.push({
      label: `I in ${naming(tonic)}: ${naming(tonic)}maj7`,
      detail: maj7.map(iv => naming((tonic + iv) % 12)).join(" – "),
      notes: maj7.map(iv => (tonic + iv) % 12), rootPc: tonic,
    });
  }
  return out;
}

function drillTriadsOfCMajor() {
  const tonic = 0;
  const degrees = [
    { name: "I — C major",         intervals: [0, 4, 7], offset: 0 },
    { name: "ii — D minor",        intervals: [0, 3, 7], offset: 2 },
    { name: "iii — E minor",       intervals: [0, 3, 7], offset: 4 },
    { name: "IV — F major",        intervals: [0, 4, 7], offset: 5 },
    { name: "V — G major",         intervals: [0, 4, 7], offset: 7 },
    { name: "vi — A minor",        intervals: [0, 3, 7], offset: 9 },
    { name: "vii° — B diminished", intervals: [0, 3, 6], offset: 11 },
  ];
  return degrees.map(d => {
    const root = (tonic + d.offset) % 12;
    return {
      label: d.name,
      detail: d.intervals.map(iv => PC_NAMES_SHARP[(root + iv) % 12]).join(" – "),
      notes: d.intervals.map(iv => (root + iv) % 12),
      rootPc: root,
    };
  });
}

// Build positional notes for a triad inversion that ascends visibly across the
// F-to-E keyboard. Returns FE positions (0–23+).
function inversionPositions(pcs, inversion) {
  const reordered = [...pcs.slice(inversion), ...pcs.slice(0, inversion)];
  const positions = [];
  let prev = -1;
  for (const pc of reordered) {
    let pos = fePosOfPc(pc);
    while (pos <= prev) pos += 12;
    if (pos > 23) pos = 23;
    positions.push(pos);
    prev = pos;
  }
  return positions;
}

function drillInversions() {
  // C major triad in 3 inversions, then F major and G major to give
  // students some practice across roots.
  const triads = [
    { name: "C major",  pcs: [0, 4, 7]  },
    { name: "F major",  pcs: [5, 9, 0]  },
    { name: "G major",  pcs: [7, 11, 2] },
  ];
  const labels = ["root position", "1st inversion", "2nd inversion"];
  const out = [];
  for (const t of triads) {
    for (let inv = 0; inv < 3; inv++) {
      const positions = inversionPositions(t.pcs, inv);
      const reordered = [...t.pcs.slice(inv), ...t.pcs.slice(0, inv)];
      out.push({
        label: t.name + " — " + labels[inv],
        detail: reordered.map(pc => PC_NAMES_SHARP[pc]).join(" – "),
        notes: positions, // explicit positions — bypass stacking
        rootPc: t.pcs[0],
      });
    }
  }
  return out;
}

const PRACTICE_DRILLS = [
  { id: "circle5",   name: "Circle of fifths — major chord roots",        build: drillCircleOfFifths },
  { id: "majscales", name: "Major scales — all 12 keys",                  build: drillMajorScales },
  { id: "minscales", name: "Natural minor scales — all 12 keys",          build: drillNaturalMinorScales },
  { id: "iivi",      name: "ii–V–I in all 12 keys (36 chords)",           build: drillIIVI },
  { id: "triadsC",   name: "Diatonic triads of C major (I–ii–iii–IV–V–vi–vii°)", build: drillTriadsOfCMajor },
  { id: "inversions", name: "Triad inversions (root, 1st, 2nd)",          build: drillInversions },
];

let practiceState = null;
function openPracticeMode() {
  if (practiceState) return; // already open
  let chosen = null, steps = [], cursor = 0;
  const overlay = document.createElement("div");
  overlay.className = "practice-overlay";
  document.body.appendChild(overlay);

  function close() {
    document.removeEventListener("keydown", onKey);
    overlay.remove();
    practiceState = null;
  }
  function back() {
    chosen = null; steps = []; cursor = 0;
    render();
  }
  function next() {
    if (cursor < steps.length - 1) { cursor++; render(); }
  }
  function prev() {
    if (cursor > 0) { cursor--; render(); }
  }
  function pick(drillId) {
    const d = PRACTICE_DRILLS.find(x => x.id === drillId);
    if (!d) return;
    chosen = d;
    steps = d.build();
    cursor = 0;
    render();
  }

  function render() {
    if (!chosen) {
      overlay.innerHTML = `
        <div class="practice-shell">
          <div class="practice-head">
            <h2 class="practice-title">Practice</h2>
            <button class="practice-close" aria-label="Close practice mode">✕</button>
          </div>
          <div class="practice-body">
            <div class="practice-sub">Pick a drill</div>
            <div class="practice-drills">
              ${PRACTICE_DRILLS.map(d => `
                <button class="practice-drill" data-id="${d.id}">
                  <span class="pd-name">${escapeHtml(d.name)}</span>
                  <span class="pd-arrow">→</span>
                </button>`).join("")}
            </div>
            <div class="practice-hint">Each drill cycles through every key. Use ← / → or Space to step through.</div>
          </div>
        </div>
      `;
      overlay.querySelector(".practice-close").addEventListener("click", close);
      overlay.querySelectorAll(".practice-drill").forEach(b =>
        b.addEventListener("click", () => pick(b.dataset.id)));
    } else {
      const step = steps[cursor];
      overlay.innerHTML = `
        <div class="practice-shell">
          <div class="practice-head">
            <button class="practice-back" aria-label="Back to drill picker">← Drills</button>
            <h2 class="practice-title">${escapeHtml(chosen.name)}</h2>
            <span class="practice-count">${cursor + 1} <span style="opacity:.5;">/ ${steps.length}</span></span>
            <button class="practice-close" aria-label="Close practice mode">✕</button>
          </div>
          <div class="practice-body practice-step">
            <div class="practice-prompt-big">${escapeHtml(step.label)}</div>
            ${step.detail ? `<div class="practice-detail">${escapeHtml(step.detail)}</div>` : ""}
            <div class="practice-piano">${svgPianoFromPcs(step.notes, step.rootPc, undefined, "lg")}</div>
            <div class="practice-nav">
              <button class="practice-prev" ${cursor === 0 ? "disabled" : ""}>◀ Prev</button>
              <button class="practice-next" ${cursor === steps.length - 1 ? "disabled" : ""}>${cursor === steps.length - 1 ? "Done" : "Next ▶"}</button>
            </div>
            <div class="practice-hint">← / → keys, or Space, to navigate. Esc to back out.</div>
          </div>
        </div>
      `;
      overlay.querySelector(".practice-close").addEventListener("click", close);
      overlay.querySelector(".practice-back").addEventListener("click", back);
      overlay.querySelector(".practice-prev").addEventListener("click", prev);
      overlay.querySelector(".practice-next").addEventListener("click", next);
    }
  }

  function onKey(e) {
    if (e.key === "Escape") {
      if (chosen) back(); else close();
      e.preventDefault();
      return;
    }
    if (!chosen) return;
    if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); next(); }
    else if (e.key === "ArrowLeft") { e.preventDefault(); prev(); }
  }
  document.addEventListener("keydown", onKey);
  practiceState = { close };
  render();
}
