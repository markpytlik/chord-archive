<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="apple-touch-icon" href="favicon.svg" />
<meta name="theme-color" content="#b14a2c" />
<!-- Block search engines and most well-behaved AI/training crawlers from indexing or scraping. -->
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet" />
<meta name="GPTBot" content="noindex, nofollow" />
<meta name="ClaudeBot" content="noindex, nofollow" />
<meta name="referrer" content="no-referrer" />
<title>Chord Archive</title>
<style>
  /* ====================== Reset & Tokens ====================== */
  :root {
    --bg: #fbfaf7;
    --panel: #ffffff;
    --panel-2: #f6f4ee;
    --ink: #14161a;
    --ink-soft: #2c2f36;
    --muted: #6b7180;
    --line: #e7e3d8;
    --line-soft: #f0ede4;
    --accent: #b14a2c;
    --accent-soft: #f7e4dc;
    --accent-deep: #8a3819;
    --chord: #1e3a8a;
    --chord-soft: #e7edfa;
    --chord-bg: #f3f6fc;
    --good: #15803d;
    --good-soft: #e6f3eb;
    --warn: #92400e;
    --warn-soft: #fdf3e0;
    --shadow-sm: 0 1px 2px rgba(20, 22, 26, .04);
    --shadow-md: 0 6px 24px rgba(20, 22, 26, .07), 0 2px 6px rgba(20, 22, 26, .04);
    --shadow-lg: 0 24px 60px rgba(20, 22, 26, .12);
    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --serif: "Iowan Old Style", "Charter", "Source Serif Pro", Georgia, "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--accent-soft); color: var(--accent-deep); }

  /* ====================== Controls ====================== */
  button {
    font: inherit; cursor: pointer; border: 1px solid var(--line);
    background: var(--panel); color: var(--ink);
    padding: 7px 14px; border-radius: var(--radius-sm);
    transition: background .12s ease, border-color .12s ease, transform .04s;
    letter-spacing: -.01em;
  }
  button:hover { background: var(--panel-2); border-color: #d8d3c4; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { background: var(--accent-deep); border-color: var(--accent-deep); }
  button.ghost { background: transparent; border-color: transparent; color: var(--muted); }
  button.ghost:hover { background: var(--panel-2); color: var(--ink); }
  button.danger { color: #b41a1a; border-color: #ebd2d2; }
  button.danger:hover { background: #fceeee; border-color: #e0bcbc; }
  button.subtle { background: var(--panel-2); border-color: transparent; }

  input, select, textarea {
    font: inherit; color: var(--ink);
    background: var(--panel); border: 1px solid var(--line);
    padding: 8px 12px; border-radius: var(--radius-sm);
    width: 100%;
    transition: border-color .12s ease, box-shadow .12s ease;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  textarea { font-family: var(--mono); font-size: 14px; resize: vertical; line-height: 1.55; }
  label {
    font-size: 12px;
    color: var(--muted);
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
    letter-spacing: .02em;
    text-transform: uppercase;
  }
  .row { display: flex; gap: 10px; align-items: center; }
  .stack > * + * { margin-top: 14px; }

  .pill {
    display: inline-flex; align-items: center;
    padding: 2px 9px; border-radius: 999px;
    font-size: 11px; font-weight: 500;
    letter-spacing: .02em;
    background: var(--panel-2); color: var(--muted);
    border: 1px solid var(--line);
    margin-right: 5px;
  }
  .pill.guitar { background: var(--good-soft); color: var(--good); border-color: #c8dec8; }
  .pill.piano  { background: #ece4f5; color: #5a3eb1; border-color: #d3c8e0; }
  .pill.accent { background: var(--accent-soft); color: var(--accent-deep); border-color: #ecccc0; }
  .pill.chord-pill { background: var(--chord-soft); color: var(--chord); border-color: #cdd9ed; cursor: pointer; }
  .pill.chord-pill:hover { background: #d4dff5; }

  .muted { color: var(--muted); }
  .hidden { display: none !important; }
  .small { font-size: 13px; }
  .micro { font-size: 11px; }

  /* ====================== Header ====================== */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 26px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 5;
  }
  header .brand {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -.01em;
    color: var(--ink);
  }
  header .brand .accent { color: var(--accent); font-style: italic; }
  header .brand .glyph { color: var(--accent); margin-right: 4px; }
  header .grow { flex: 1; }
  header input.search {
    max-width: 360px; padding: 8px 14px;
    background: var(--panel-2); border-color: transparent;
  }
  header input.search:focus { background: var(--panel); border-color: var(--accent); }

  /* ====================== Layout ====================== */
  main {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 60px);
  }
  aside {
    border-right: 1px solid var(--line);
    background: var(--panel);
    overflow-y: auto;
  }
  aside .filter-bar {
    padding: 12px 18px; border-bottom: 1px solid var(--line-soft);
    display: flex; gap: 8px; align-items: center;
    background: var(--panel); position: sticky; top: 0; z-index: 1;
  }
  aside .filter-bar select {
    padding: 5px 10px; font-size: 12px;
    background: var(--panel-2); border-color: transparent; width: auto;
  }

  .song-list { list-style: none; margin: 0; padding: 0; }
  .song-list li {
    padding: 14px 22px;
    border-bottom: 1px solid var(--line-soft);
    cursor: pointer;
    transition: background .1s ease;
  }
  .song-list li:hover { background: var(--panel-2); }
  .song-list li.active { background: var(--accent-soft); }
  .song-list li.active .artist { color: var(--accent-deep); }
  .song-list .artist {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .04em;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .song-list .title {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 18px;
    line-height: 1.2;
    color: var(--ink);
  }
  .song-list .meta {
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
    display: flex; gap: 6px; align-items: center;
  }

  /* ====================== Detail ====================== */
  section.detail {
    overflow-y: auto;
    padding: 40px 56px 100px;
    max-width: 100%;
  }
  .empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--muted); text-align: center; padding: 32px;
    font-family: var(--serif);
  }
  .empty h2 {
    font-family: var(--serif);
    font-weight: 500;
    color: var(--ink); margin-bottom: 12px;
    font-size: 28px;
    letter-spacing: -.01em;
  }
  .empty p { max-width: 460px; line-height: 1.6; font-family: var(--sans); }

  .detail-head {
    display: flex; align-items: flex-start; gap: 16px;
    margin-bottom: 6px; padding-bottom: 18px;
    border-bottom: 1px solid var(--line-soft);
  }
  .detail-head .title-block { flex: 1; min-width: 0; }
  .detail-head .artist {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .detail-head h1 {
    margin: 0;
    font-family: var(--serif);
    font-weight: 500;
    font-size: 36px;
    line-height: 1.1;
    letter-spacing: -.015em;
    color: var(--ink);
  }
  .detail-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .meta-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin: 16px 0 28px;
  }

  /* ====================== Lyrics view ====================== */
  .lyrics {
    font-family: var(--mono);
    font-size: 15px; line-height: 1.45;
    background: var(--panel);
    padding: 28px 30px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    white-space: pre-wrap;
    word-wrap: break-word;
    box-shadow: var(--shadow-sm);
  }
  .lyrics .seg {
    display: inline-block; position: relative;
    padding-top: 1.7em; vertical-align: baseline;
  }
  .lyrics .seg .chord {
    position: absolute; top: 0; left: 0;
    color: #1a1a1a; font-weight: 700;
    background: #ededeb;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 12.5px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .1s, transform .1s, box-shadow .1s;
    user-select: none;
    font-family: var(--mono);
  }
  .lyrics .seg .chord:hover {
    background: #dcdbd6; transform: translateY(-1px);
    box-shadow: 0 2px 6px rgba(0, 0, 0, .08);
  }
  .lyrics .section-label {
    color: var(--accent);
    font-weight: 700;
    font-style: normal;
    margin-top: 1.6em;
    display: block;
    letter-spacing: .12em;
    text-transform: uppercase;
    font-size: 11px;
    font-family: var(--sans);
  }
  .lyrics .section-label::before { content: "— "; opacity: .5; }
  .lyrics .section-label::after  { content: " —"; opacity: .5; }
  .lyrics .section-label:first-child { margin-top: 0; }

  /* ====================== Notes & chord index ====================== */
  .info-block {
    margin-top: 22px; padding: 18px 22px;
    background: var(--warn-soft); border: 1px solid #f0d9b3; border-radius: var(--radius);
    line-height: 1.6;
  }
  .info-block.chords { background: var(--chord-bg); border-color: #cfd9ed; }
  .info-block h4 {
    margin: 0 0 8px;
    font-size: 11px;
    color: var(--warn);
    letter-spacing: .12em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .info-block.chords h4 { color: var(--chord); }
  .info-block .body { white-space: pre-wrap; color: var(--ink-soft); }

  /* ====================== Hover popover ====================== */
  .chord-popover {
    position: fixed;
    z-index: 30;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    padding: 16px 18px 12px;
    min-width: 260px;
    max-width: 400px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity .12s ease, transform .12s ease;
    pointer-events: none;
  }
  .chord-popover.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .chord-popover .pop-header {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    text-align: center;
    letter-spacing: -.01em;
    margin-bottom: 10px;
  }
  .chord-popover .pop-row {
    display: flex; gap: 14px; align-items: flex-start; justify-content: center;
  }
  .chord-popover .pop-row.single { justify-content: center; }
  .chord-popover .diag-mini { text-align: center; }
  .chord-popover .diag-mini .label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 6px;
  }
  .chord-popover .pop-cycler {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin-top: 8px;
    color: var(--muted);
    font-size: 12.5px;
  }
  .chord-popover .pop-cycler .arrow {
    cursor: pointer;
    background: transparent; border: 0; padding: 4px 8px;
    color: var(--muted); font-size: 16px; line-height: 1;
    border-radius: 4px;
  }
  .chord-popover .pop-cycler .arrow:hover:not(:disabled) {
    color: var(--ink); background: var(--panel-2);
  }
  .chord-popover .pop-cycler .arrow:disabled { opacity: 0.3; cursor: default; }
  .chord-popover .pop-cycler .count {
    min-width: 50px; text-align: center; font-variant-numeric: tabular-nums;
  }
  .chord-popover .pop-actions {
    display: flex; gap: 4px; justify-content: center; margin-top: 8px;
    padding-top: 10px; border-top: 1px solid var(--line-soft);
  }
  .chord-popover .pop-actions button {
    background: transparent; border: 0; color: var(--muted);
    padding: 4px 8px; font-size: 11.5px; cursor: pointer; border-radius: 4px;
  }
  .chord-popover .pop-actions button:hover {
    background: var(--panel-2); color: var(--ink);
  }
  .chord-popover .pop-actions button.danger:hover { color: #b41a1a; background: #fceeed; }
  .chord-popover .voicing-note {
    margin-top: 8px;
    padding: 7px 11px;
    background: var(--warn-soft);
    border-left: 3px solid #f0d9b3;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.4;
  }

  /* ====================== Editor ====================== */
  .editor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px 16px;
  }
  .editor-grid .full { grid-column: 1 / -1; }
  .editor-tools {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
  }
  .editor-tools button { font-size: 13px; padding: 5px 11px; }
  .helper-msg {
    color: var(--muted); font-size: 12px;
    margin-top: 6px; min-height: 18px;
    transition: color .1s;
  }
  .helper-msg.ok { color: var(--good); }
  .helper-msg.err { color: #b41a1a; }
  .helper-msg.busy { color: var(--accent); }

  .checkbox-row {
    display: flex; gap: 16px; padding-top: 6px; align-items: center;
  }
  .checkbox-row label {
    display: inline-flex; align-items: center; gap: 7px; margin: 0;
    font-size: 13px; text-transform: none; letter-spacing: 0; font-weight: 400;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .checkbox-row input[type=checkbox] {
    width: auto; cursor: pointer; accent-color: var(--accent);
  }

  /* Import-from-URL strip */
  .url-import {
    display: flex; gap: 8px; align-items: center;
    background: var(--chord-bg); border: 1px solid #d8e0f0;
    padding: 10px 14px; border-radius: var(--radius);
    margin-bottom: 14px;
  }
  .url-import input { flex: 1; background: var(--panel); }
  .url-import .label {
    font-size: 11px; color: var(--chord); font-weight: 600;
    text-transform: uppercase; letter-spacing: .08em;
    flex-shrink: 0; padding-right: 6px;
  }

  /* ====================== Modal ====================== */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(20, 16, 12, .42);
    display: flex; align-items: center; justify-content: center;
    z-index: 20; padding: 24px;
    animation: fadein .15s ease;
  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--panel);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    padding: 28px;
    width: 100%; max-width: 720px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal h3 {
    margin: 0 0 4px;
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -.01em;
  }
  .modal .modal-sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 18px;
  }
  .modal .actions {
    display: flex; gap: 8px; justify-content: flex-end;
    margin-top: 20px; padding-top: 16px;
    border-top: 1px solid var(--line-soft);
  }
  .modal-bg.chord-modal .modal { max-width: 600px; }

  /* Aligned guitar/piano cards in chord modal */
  .diag-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 4px;
  }
  .diag-card {
    display: flex; flex-direction: column;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
  }
  .diag-card h4 {
    margin: 0 0 10px;
    font-size: 11px; color: var(--muted);
    letter-spacing: .12em; text-transform: uppercase;
    font-weight: 600;
    text-align: center;
  }
  .diag-card .badge {
    color: var(--accent);
    margin-left: 4px;
    text-transform: none;
    font-size: 10px;
    letter-spacing: .04em;
  }
  .diag-card .canvas {
    flex: 1; display: flex; align-items: center; justify-content: center;
    min-height: 170px;
  }
  .diag-card .meta {
    font-size: 11px; color: var(--muted);
    text-align: center; margin-top: 10px;
    font-family: var(--mono);
  }
  .diag-card.no-show { opacity: .35; }

  .voicing-strip {
    margin-top: 16px; padding: 12px 14px;
    background: var(--warn-soft); border-left: 3px solid #f0d9b3;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 13.5px; line-height: 1.5; color: var(--ink-soft);
  }
  .voicing-strip b { color: var(--warn); }

  .modal-form { margin-top: 18px; }
  .modal-form label { margin-top: 4px; }
  .modal-form .row { gap: 8px; }
  .modal-form .row button { flex: 0 0 auto; }
  .modal-form code {
    font-family: var(--mono); font-size: 11.5px;
    background: var(--panel-2); padding: 1px 5px; border-radius: 3px;
  }

  code, kbd {
    font-family: var(--mono); font-size: 12px;
    background: var(--panel-2);
    padding: 1px 5px; border-radius: 3px;
  }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #dcd6c5; border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: #c5beac; }
</style>
</head>
<body>

<header>
  <div class="brand"><span class="glyph">♪</span> Chord <span class="accent">Archive</span></div>
  <input type="search" id="search" class="search" placeholder="Search artist, title, or lyrics…" />
  <div class="grow"></div>
  <button id="btn-new" class="primary">+ New Song</button>
  <button id="btn-import" title="Import a JSON backup">Import</button>
  <button id="btn-export" title="Download all songs as JSON">Export</button>
</header>

<main>
  <aside>
    <div class="filter-bar">
      <select id="filter-instrument" title="Filter by instrument">
        <option value="all">All</option>
        <option value="guitar">Guitar</option>
        <option value="piano">Piano</option>
        <option value="both">Both</option>
      </select>
      <select id="sort" title="Sort">
        <option value="updated">Recently updated</option>
        <option value="artist">Artist A→Z</option>
        <option value="title">Title A→Z</option>
      </select>
    </div>
    <ul id="song-list" class="song-list"></ul>
  </aside>

  <section id="detail" class="detail">
    <div class="empty" id="empty-state">
      <h2>Your archive of chords &amp; phrasings</h2>
      <p>Pick a song from the left, or hit <strong>+ New Song</strong> to add one. You can paste a chord-site URL, autofill metadata or lyrics, or paste a chord sheet — then tailor everything to your taste.</p>
    </div>
  </section>
</main>

<input type="file" id="import-file" accept="application/json" hidden />

<!-- Embedded seed data — used when localStorage is empty.
     Mirrors data.json so the app works on file:// (where fetch is blocked by CORS). -->

      "sourceUrl": "",
      "lyrics": "{Verse}\n[C]Twinkle twinkle [F]little [C]star\n[F]How I [C]wonder [G]what you [C]are\n[C]Up a[F]bove the [C]world so [G]high\n[C]Like a [F]diamond [G]in the [C]sky\n[C]Twinkle twinkle [F]little [C]star\n[F]How I [C]wonder [G]what you [C]are",
      "notes": "Lullaby standard — useful for warming up the right hand on piano (C major arpeggios) or for teaching kids basic chord changes on guitar.\n\nPiano voicing: left-hand root-fifth, right-hand triads.\nGuitar: open C, F, G — try Fmaj7 (xx3210) instead of full F if barre is rough.",

      "updatedAt": 1745529600000
    },
    {
      "id": "seed-house",
      "title": "House of the Rising Sun",
      "artist": "Traditional",
      "key": "Am",
      "capo": 0,

<script>
//=============================================================
// STORAGE
//=============================================================
const STORE_KEY = "chordarchive_v1";
const SCHEMA_VERSION = 2;

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.warn(e); }
  return { version: SCHEMA_VERSION, songs: [] };
}
function saveState(state) {
  state.version = SCHEMA_VERSION;
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}
async function fetchSeed() {
  const inline = document.getElementById("seed-data");
  if (inline?.textContent?.trim()) {
    try { return JSON.parse(inline.textContent); }
    catch (e) { console.warn("Inline seed parse failed:", e); }
  }
  try {
    const res = await fetch("data.json", { cache: "no-cache" });
    if (res.ok) return await res.json();
  } catch (e) { /* file:// blocks fetch */ }
  return null;
}
function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4); }
function now() { return Date.now(); }

//=============================================================
// MUSIC THEORY
//=============================================================
const NOTE_PC = { C:0,"C#":1,Db:1,D:2,"D#":3,Eb:3,E:4,F:5,"F#":6,Gb:6,G:7,"G#":8,Ab:8,A:9,"A#":10,Bb:10,B:11 };
const PC_SHARP = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const PC_FLAT  = ["C","Db","D","Eb","E","F","Gb","G","Ab","A","Bb","B"];

function normalizeAccidental(s) { return s.replace(/♯/g,"#").replace(/♭/g,"b"); }

function splitChord(name) {
  if (!name) return null;
  const cleaned = normalizeAccidental(name.trim());
  const m = cleaned.match(/^([A-G])([#b]?)(.*?)(?:\/([A-G])([#b]?))?$/);
  if (!m) return null;
  const rootStr = m[1] + (m[2] || "");
  const qualPart = m[3] || "";
  const bassStr = m[4] ? (m[4] + (m[5] || "")) : null;
  const root = NOTE_PC[rootStr];
  const bass = bassStr ? NOTE_PC[bassStr] : null;
  if (root === undefined) return null;
  return { root, rootStr, quality: qualPart, bass, bassStr, raw: cleaned };
}

function qualityToIntervals(quality) {
  const ivs = new Set([0]);
  const orig = quality;
  let q = quality;

  let triadAdded = false;
  const isHalfDim = quality.includes("ø");
  if (isHalfDim) {
    ivs.add(3); ivs.add(6); triadAdded = true;
    q = q.replace(/ø/g, "");
  }
  const susMatch = !triadAdded ? q.match(/sus([24])?/i) : null;
  if (susMatch) {
    if (susMatch[1] === "2") { ivs.add(2); ivs.add(7); }
    else                     { ivs.add(5); ivs.add(7); }
    triadAdded = true;
    q = q.replace(/sus[24]?/i, "");
  }
  if (!triadAdded) {
    if (/^dim/i.test(q) || q.startsWith("°")) {
      ivs.add(3); ivs.add(6); triadAdded = true;
      q = q.replace(/^(dim|°)/i, "");
    } else if (/^aug/i.test(q) || q.startsWith("+")) {
      ivs.add(4); ivs.add(8); triadAdded = true;
      q = q.replace(/^(aug|\+)/i, "");
    } else if (/^min/i.test(q) || (/^m/.test(q) && !/^maj|^M(?!\d)/.test(q) && !/^M$/.test(q))) {
      ivs.add(3); ivs.add(7); triadAdded = true;
      q = q.replace(/^(min|m)/i, "");
    }
  }
  if (!triadAdded) {
    ivs.add(4); ivs.add(7);
    q = q.replace(/^(maj|M)(?=\d|$|aj)/i, "");
  }

  const isMaj7 = /maj7|M7|Δ/.test(orig);
  const hasAnyAdd = /add\d/.test(orig);
  const hasPlain7 = /(?<!ad)7/.test(orig);
  if (isMaj7) ivs.add(11);
  else if (hasPlain7 && !isMaj7) ivs.add(10);
  if (isHalfDim) ivs.add(10);

  if (/(?<!\d)6(?!\d)/.test(orig)) ivs.add(9);

  const has9  = /(?<!1)9(?!th)/.test(orig);
  const has11 = /11/.test(orig);
  const has13 = /13/.test(orig);
  if (has9)  ivs.add(14);
  if (has11) ivs.add(17);
  if (has13) { ivs.add(21); ivs.add(14); }
  if ((has9 || has11 || has13) && !hasAnyAdd && !ivs.has(10) && !ivs.has(11)) {
    ivs.add(10);
  }
  if (isMaj7 || /maj(9|11|13)|M(9|11|13)/.test(orig)) {
    ivs.delete(10); ivs.add(11);
  }

  if (/add9/i.test(orig))  ivs.add(14);
  if (/add11/i.test(orig)) ivs.add(17);
  if (/add13/i.test(orig)) ivs.add(21);

  if (/b5/.test(orig)) { ivs.delete(7); ivs.add(6); }
  if (/#5/.test(orig)) { ivs.delete(7); ivs.add(8); }
  if (/b9/.test(orig)) ivs.add(13);
  if (/#9/.test(orig)) ivs.add(15);
  if (/#11/.test(orig)) ivs.add(18);
  if (/b13/.test(orig)) ivs.add(20);

  return [...ivs].sort((a,b) => a - b);
}

// ---- Key auto-detection ----
// Score each major + minor key by how many of the song's chords are diatonic.
// Bonus weight for matches at the start/end of the chord progression.
const MAJOR_DIATONIC_QUALITIES = ["", "m", "m", "", "", "m", "dim"]; // I ii iii IV V vi vii°
const MINOR_DIATONIC_QUALITIES = ["m", "dim", "", "m", "m", "", ""]; // i ii° III iv v VI VII (natural minor)
const MAJOR_DEGREES = [0, 2, 4, 5, 7, 9, 11];
const MINOR_DEGREES = [0, 2, 3, 5, 7, 8, 10];

function buildDiatonicSet(rootPc, isMinor) {
  const degrees = isMinor ? MINOR_DEGREES : MAJOR_DEGREES;
  const qualities = isMinor ? MINOR_DIATONIC_QUALITIES : MAJOR_DIATONIC_QUALITIES;
  const out = new Set();
  for (let i = 0; i < 7; i++) {
    out.add(((rootPc + degrees[i]) % 12) + ":" + qualities[i]);
  }
  return out;
}

function chordSimpleKey(chord) {
  // Returns "<rootPc>:<basicQuality>" — basicQuality is "", "m", or "dim"
  if (!chord) return null;
  const ivs = qualityToIntervals(chord.quality);
  const set = new Set(ivs);
  let q = "";
  if (set.has(3) && set.has(7))      q = "m";
  else if (set.has(3) && set.has(6)) q = "dim";
  else if (set.has(4) && set.has(8)) q = ""; // aug — treat like major for diatonic match
  // sus / extensions: drop them, treat as major triad
  return chord.root + ":" + q;
}

function detectKey(chordNames) {
  if (!chordNames || !chordNames.length) return null;
  const parsed = chordNames.map(c => splitChord(c)).filter(Boolean);
  if (!parsed.length) return null;

  let best = null, bestScore = -Infinity;
  for (let root = 0; root < 12; root++) {
    for (const isMinor of [false, true]) {
      const dia = buildDiatonicSet(root, isMinor);
      let score = 0;
      for (const c of parsed) {
        const key = chordSimpleKey(c);
        if (dia.has(key)) score += 1;
      }
      // First/last chord matching the tonic gets a boost (first is a stronger signal)
      const tonicKey = root + ":" + (isMinor ? "m" : "");
      if (chordSimpleKey(parsed[0]) === tonicKey) score += 2.5;
      if (chordSimpleKey(parsed[parsed.length - 1]) === tonicKey) score += 1.5;
      // V→I cadence boost: if any consecutive pair is dominant→tonic, strong signal for the key
      const dominantPc = (root + 7) % 12;
      const dominantKey = dominantPc + ":";  // major V (works in both major and "harmonic minor" usage)
      for (let p = 0; p < parsed.length - 1; p++) {
        if (chordSimpleKey(parsed[p]) === dominantKey && chordSimpleKey(parsed[p+1]) === tonicKey) {
          score += 1.5; break;
        }
      }
      // Slight preference for major when scores tie (more common in pop/folk)
      if (!isMinor) score += 0.1;
      // Prefer simpler keys (fewer accidentals): C major / G major / D major / etc.
      if ([0, 5, 7, 9, 2, 4].includes(root)) score += 0.05;

      if (score > bestScore) {
        bestScore = score;
        best = { root, isMinor };
      }
    }
  }
  if (!best || bestScore < 1) return null;
  return pcToName(best.root, false) + (best.isMinor ? "m" : "");
}

function chordNotes(chord) {
  const ivs = qualityToIntervals(chord.quality);
  const notes = ivs.map(i => ({ pc: (chord.root + i) % 12, isRoot: i === 0, isBass: false }));
  if (chord.bass !== null) {
    let already = notes.find(n => n.pc === chord.bass);
    if (already) already.isBass = true;
    else notes.unshift({ pc: chord.bass, isRoot: false, isBass: true });
  }
  return notes;
}

function pcToName(pc, preferFlat=false) {
  return (preferFlat ? PC_FLAT : PC_SHARP)[((pc % 12) + 12) % 12];
}

// GUITAR SHAPES
//=============================================================

  "Bm7":   { frets:[-1,2,0,2,0,2], fingers:[0,2,0,3,0,4] },

  "Fmaj7": { frets:[-1,-1,3,2,1,0], fingers:[0,0,3,2,1,0] },
  "Gmaj7": { frets:[3,2,0,0,0,2], fingers:[3,2,0,0,0,1] },

  "Bmaj7": { frets:[-1,2,4,3,4,2], fingers:[0,1,3,2,4,1], barre:{fret:2,from:1,to:5} },
  "Asus2": { frets:[-1,0,2,2,0,0] },
  "Asus4": { frets:[-1,0,2,2,3,0] },

const E_SHAPE_TEMPLATES = {
  "":    [0,2,2,1,0,0],
  "m":   [0,2,2,0,0,0],
  "7":   [0,2,0,1,0,0],
  "m7":  [0,2,0,0,0,0],
  "maj7":[0,2,1,1,0,0],
  "sus4":[0,2,2,2,0,0],
};

function lookupShape(chordName) {
  if (GUITAR_SHAPES[chordName]) return GUITAR_SHAPES[chordName];
  const parsed = splitChord(chordName);
  if (!parsed) return null;
  const q = parsed.quality;
  let key = null;
  if (q === "" || q === "M" || q === "maj") key = "";
  else if (q === "m" || q === "min") key = "m";
  else if (q === "7") key = "7";
  else if (/^m7$|^min7$/.test(q)) key = "m7";
  else if (/^maj7$|^M7$/.test(q)) key = "maj7";
  else if (/^sus4?$/.test(q)) key = "sus4";
  if (key === null) return null;
  const tpl = E_SHAPE_TEMPLATES[key];
  if (!tpl) return null;

  const offset = ((parsed.root - 4) + 12) % 12;
  if (offset === 0) return { frets: tpl.slice(), derived: true };
  const frets = tpl.map(f => f === -1 ? -1 : f + offset);
  return { frets, derived: true, barre: { fret: offset, from: 0, to: 5 } };
}

//=============================================================
// SVG: Guitar
//=============================================================
function svgGuitar(chordName, custom, size="md") {
  const shape = custom || lookupShape(chordName);
  if (!shape) {
    return `<div class="muted small" style="text-align:center;padding:24px 0;">No diagram for <b>${escapeHtml(chordName)}</b><br><span class="micro">Add a custom shape below.</span></div>`;
  }
  const frets = shape.frets;
  const fingers = shape.fingers || [];
  const minFret = Math.max(0, Math.min(...frets.filter(f => f > 0)) || 0);
  const useFretsFrom = (Math.max(...frets) > 4 && minFret > 0) ? minFret : 0;
  const NUM_FRETS = 5;
  const dim = size === "sm" ? { W: 110, H: 138, padTop: 24, padBot: 14, padX: 16 } :
              size === "lg" ? { W: 150, H: 180, padTop: 32, padBot: 20, padX: 22 } :
                              { W: 130, H: 160, padTop: 28, padBot: 16, padX: 18 };
  const { W, H, padTop, padBot, padX } = dim;
  const stringGap = (W - padX*2) / 5;
  const fretGap = (H - padTop - padBot) / NUM_FRETS;

  let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  for (let s = 0; s < 6; s++) {
    const x = padX + s * stringGap;
    const f = frets[s];
    if (f === -1) {
      svg += `<text x="${x}" y="${padTop - 8}" text-anchor="middle" font-size="13" fill="#b41a1a" font-family="ui-monospace,monospace">×</text>`;
    } else if (f === 0) {
      svg += `<circle cx="${x}" cy="${padTop - 8}" r="4" fill="none" stroke="#14161a" stroke-width="1.4"/>`;
    }
  }
  for (let s = 0; s < 6; s++) {
    const x = padX + s * stringGap;
    svg += `<line x1="${x}" y1="${padTop}" x2="${x}" y2="${H - padBot}" stroke="#bbb" stroke-width="1"/>`;
  }
  for (let i = 0; i <= NUM_FRETS; i++) {
    const y = padTop + i * fretGap;
    const w = (i === 0 && useFretsFrom === 0) ? 3 : 1;
    svg += `<line x1="${padX}" y1="${y}" x2="${W - padX}" y2="${y}" stroke="#14161a" stroke-width="${w}"/>`;
  }
  if (useFretsFrom > 0) {
    svg += `<text x="${padX - 5}" y="${padTop + fretGap*0.7}" text-anchor="end" font-size="11" fill="#6b7180" font-family="ui-monospace,monospace">${useFretsFrom}fr</text>`;
  }
  if (shape.barre) {
    const b = shape.barre;
    const relFret = b.fret - useFretsFrom;
    if (relFret >= 0 && relFret < NUM_FRETS) {
      const y = padTop + (relFret - 0.5) * fretGap + fretGap;
      const x1 = padX + b.from * stringGap;
      const x2 = padX + b.to * stringGap;
      svg += `<rect x="${x1 - 7}" y="${y - 7}" width="${x2 - x1 + 14}" height="14" rx="7" fill="#14161a" opacity="0.85"/>`;
    }

    const f = frets[s];

        svg += `<circle cx="${x}" cy="${cy}" r="6.5" fill="#14161a"/>`;
        if (fingers[s]) {

        }
      }

//=============================================================
// SVG: Piano
//=============================================================
const WHITE_KEYS_PC = [0, 2, 4, 5, 7, 9, 11];
const BLACK_KEYS = [
  { afterWhite: 0, pc: 1 },
  { afterWhite: 1, pc: 3 },
  { afterWhite: 3, pc: 6 },
  { afterWhite: 4, pc: 8 },
  { afterWhite: 5, pc: 10 },
];

function svgPiano(chordName, octaves=2, size="md") {
  const parsed = splitChord(chordName);
  if (!parsed) return `<div class="muted small">No piano diagram for ${escapeHtml(chordName)}</div>`;
  const notes = chordNotes(parsed);
  const noteSet = new Set(notes.map(n => n.pc));
  const rootPc = parsed.root;
  const bassPc = parsed.bass;
  const dim = size === "sm" ? { whiteW: 18, whiteH: 80, blackW: 11, blackH: 50 } :
              size === "lg" ? { whiteW: 26, whiteH: 110, blackW: 16, blackH: 70 } :
                              { whiteW: 22, whiteH: 100, blackW: 13, blackH: 62 };
  const { whiteW, whiteH, blackW, blackH } = dim;
  const totalWhites = 7 * octaves;
  const W = whiteW * totalWhites, H = whiteH;
  let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;

  for (let i = 0; i < totalWhites; i++) {
    const pc = WHITE_KEYS_PC[i % 7];
    const isHit = noteSet.has(pc);
    const isRoot = (pc === rootPc);
    const x = i * whiteW;
    const fill = isRoot ? "#b14a2c" : (isHit ? "#1e3a8a" : "#fff");
    svg += `<rect x="${x}" y="0" width="${whiteW}" height="${whiteH}" fill="${fill}" stroke="#14161a" stroke-width="1"/>`;
    if (isHit) {
      svg += `<text x="${x + whiteW/2}" y="${whiteH - 10}" text-anchor="middle" font-size="9" fill="#fff" font-family="ui-sans-serif" font-weight="600">${pcToName(pc)}</text>`;
    }
  }
  for (let oct = 0; oct < octaves; oct++) {
    for (const bk of BLACK_KEYS) {
      const i = oct * 7 + bk.afterWhite;
      const x = (i + 1) * whiteW - blackW/2;
      const isHit = noteSet.has(bk.pc);
      const isRoot = (bk.pc === rootPc);
      const fill = isRoot ? "#b14a2c" : (isHit ? "#1e3a8a" : "#14161a");
      svg += `<rect x="${x}" y="0" width="${blackW}" height="${blackH}" fill="${fill}" stroke="#14161a" stroke-width="1"/>`;
      if (isHit) {
        svg += `<text x="${x + blackW/2}" y="${blackH - 8}" text-anchor="middle" font-size="8" fill="#fff" font-family="ui-sans-serif" font-weight="600">${pcToName(bk.pc)}</text>`;
      }
    }
  }
  svg += `</svg>`;
  return svg;
}

// CHORD-SHEET PARSING (paste flow)

function isChordToken(tok) {

  if (/^\[[A-G][^\]]*\](\s+\[[A-G][^\]]*\])*\s*$/.test(stripped)) return true;
  const toks = stripped.split(/\s+/).filter(Boolean);
  if (toks.length === 0) return false;
  if (/^[A-Z][a-zA-Z ]*:?$/.test(stripped) && !isChordToken(toks[0])) return false;

}

  let i = 0;
  while (i < chordLine.length) {
    if (chordLine[i] === " " || chordLine[i] === "\t") { i++; continue; }
    let j = i;
    while (j < chordLine.length && chordLine[j] !== " " && chordLine[j] !== "\t") j++;
    insertions.push({ col: i, chord: chordLine.slice(i, j) });
    i = j;
  }
  const lastCol = insertions.length ? insertions[insertions.length - 1].col : 0;
  if (lyricLine.length < lastCol + 4) lyricLine = lyricLine.padEnd(lastCol + 4, " ");

    let col = ins.col;
    const nextCol = idx + 1 < insertions.length ? insertions[idx + 1].col : Infinity;
    if (col < lyricLine.length && /\s/.test(lyricLine[col])) {
      let scan = col;
      while (scan < lyricLine.length && /\s/.test(lyricLine[scan]) && scan < nextCol) scan++;
      if (scan < nextCol) col = scan;

    return { col, chord: ins.chord };

    out += lyricLine.slice(cursor, ins.col);

  }

// Convert inline ChordPro ("I [F]sucked the [Am]moon") to chord-line-above-lyric format
//   "  F          Am
//    I sucked the moon"
// The detail view always renders from the ChordPro storage; this is just for the editor.
function chordProToChordSheet(text) {
  if (!text) return "";
  return text.split("\n").map(line => {
    // Section label
    const sec = line.match(/^\s*\{([^}]+)\}\s*$/);
    if (sec) return "[" + sec[1].trim() + "]";
    // No chords — keep as plain lyric line
    if (!/\[[^\]]+\]/.test(line)) return line;
    // Build chord line and lyric line in parallel
    const parts = line.split(/(\[[^\]]+\])/g).filter(p => p.length > 0);
    let chordLine = "", lyricLine = "";
    for (const part of parts) {
      if (/^\[[^\]]+\]$/.test(part)) {
        const chord = part.slice(1, -1);
        // Pad chord line up to current lyric column (or to end of existing chord line + 1, whichever is greater)
        const targetCol = Math.max(lyricLine.length, chordLine.length === 0 ? 0 : chordLine.length + 1);
        while (chordLine.length < targetCol) chordLine += " ";
        chordLine += chord;
      } else {
        lyricLine += part;
      }
    }
    chordLine = chordLine.replace(/\s+$/, "");
    const trimmedLyric = lyricLine.replace(/\s+$/, "");
    if (!trimmedLyric) return chordLine; // chord-only line
    if (!chordLine)    return lyricLine; // lyric-only (shouldn't happen since we returned earlier)
    return chordLine + "\n" + trimmedLyric;

// After conversion, chord brackets may land mid-word because UG's [ch]F[/ch] (9 chars)
// shrinks to [F] (3 chars), shifting column alignment. This pass walks each line
// and moves any chord that landed inside a word back to that word's start.
function snapChordsInLine(line) {
  if (!/\[[^\]]+\]/.test(line)) return line;
  // Skip section labels like "{Verse}" — those aren't chord lines
  if (/^\s*\{[^}]+\}\s*$/.test(line)) return line;
  const parts = line.split(/(\[[^\]]+\])/g).filter(s => s.length > 0);
  let result = "";
  const pending = [];
  for (let i = 0; i < parts.length; i++) {
    const part = parts[i];
    if (/^\[[^\]]+\]$/.test(part)) {
      pending.push(part);
      continue;
    }
    if (pending.length === 0) { result += part; continue; }
    // We have pending chord(s) coming before this text part.
    const partFirstIsNonSpace = part.length > 0 && /\S/.test(part[0]);
    const resultEndsWithNonSpace = result.length > 0 && /\S/.test(result[result.length - 1]);
    if (partFirstIsNonSpace && resultEndsWithNonSpace) {
      // Mid-word: snap chord(s) back to the start of the current word.
      // If there are already chords at that word-start, insert AFTER them so order is preserved.
      const lastSpace = result.lastIndexOf(" ");
      const afterSpace = lastSpace + 1; // 0 if no prior space
      let insertAt = afterSpace;
      while (insertAt < result.length && result[insertAt] === "[") {
        const close = result.indexOf("]", insertAt);
        if (close === -1) break;
        insertAt = close + 1;
      }
      result = result.slice(0, insertAt) + pending.join("") + result.slice(insertAt) + part;
    } else {
      result += pending.join("") + part;
    }
    pending.length = 0;
  }
  // Trailing chords with no following text — leave them at the end
  if (pending.length) result += pending.join("");
  return result;
}
function snapChordsToWordBoundaries(text) {
  return text.split("\n").map(snapChordsInLine).join("\n");

function parseChordSheet(text) {
  if (!text || !text.trim()) return { lyrics: "" };
  const lines = text.replace(/\r\n/g, "\n").split("\n");
  const out = [];
  let title = null, artist = null, key = null;
  const remaining = [];
  for (const ln of lines) {
    const dm = ln.match(/^\s*\{\s*(title|t|artist|a|subtitle|st|key|k)\s*:\s*([^}]+)\}\s*$/i);
    if (dm) {
      const tag = dm[1].toLowerCase(); const val = dm[2].trim();
      if (tag === "title" || tag === "t") title = val;
      else if (tag === "artist" || tag === "a" || tag === "subtitle" || tag === "st") artist = val;
      else if (tag === "key" || tag === "k") key = val;
      continue;
    }
    if (/^\s*\{[^}]+\}\s*$/.test(ln)) continue;
    remaining.push(ln);
  }
  if (!title && remaining.length) {
    const first = remaining[0].trim();
    const m = first.match(/^(.{2,80}?)\s+[-–—]\s+(.{2,80})$/);
    if (m && !isChordLine(first) && !isSectionLabel(first)) {
      title = m[1].trim(); artist = m[2].trim(); remaining.shift();
    }
  }
  let i = 0;
  while (i < remaining.length) {
    const ln = remaining[i];
    if (!ln.trim()) { out.push(""); i++; continue; }
    if (isSectionLabel(ln)) {
      const stripped = ln.trim().replace(/^[\[(]|[\])]$/g, "").replace(/:$/, "");
      out.push("{" + stripped + "}");
      i++; continue;
    }
    if (isChordLine(ln)) {
      const next = remaining[i + 1];
      if (next !== undefined && next.trim() && !isChordLine(next) && !isSectionLabel(next)) {
        out.push(mergeChordsIntoLyric(ln, next));
        i += 2;
      } else {
        const toks = ln.trim().split(/\s+/);
        out.push(toks.map(t => "[" + t + "]").join(" "));
        i++;
      }
    } else {
      out.push(ln);
      i++;
    }
  }
  // Snap any mid-word chord brackets back to the start of their word.
  // Catches the common UG case where [ch]F[/ch] → [F] shifts column alignment.
  const cleaned = snapChordsToWordBoundaries(out.join("\n")).trim();
  return { lyrics: cleaned, title, artist, key };
}

async function lookupMusicBrainz(title, artist) {
  const q = `recording:"${title.replace(/"/g, "\\\"")}" AND artist:"${artist.replace(/"/g, "\\\"")}"`;
  const url = `https://musicbrainz.org/ws/2/recording/?query=${encodeURIComponent(q)}&fmt=json&limit=5`;
  const res = await fetch(url, { headers: { "Accept": "application/json" }});

  if (!data.recordings || !data.recordings.length) return null;
  const r = data.recordings[0];
  return {
    title: r.title,
    artist: r["artist-credit"]?.map(a => a.name).join(", ") || artist,
    mbid: r.id,
  };
}
async function lookupLyrics(title, artist) {
  const url = `https://api.lyrics.ovh/v1/${encodeURIComponent(artist)}/${encodeURIComponent(title)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("Lyrics request failed: " + res.status);
  const data = await res.json();
  if (!data || !data.lyrics) return null;
  return data.lyrics.replace(/\r\n/g, "\n").trim();

// ----- Best-effort scraper for chord-site URLs -----
const CORS_PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,

async function fetchViaProxy(url) {
  let lastErr = null;
  for (const proxify of CORS_PROXIES) {
    try {
      const res = await fetch(proxify(url), { cache: "no-cache" });
      if (res.ok) {
        const txt = await res.text();
        if (txt && txt.length > 200) return txt;
        lastErr = new Error("Empty body");
      } else {
        lastErr = new Error("Proxy " + res.status);
      }
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error("All proxies failed");
}

function decodeHtmlEntities(s) {

  ta.innerHTML = s;

}

  return s
    .replace(/\[ch\]([^\[]+)\[\/ch\]/g, (_, c) => "[" + c.trim() + "]")
    .replace(/\[\/?tab\]/g, "");
}

  if (m) {

      const data = json?.store?.page?.data;
      const tab = data?.tab_view?.wiki_tab?.content || data?.tab?.wiki_tab?.content;
      const titleField = data?.tab?.song_name || data?.tab_view?.versions?.[0]?.song_name;
      const artistField = data?.tab?.artist_name || data?.tab_view?.versions?.[0]?.artist_name;

async function importFromUrl(url) {
  if (!/^https?:\/\//i.test(url)) throw new Error("Please paste a full URL (https://…)");
  const host = new URL(url).hostname.replace(/^www\./, "");
  const isUG = /ultimate-guitar\.com/.test(host);

  let html;

    html = await fetchViaProxy(url);
  } catch (e) {

  }

    parsed = parseUltimateGuitar(html);

  }

    parsed.title = parsed.title || meta.title;
    parsed.artist = parsed.artist || meta.artist;
  }
  return parsed;
}

// ----- Bookmarklet — runs in user's logged-in browser, bypasses CF + CORS -----
// On click: scrape current page → open Chord Archive with a #new= hash that

function bookmarkletSource() {
  const fn = function() {
    let lyrics = "", title = "", artist = "";
    const host = location.hostname;
    function ugToChordPro(s) {
      return s.replace(/\[ch\]([^\[]+)\[\/ch\]/g, (_, c) => "[" + c.trim() + "]")
              .replace(/\[\/?tab\]/g, "");
    }
    if (/ultimate-guitar\.com/.test(host)) {
      const store = document.querySelector(".js-store");
      if (store && store.dataset && store.dataset.content) {
        try {
          const data = JSON.parse(store.dataset.content);
          const root = data?.store?.page?.data || {};
          const tab = root?.tab_view?.wiki_tab?.content || root?.tab?.wiki_tab?.content;
          if (tab) lyrics = ugToChordPro(tab);
          const ac = [root?.tab?.artist_name, root?.tab?.artist, root?.tab_view?.versions?.[0]?.artist_name, root?.tab_view?.meta?.artist, root?.tab_view?.song?.artist_name].find(c => typeof c === "string" && c.trim());
          const tc = [root?.tab?.song_name, root?.tab?.title, root?.tab_view?.versions?.[0]?.song_name, root?.tab_view?.song?.title].find(c => typeof c === "string" && c.trim());
          if (ac) artist = ac;
          if (tc) title = tc;
        } catch (e) {}
      }
      if (!artist) {
        const og = document.querySelector('meta[property="og:title"]');
        if (og) {
          const t = og.getAttribute("content") || "";
          const m = t.match(/^(.+?)\s+(?:Chords|Tab|Bass|Ukulele)?\s*(?:by|-|–|—)\s+([^|@\-–—]+?)(?:\s*[\|@\-–—].*)?$/i);
          if (m) { if (!title) title = m[1].trim(); artist = m[2].trim(); }
        }
      }
    }
    if (!lyrics && /e-chords\.com/.test(host)) {
      const pre = document.querySelector("pre#core") || document.querySelector("pre");
      if (pre) lyrics = ugToChordPro(pre.textContent);
    }
    if (!lyrics) {
      const pres = [...document.querySelectorAll("pre")]
        .filter(p => p.textContent.length > 100)
        .sort((a,b) => b.textContent.length - a.textContent.length);
      if (pres[0]) lyrics = pres[0].textContent;
    }
    if (!title) {
      title = document.querySelector("h1")?.textContent?.trim()
            || document.title.replace(/\s*[\|@\-–—].*/, "").trim();
    }
    if (!lyrics) { alert("Chord Archive: couldn't find a chord chart on this page."); return; }

    const payload = btoa(unescape(encodeURIComponent(JSON.stringify({
      title, artist, lyrics, sourceUrl: location.href
    }))));
    const target = "https://songs.markpytlik.com/#new=" + payload;
    if (target.length > 500000) {
      alert("Chord Archive: chart is too large for direct import. Falling back to clipboard.");
      navigator.clipboard.writeText(lyrics);
      window.open("https://songs.markpytlik.com/", "_blank");
      return;
    }
    window.open(target, "_blank");
  };
  const body = "(" + fn.toString().replace(/\s+/g, " ") + ")();";
  return "javascript:" + encodeURIComponent(body);
}

  const out = [];
  for (const line of lines) {
    if (!line.trim()) { out.push(""); continue; }
    const sec = line.match(/^\s*\{([^}]+)\}\s*$/);
    if (sec) {
      out.push(`<span class="section-label">${escapeHtml(sec[1])}</span>`);
      continue;
    }
    let html = "";
    const re = /\[([^\]]+)\]([^\[]*)|([^\[]+)/g;
    let m;
    while ((m = re.exec(line)) !== null) {
      if (m[1] !== undefined) {
        const chord = m[1];
        const text = m[2] || "";
        const safeText = text.length === 0 ? "&nbsp;" : escapeHtml(text);
        html += `<span class="seg"><span class="chord" data-chord="${escapeHtml(chord)}">${escapeHtml(chord)}</span>${safeText}</span>`;
      } else {
        html += `<span class="seg">${escapeHtml(m[3])}</span>`;
      }
    }
    out.push(html);
  }
  return out.join("\n");
}
function extractChords(text) {
  if (!text) return [];
  const re = /\[([^\]]+)\]/g;
  const set = new Set(); let m;
  while ((m = re.exec(text)) !== null) {
    const c = m[1].trim();
    if (splitChord(c)) set.add(c);
  }
  return [...set];
}

const state = {
  songs: [],
  selectedId: null,
  search: "",
  filterInstrument: "all",
  sort: "updated",
  editing: false,
};

function getFiltered() {
  let list = state.songs.slice();
  if (state.filterInstrument !== "all") {
    list = list.filter(s => {
      if (state.filterInstrument === "both") return s.instruments?.length === 2;
      return (s.instruments || []).includes(state.filterInstrument);
    });
  }
  if (state.search) {
    const q = state.search.toLowerCase();
    list = list.filter(s =>
      (s.title || "").toLowerCase().includes(q) ||
      (s.artist || "").toLowerCase().includes(q) ||
      (s.lyrics || "").toLowerCase().includes(q)
    );
  }
  if (state.sort === "title") list.sort((a,b) => (a.title || "").localeCompare(b.title || ""));
  else if (state.sort === "artist") list.sort((a,b) => (a.artist || "").localeCompare(b.artist || ""));
  else list.sort((a,b) => (b.updatedAt || 0) - (a.updatedAt || 0));
  return list;
}

function setHelper(msg, kind="") {
  const el = document.getElementById("helper");
  if (!el) return;

}

function blankSong() {
  return { id: uid(), title: "", artist: "", key: "", capo: 0, instruments: ["guitar"], lyrics: "", notes: "", sourceUrl: "", voicings: {}, createdAt: now(), updatedAt: now() };
}

// ---- Voicings model ----
// song.voicings[chordName] = [ { frets:[…], pianoNotes:[pc,…]?, note:"…" }, … ]
// Default voicing #0 is the built-in (lookupShape) — only stored explicitly when user customizes.
// This getter returns the merged list: built-in first, then user-saved voicings.
function getVoicings(song, chordName) {
  // Migration shim: old { customShapes, voicingNotes } → new voicings array
  if (song.customShapes || song.voicingNotes) {
    song.voicings = song.voicings || {};
    for (const [name, shape] of Object.entries(song.customShapes || {})) {
      if (!song.voicings[name]) {
        song.voicings[name] = [{
          frets: shape.frets,
          fingers: shape.fingers,
          barre: shape.barre,
          note: (song.voicingNotes || {})[name] || "",
        }];
      }
    }
    delete song.customShapes;
    delete song.voicingNotes;
  }
  song.voicings = song.voicings || {};
  const list = [];
  // Always start with the built-in lookup (or note "no built-in" placeholder)
  const builtIn = lookupShape(chordName);
  if (builtIn) {
    list.push({
      frets: builtIn.frets,
      fingers: builtIn.fingers,
      barre: builtIn.barre,
      note: builtIn.derived ? "Movable barre shape" : "",
      builtIn: true,
    });
  }
  // Append user voicings
  for (const v of (song.voicings[chordName] || [])) {
    list.push(Object.assign({ builtIn: false }, v));
  }
  return list;
}

function saveVoicing(song, chordName, voicing, index) {
  song.voicings = song.voicings || {};
  song.voicings[chordName] = song.voicings[chordName] || [];
  const arr = song.voicings[chordName];
  if (typeof index === "number" && index >= 0 && index < arr.length) {
    arr[index] = voicing;
  } else {
    arr.push(voicing);
  }
  song.updatedAt = now();
}
function deleteVoicing(song, chordName, index) {
  if (!song.voicings || !song.voicings[chordName]) return;
  song.voicings[chordName].splice(index, 1);
  if (song.voicings[chordName].length === 0) delete song.voicings[chordName];
  song.updatedAt = now();
}
function startEdit(song) { state.editing = song; renderDetail(); }
function saveEdit(isNew, songSnapshot) {
  const id = songSnapshot.id;
  const instruments = [];
  if (document.getElementById("f-i-guitar").checked) instruments.push("guitar");
  if (document.getElementById("f-i-piano").checked) instruments.push("piano");
  // The textarea holds chord-line-above-lyric format; parse it back to ChordPro for storage.
  const rawLyrics = document.getElementById("f-lyrics").value;
  const parsedLyrics = parseChordSheet(rawLyrics).lyrics;

  const updates = {
    id,
    title: document.getElementById("f-title").value.trim(),
    artist: document.getElementById("f-artist").value.trim(),
    key: document.getElementById("f-key").value.trim(),
    capo: parseInt(document.getElementById("f-capo").value) || 0,
    instruments,
    sourceUrl: document.getElementById("f-source").value.trim(),
    lyrics: parsedLyrics,
    notes: document.getElementById("f-notes").value,
    updatedAt: now(),
  };
  if (!updates.title) { setHelper("A title is required.", "err"); return; }
  if (isNew) {
    const newSong = Object.assign(blankSong(), updates, { id });
    state.songs.push(newSong);
    state.selectedId = id;
  } else {
    const idx = state.songs.findIndex(s => s.id === id);
    if (idx === -1) { state.songs.push(Object.assign(blankSong(), updates, { id })); state.selectedId = id; }
    else state.songs[idx] = Object.assign({}, state.songs[idx], updates);
  }
  saveState({ songs: state.songs });
  state.editing = false;
  renderList(); renderDetail();
}
function deleteSong(song) {
  if (!confirm(`Delete "${song.title}"? This can't be undone.`)) return;
  state.songs = state.songs.filter(s => s.id !== song.id);
  state.selectedId = null;
  saveState({ songs: state.songs });
  renderList(); renderDetail();
}
function duplicateSong(song) {
  const copy = Object.assign({}, song, { id: uid(), title: song.title + " (copy)", createdAt: now(), updatedAt: now() });
  state.songs.push(copy);
  state.selectedId = copy.id;
  saveState({ songs: state.songs });
  renderList(); renderDetail();
}

//=============================================================
// HOVER POPOVER  (visual phrasings, cycles through voicings)
//=============================================================
let popoverEl = null;
let popoverTimer = null;
let popoverState = null; // { chordName, song, index }

function ensurePopover() {
  if (popoverEl) return popoverEl;
  popoverEl = document.createElement("div");
  popoverEl.className = "chord-popover";
  document.body.appendChild(popoverEl);
  // Keep popover open while hovering inside it
  popoverEl.addEventListener("mouseenter", () => clearTimeout(popoverTimer));
  popoverEl.addEventListener("mouseleave", () => {
    clearTimeout(popoverTimer);
    popoverTimer = setTimeout(hidePopover, 150);
  });
  return popoverEl;
}

function renderPopover(target) {
  const pop = ensurePopover();
  if (!popoverState) return;
  const { chordName, song, index } = popoverState;
  const wantGuitar = !song?.instruments || song.instruments.includes("guitar");
  const wantPiano  = !song?.instruments || song.instruments.includes("piano");
  const voicings = wantGuitar ? getVoicings(song, chordName) : [];
  const current = voicings[index] || null;
  const total = voicings.length;
  const guitarHtml = wantGuitar
    ? `<div class="diag-mini"><div class="label">Guitar${current && !current.builtIn ? " · custom" : ""}</div>${svgGuitar(chordName, current ? { frets: current.frets, fingers: current.fingers, barre: current.barre } : null, "sm")}</div>`
    : "";
  const pianoHtml = wantPiano
    ? `<div class="diag-mini"><div class="label">Piano</div>${svgPiano(chordName, 2, "sm")}</div>`
    : "";
  const both = wantGuitar && wantPiano;
  const cyclerHtml = (wantGuitar && total > 1) ? `
    <div class="pop-cycler">
      <button class="arrow" data-action="prev" ${index === 0 ? "disabled" : ""} title="Previous voicing">‹</button>
      <span class="count">${index + 1} of ${total}</span>
      <button class="arrow" data-action="next" ${index === total - 1 ? "disabled" : ""} title="Next voicing">›</button>
    </div>` : "";
  const noteHtml = (current && current.note) ? `<div class="voicing-note">${escapeHtml(current.note)}</div>` : "";
  const actionsHtml = `
    <div class="pop-actions">
      <button data-action="add" title="Add a new voicing">+ Add voicing</button>
      ${current && !current.builtIn ? `
        <button data-action="edit" title="Edit this voicing">Edit</button>
        <button data-action="delete" class="danger" title="Delete this voicing">Delete</button>
      ` : `<button data-action="edit-from-builtin" title="Customize this chord">Customize</button>`}
    </div>`;

  pop.innerHTML = `
    <div class="pop-header">${escapeHtml(chordName)}</div>
    <div class="pop-row ${both ? "" : "single"}">
      ${guitarHtml}${pianoHtml}
    </div>
    ${cyclerHtml}
    ${noteHtml}
    ${actionsHtml}
  `;

  pop.querySelectorAll("button[data-action]").forEach(btn => {
    btn.addEventListener("click", e => {
      const action = e.currentTarget.dataset.action;
      if (action === "prev") { popoverState.index = Math.max(0, index - 1); renderPopover(target); }
      else if (action === "next") { popoverState.index = Math.min(total - 1, index + 1); renderPopover(target); }
      else if (action === "add") { hidePopover(); openVoicingEditor(chordName, song, null); }
      else if (action === "edit") { hidePopover(); openVoicingEditor(chordName, song, getUserVoicingIndex(song, chordName, current)); }
      else if (action === "edit-from-builtin") { hidePopover(); openVoicingEditor(chordName, song, null, current); }
      else if (action === "delete") {
        if (confirm(`Delete this voicing of ${chordName}?`)) {
          deleteVoicing(song, chordName, getUserVoicingIndex(song, chordName, current));
          saveState({ songs: state.songs });
          // After delete, rebuild and re-render at safe index
          const newVoicings = wantGuitar ? getVoicings(song, chordName) : [];
          popoverState.index = Math.min(index, newVoicings.length - 1);
          renderPopover(target);
        }
      }
    });
  });
}

function getUserVoicingIndex(song, chordName, voicing) {
  // Map a popover voicing back to its index in song.voicings[chordName]
  if (!song.voicings || !song.voicings[chordName]) return -1;
  return song.voicings[chordName].findIndex(v =>
    JSON.stringify(v.frets) === JSON.stringify(voicing.frets)
  );
}

function showPopover(target, chordName, song) {
  popoverState = { chordName, song, index: 0 };
  const pop = ensurePopover();
  renderPopover(target);
  // Position
  const rect = target.getBoundingClientRect();
  pop.style.visibility = "hidden";
  pop.classList.add("show");
  const popRect = pop.getBoundingClientRect();
  let top = rect.bottom + 8;
  if (top + popRect.height > window.innerHeight - 8) {
    top = rect.top - popRect.height - 8;
  }
  let left = rect.left + (rect.width / 2) - (popRect.width / 2);
  left = Math.max(8, Math.min(window.innerWidth - popRect.width - 8, left));
  pop.style.top = top + "px";
  pop.style.left = left + "px";
  pop.style.visibility = "visible";
}

function hidePopover() {
  if (!popoverEl) return;
  popoverEl.classList.remove("show");
  popoverState = null;
}

function attachHoverPopover(rootEl, song) {
  rootEl.addEventListener("mouseover", e => {
    const t = e.target.closest(".chord[data-chord]");
    if (!t) return;
    clearTimeout(popoverTimer);
    popoverTimer = setTimeout(() => showPopover(t, t.dataset.chord, song), 220);
  });
  rootEl.addEventListener("mouseout", e => {
    if (!e.target.closest(".chord[data-chord]")) return;
    clearTimeout(popoverTimer);
    popoverTimer = setTimeout(hidePopover, 200);
  });
}

//=============================================================
// VOICING EDITOR  (add/edit a single voicing)
//=============================================================
function openVoicingEditor(chordName, song, editIndex, seedFromBuiltin) {
  const isEdit = typeof editIndex === "number" && editIndex >= 0;
  const existing = isEdit ? song.voicings?.[chordName]?.[editIndex] : null;
  // If "Customize" was clicked, seed the form with the built-in shape
  const seed = existing || seedFromBuiltin || null;
  const initFrets = seed ? fretsToString(seed.frets) : "";
  const initNote = seed?.note || "";

  const bg = document.createElement("div");
  bg.className = "modal-bg";
  bg.innerHTML = `
    <div class="modal" style="max-width:520px;">
      <h3>${isEdit ? "Edit voicing" : "Add voicing"} · ${escapeHtml(chordName)}</h3>
      <div class="modal-sub">${describeNotes(chordName)}</div>

      <div class="modal-form stack">
        <div>
          <label>Guitar shape <span class="muted">(low-E to high-E; <code>x</code> = muted, <code>0</code> = open)</span></label>
          <input id="ve-frets" placeholder="x32010" value="${escapeHtml(initFrets)}" />
          <div class="helper-msg" id="ve-preview"></div>
        </div>
        <div>
          <label>Note for this voicing <span class="muted">(optional)</span></label>
          <input id="ve-note" placeholder="e.g. open G ringing; rootless RH on piano" value="${escapeHtml(initNote)}" />
        </div>
      </div>

      <div class="actions">
        <button id="ve-cancel">Cancel</button>
        ${isEdit ? `<button id="ve-delete" class="danger">Delete</button>` : ""}
        <button id="ve-save" class="primary">${isEdit ? "Save" : "Add"}</button>
      </div>
    </div>
  `;
  document.body.appendChild(bg);
  bg.addEventListener("click", e => { if (e.target === bg) bg.remove(); });

  const fretsInput = bg.querySelector("#ve-frets");
  const preview = bg.querySelector("#ve-preview");
  function updatePreview() {
    const frets = stringToFrets(fretsInput.value.trim());
    if (!frets) {
      preview.textContent = fretsInput.value.trim() ? "Invalid shape — use 6 chars (digits or x). Example: x32010" : "";
      preview.className = "helper-msg err";
    } else {
      preview.innerHTML = svgGuitar(chordName, { frets }, "sm");
      preview.className = "helper-msg";
    }
  }
  fretsInput.addEventListener("input", updatePreview);
  updatePreview();

  bg.querySelector("#ve-cancel").addEventListener("click", () => bg.remove());
  bg.querySelector("#ve-save").addEventListener("click", () => {
    const frets = stringToFrets(fretsInput.value.trim());
    if (!frets) { alert("Invalid shape — use 6 characters: digits 0-9 or 'x' (mute). Example: x32010"); return; }
    const voicing = {
      frets,
      note: bg.querySelector("#ve-note").value.trim(),
    };
    saveVoicing(song, chordName, voicing, isEdit ? editIndex : undefined);
    saveState({ songs: state.songs });
    bg.remove();
  });
  if (isEdit) {
    bg.querySelector("#ve-delete").addEventListener("click", () => {
      if (!confirm(`Delete this voicing of ${chordName}?`)) return;
      deleteVoicing(song, chordName, editIndex);
      saveState({ songs: state.songs });
      bg.remove();
    });
  }
}

//=============================================================
// CHORD MODAL (click) — manage all voicings for a chord
//=============================================================
function openChordModal(chordName, song) {
  hidePopover();
  const wantGuitar = !song?.instruments || song.instruments.includes("guitar");
  const wantPiano  = !song?.instruments || song.instruments.includes("piano");
  const voicings = wantGuitar ? getVoicings(song, chordName) : [];

  const bg = document.createElement("div");
  bg.className = "modal-bg chord-modal";
  bg.innerHTML = `
    <div class="modal" role="dialog" aria-modal="true" style="max-width:680px;">
      <h3>${escapeHtml(chordName)}</h3>
      <div class="modal-sub">${describeNotes(chordName)}</div>

      ${wantPiano ? `
        <div class="diag-card" style="margin-top:12px;">
          <h4>Piano</h4>
          <div class="canvas">${svgPiano(chordName)}</div>
        </div>
      ` : ""}

      ${wantGuitar ? `
        <div style="display:flex; align-items:center; justify-content:space-between; margin: 18px 0 10px;">
          <h4 style="margin:0; font-size:11px; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; font-weight:600;">Guitar voicings</h4>
          <button id="cm-add" class="primary" style="font-size:13px; padding:5px 12px;">+ Add voicing</button>
        </div>
        <div id="cm-voicings" class="diag-grid" style="grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));">
          ${voicings.map((v, i) => `
            <div class="diag-card" data-vidx="${i}" data-builtin="${v.builtIn}">
              <h4>${v.builtIn ? "Built-in" : "Voicing " + i}</h4>
              <div class="canvas">${svgGuitar(chordName, { frets: v.frets, fingers: v.fingers, barre: v.barre }, "sm")}</div>
              <div class="meta">${fretsToString(v.frets)}</div>
              ${v.note ? `<div class="meta" style="margin-top:6px; color:var(--ink-soft); font-family:var(--sans); font-size:12px;">${escapeHtml(v.note)}</div>` : ""}
              ${!v.builtIn ? `
                <div style="display:flex; gap:4px; justify-content:center; margin-top:8px;">
                  <button class="ghost" data-vaction="edit" style="font-size:11.5px; padding:3px 8px;">Edit</button>
                  <button class="danger" data-vaction="delete" style="font-size:11.5px; padding:3px 8px;">Delete</button>
                </div>
              ` : ""}
            </div>
          `).join("")}
        </div>
      ` : ""}

      <div class="actions">
        <button id="cm-close">Close</button>
      </div>
    </div>
  `;
  document.body.appendChild(bg);
  bg.addEventListener("click", e => { if (e.target === bg) bg.remove(); });
  bg.querySelector("#cm-close").addEventListener("click", () => bg.remove());

  if (wantGuitar) {
    bg.querySelector("#cm-add").addEventListener("click", () => {
      bg.remove();
      openVoicingEditor(chordName, song, null);
    });
    bg.querySelectorAll("[data-vaction]").forEach(btn => {
      btn.addEventListener("click", e => {
        const card = e.currentTarget.closest("[data-vidx]");
        const i = parseInt(card.dataset.vidx);
        const v = voicings[i];
        const userIdx = getUserVoicingIndex(song, chordName, v);
        const action = e.currentTarget.dataset.vaction;
        if (action === "edit") {
          bg.remove();
          openVoicingEditor(chordName, song, userIdx);
        } else if (action === "delete") {
          if (confirm(`Delete this voicing of ${chordName}?`)) {
            deleteVoicing(song, chordName, userIdx);
            saveState({ songs: state.songs });
            bg.remove();
            openChordModal(chordName, song);
          }
        }
      });
    });
  }
}
function fretsToString(frets) {
  return frets.map(f => f === -1 ? "x" : String(f)).join("");
}
function stringToFrets(s) {
  if (!s) return null;
  const cleaned = s.toLowerCase().replace(/\s+/g, "");
  if (cleaned.length === 6 && /^[x0-9]{6}$/.test(cleaned)) {
    return [...cleaned].map(c => c === "x" ? -1 : parseInt(c));
  }
  const parts = s.toLowerCase().split(/\s+/).filter(Boolean);
  if (parts.length === 6 && parts.every(p => p === "x" || /^\d+$/.test(p))) {
    return parts.map(p => p === "x" ? -1 : parseInt(p));
  }
  return null;
}
function describeNotes(chordName) {
  const c = splitChord(chordName);
  if (!c) return "—";
  const notes = chordNotes(c);
  const usesFlat = /b/.test(c.rootStr);
  return notes.map(n => pcToName(n.pc, usesFlat) + (n.isRoot ? " (root)" : "") + (n.isBass ? " (bass)" : "")).join("  ·  ");
}

//=============================================================
// IMPORT / EXPORT
//=============================================================
function exportJson() {
  const blob = new Blob([JSON.stringify({ version: SCHEMA_VERSION, exportedAt: new Date().toISOString(), songs: state.songs }, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "chord-archive.json";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function importJsonFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data.songs)) throw new Error("No songs array in JSON");
      if (!confirm(`Import ${data.songs.length} song(s)? This will merge with your existing collection.`)) return;
      const map = new Map(state.songs.map(s => [s.id, s]));
      for (const s of data.songs) {
        const existing = map.get(s.id);
        if (!existing || (s.updatedAt || 0) > (existing.updatedAt || 0)) map.set(s.id, s);
      }
      state.songs = [...map.values()];
      saveState({ songs: state.songs });
      renderList(); renderDetail();
    } catch (e) { alert("Import failed: " + e.message); }
  };
  reader.readAsText(file);
}

//=============================================================
// INIT
//=============================================================
// Decode a #new=<base64> hash payload from the extension/bookmarklet.
// Returns a partial song object or null.
function consumeImportHash() {
  const h = location.hash;
  if (!h.startsWith("#new=")) return null;
  try {
    const raw = decodeURIComponent(escape(atob(h.slice(5))));
    const payload = JSON.parse(raw);
    // Always run the chord-sheet parser — handles inline ChordPro, chord-line-above-lyrics, and ChordPro directives.
    const parsed = parseChordSheet(payload.lyrics || "");
    // Autodetect key from chord set if not provided
    let key = payload.key || parsed.key || "";
    if (!key) {
      const chords = extractChords(parsed.lyrics || payload.lyrics || "");
      const detected = detectKey(chords);
      if (detected) key = detected;
    }
    const song = Object.assign(blankSong(), {
      title: payload.title || parsed.title || "",
      artist: payload.artist || parsed.artist || "",
      key,
      lyrics: parsed.lyrics || payload.lyrics || "",
      sourceUrl: payload.sourceUrl || "",
    });
    // Clear the hash so reload doesn't double-create
    history.replaceState(null, "", location.pathname + location.search);
    return song;
  } catch (e) {
    console.warn("Failed to parse #new= payload:", e);
    return null;
  }
}

async function init() {
  const persisted = loadState();
  state.songs = persisted.songs || [];
  if (state.songs.length === 0) {
    const seed = await fetchSeed();
    if (seed && Array.isArray(seed.songs)) {
      state.songs = seed.songs;
      saveState({ songs: state.songs });
    }
  }

  // Direct-import from extension/bookmarklet via URL hash
  const imported = consumeImportHash();
  if (imported) {
    state.editing = imported;  // open editor with pre-filled values
  }

  document.getElementById("btn-new").addEventListener("click", () => {
    state.editing = "new"; renderDetail();
  });
  document.getElementById("btn-export").addEventListener("click", exportJson);
  document.getElementById("btn-import").addEventListener("click", () => document.getElementById("import-file").click());
  document.getElementById("import-file").addEventListener("change", e => {
    const f = e.target.files[0]; if (f) importJsonFile(f); e.target.value = "";
  });
  document.getElementById("search").addEventListener("input", e => { state.search = e.target.value; renderList(); });
  document.getElementById("filter-instrument").addEventListener("change", e => { state.filterInstrument = e.target.value; renderList(); });
  document.getElementById("sort").addEventListener("change", e => { state.sort = e.target.value; renderList(); });
  renderList();
  renderDetail();
}
init();
</script>
