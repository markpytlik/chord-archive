// Strip noise from scraped/parsed song titles: "(chords)", "(tab)", trailing "Chords", etc.
function cleanScrapedTitle(t) {
  if (!t) return t;
  let out = t;
  for (let i = 0; i < 3; i++) {
    out = out.replace(/\s*[\(\[]\s*(?:chords?|tabs?|lyrics?|guitar\s*pro|gp|bass|ukulele|drum|power\s*tab|piano|keyboard|chord\s*pro)\s*[\)\]]\s*$/i, "");
  }
  out = out.replace(/\s+(?:chords?|tabs?|lyrics?|tablature)\s*$/i, "");
  return out.trim();
}

//=============================================================
// MUSIC THEORY
//=============================================================
const NOTE_PC = { C:0,"C#":1,Db:1,D:2,"D#":3,Eb:3,E:4,F:5,"F#":6,Gb:6,G:7,"G#":8,Ab:8,A:9,"A#":10,Bb:10,B:11 };
const PC_SHARP = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const PC_FLAT  = ["C","Db","D","Eb","E","F","Gb","G","Ab","A","Bb","B"];

function normalizeAccidental(s) { return s.replace(/♯/g,"#").replace(/♭/g,"b"); }

function splitChord(name) {
  if (!name) return null;
  const cleaned = normalizeAccidental(name.trim());
  const m = cleaned.match(/^([A-G])([#b]?)(.*?)(?:\/([A-G])([#b]?))?$/);
  if (!m) return null;
  const rootStr = m[1] + (m[2] || "");
  const qualPart = m[3] || "";
  const bassStr = m[4] ? (m[4] + (m[5] || "")) : null;
  const root = NOTE_PC[rootStr];
  const bass = bassStr ? NOTE_PC[bassStr] : null;
  if (root === undefined) return null;
  return { root, rootStr, quality: qualPart, bass, bassStr, raw: cleaned };
}

function qualityToIntervals(quality) {
  const ivs = new Set([0]);
  const orig = quality;
  let q = quality;

  let triadAdded = false;
  const isHalfDim = quality.includes("ø");
  if (isHalfDim) {
    ivs.add(3); ivs.add(6); triadAdded = true;
    q = q.replace(/ø/g, "");
  }
  const susMatch = !triadAdded ? q.match(/sus([24])?/i) : null;
  if (susMatch) {
    if (susMatch[1] === "2") { ivs.add(2); ivs.add(7); }
    else                     { ivs.add(5); ivs.add(7); }
    triadAdded = true;
    q = q.replace(/sus[24]?/i, "");
  }
  if (!triadAdded) {
    if (/^dim/i.test(q) || q.startsWith("°")) {
      ivs.add(3); ivs.add(6); triadAdded = true;
      q = q.replace(/^(dim|°)/i, "");
    } else if (/^aug/i.test(q) || q.startsWith("+")) {
      ivs.add(4); ivs.add(8); triadAdded = true;
      q = q.replace(/^(aug|\+)/i, "");
    } else if (/^min/i.test(q) || (/^m/.test(q) && !/^maj|^M(?!\d)/.test(q) && !/^M$/.test(q))) {
      ivs.add(3); ivs.add(7); triadAdded = true;
      q = q.replace(/^(min|m)/i, "");
    }
  }
  if (!triadAdded) {
    ivs.add(4); ivs.add(7);
    q = q.replace(/^(maj|M)(?=\d|$|aj)/i, "");
  }

  const isMaj7 = /maj7|M7|Δ/.test(orig);
  const hasAnyAdd = /add\d/.test(orig);
  const hasPlain7 = /(?<!ad)7/.test(orig);
  if (isMaj7) ivs.add(11);
  else if (hasPlain7 && !isMaj7) ivs.add(10);
  if (isHalfDim) ivs.add(10);

  if (/(?<!\d)6(?!\d)/.test(orig)) ivs.add(9);

  const has9  = /(?<!1)9(?!th)/.test(orig);
  const has11 = /11/.test(orig);
  const has13 = /13/.test(orig);
  if (has9)  ivs.add(14);
  if (has11) ivs.add(17);
  if (has13) { ivs.add(21); ivs.add(14); }
  if ((has9 || has11 || has13) && !hasAnyAdd && !ivs.has(10) && !ivs.has(11)) {
    ivs.add(10);
  }
  if (isMaj7 || /maj(9|11|13)|M(9|11|13)/.test(orig)) {
    ivs.delete(10); ivs.add(11);
  }

  if (/add9/i.test(orig))  ivs.add(14);
  if (/add11/i.test(orig)) ivs.add(17);
  if (/add13/i.test(orig)) ivs.add(21);

  if (/b5/.test(orig)) { ivs.delete(7); ivs.add(6); }
  if (/#5/.test(orig)) { ivs.delete(7); ivs.add(8); }
  if (/b9/.test(orig)) ivs.add(13);
  if (/#9/.test(orig)) ivs.add(15);
  if (/#11/.test(orig)) ivs.add(18);
  if (/b13/.test(orig)) ivs.add(20);

  return [...ivs].sort((a,b) => a - b);
}

// ---- Key auto-detection ----
// Score each major + minor key by how many of the song's chords are diatonic.
// Bonus weight for matches at the start/end of the chord progression.
const MAJOR_DIATONIC_QUALITIES = ["", "m", "m", "", "", "m", "dim"]; // I ii iii IV V vi vii°
const MINOR_DIATONIC_QUALITIES = ["m", "dim", "", "m", "m", "", ""]; // i ii° III iv v VI VII (natural minor)
const MAJOR_DEGREES = [0, 2, 4, 5, 7, 9, 11];
const MINOR_DEGREES = [0, 2, 3, 5, 7, 8, 10];

function buildDiatonicSet(rootPc, isMinor) {
  const degrees = isMinor ? MINOR_DEGREES : MAJOR_DEGREES;
  const qualities = isMinor ? MINOR_DIATONIC_QUALITIES : MAJOR_DIATONIC_QUALITIES;
  const out = new Set();
  for (let i = 0; i < 7; i++) {
    out.add(((rootPc + degrees[i]) % 12) + ":" + qualities[i]);
  }
  return out;
}

function chordSimpleKey(chord) {
  // Returns "<rootPc>:<basicQuality>" — basicQuality is "", "m", or "dim"
  if (!chord) return null;
  const ivs = qualityToIntervals(chord.quality);
  const set = new Set(ivs);
  let q = "";
  if (set.has(3) && set.has(7))      q = "m";
  else if (set.has(3) && set.has(6)) q = "dim";
  else if (set.has(4) && set.has(8)) q = ""; // aug — treat like major for diatonic match
  // sus / extensions: drop them, treat as major triad
  return chord.root + ":" + q;
}

function detectKey(chordNames) {
  if (!chordNames || !chordNames.length) return null;
  const parsed = chordNames.map(c => splitChord(c)).filter(Boolean);
  if (!parsed.length) return null;

  let best = null, bestScore = -Infinity;
  for (let root = 0; root < 12; root++) {
    for (const isMinor of [false, true]) {
      const dia = buildDiatonicSet(root, isMinor);
      let score = 0;
      for (const c of parsed) {
        const key = chordSimpleKey(c);
        if (dia.has(key)) score += 1;
      }
      // First/last chord matching the tonic gets a boost (first is a stronger signal)
      const tonicKey = root + ":" + (isMinor ? "m" : "");
      if (chordSimpleKey(parsed[0]) === tonicKey) score += 2.5;
      if (chordSimpleKey(parsed[parsed.length - 1]) === tonicKey) score += 1.5;
      // V→I cadence boost: if any consecutive pair is dominant→tonic, strong signal for the key
      const dominantPc = (root + 7) % 12;
      const dominantKey = dominantPc + ":";  // major V (works in both major and "harmonic minor" usage)
      for (let p = 0; p < parsed.length - 1; p++) {
        if (chordSimpleKey(parsed[p]) === dominantKey && chordSimpleKey(parsed[p+1]) === tonicKey) {
          score += 1.5; break;
        }
      }
      // Slight preference for major when scores tie (more common in pop/folk)
      if (!isMinor) score += 0.1;
      // Prefer simpler keys (fewer accidentals): C major / G major / D major / etc.
      if ([0, 5, 7, 9, 2, 4].includes(root)) score += 0.05;

      if (score > bestScore) {
        bestScore = score;
        best = { root, isMinor };
      }
    }
  }
  if (!best || bestScore < 1) return null;
  return pcToName(best.root, false) + (best.isMinor ? "m" : "");
}

// Reverse chord lookup: given a set of pitch classes, find a chord name that matches.
// Templates ordered from most specific → most generic.
const CHORD_QUALITY_TEMPLATES = [
  // Triads
  ["",        [0, 4, 7]],
  ["m",       [0, 3, 7]],
  ["dim",     [0, 3, 6]],
  ["aug",     [0, 4, 8]],
  ["sus2",    [0, 2, 7]],
  ["sus4",    [0, 5, 7]],
  // Sevenths
  ["maj7",    [0, 4, 7, 11]],
  ["7",       [0, 4, 7, 10]],
  ["m7",      [0, 3, 7, 10]],
  ["mMaj7",   [0, 3, 7, 11]],
  ["m7b5",    [0, 3, 6, 10]],
  ["dim7",    [0, 3, 6, 9]],
  ["7b5",     [0, 4, 6, 10]],
  ["7#5",     [0, 4, 8, 10]],
  ["7sus4",   [0, 5, 7, 10]],
  ["maj7#5",  [0, 4, 8, 11]],
  // Sixths
  ["6",       [0, 4, 7, 9]],
  ["m6",      [0, 3, 7, 9]],
  ["6/9",     [0, 4, 7, 9, 2]],
  // Add chords
  ["add9",    [0, 4, 7, 2]],
  ["madd9",   [0, 3, 7, 2]],
  ["add11",   [0, 4, 7, 5]],
  // Ninths
  ["9",       [0, 4, 7, 10, 2]],
  ["maj9",    [0, 4, 7, 11, 2]],
  ["m9",      [0, 3, 7, 10, 2]],
  ["7b9",     [0, 4, 7, 10, 1]],
  ["7#9",     [0, 4, 7, 10, 3]],
  // Power & dyad shapes
  ["5",       [0, 7]],
  ["5(b5)",   [0, 6, 7]],   // power chord with added tritone
];

function intervalLabel(semitones) {
  const map = { 0:"1", 1:"b9", 2:"9", 3:"#9/b3", 4:"3", 5:"11", 6:"b5/#11", 7:"5", 8:"b13/#5", 9:"6/13", 10:"b7", 11:"7" };
  return map[semitones] || ("?" + semitones);
}

// Try to identify a chord name from a set of pitch classes.
// `preferredRoot` (optional pc) anchors the root if you already know it.
// `preferFlat` (optional bool) — output flats instead of sharps for accidentals (e.g. Bb instead of A#).
// Strategies in order: exact → omit-one → add-one → descriptive fallback.
function chordNameFromPcs(pcs, preferredRoot, preferFlat) {
  const uniq = [...new Set(pcs.map(pc => ((pc % 12) + 12) % 12))];
  if (uniq.length < 1) return null;
  const name = (pc) => pcToName(pc, !!preferFlat);
  if (uniq.length === 1) return name(uniq[0]);

  const roots = (preferredRoot !== undefined && preferredRoot !== null)
    ? [((preferredRoot % 12) + 12) % 12, ...uniq.filter(p => p !== preferredRoot)]
    : uniq;

  // 1. Exact match
  for (const root of roots) {
    for (const [q, ivs] of CHORD_QUALITY_TEMPLATES) {
      const expected = new Set(ivs.map(i => (root + i) % 12));
      if (expected.size === uniq.length && uniq.every(pc => expected.has(pc))) {
        return name(root) + q;
      }
    }
  }

  // 2. Try omit-one
  for (const root of roots) {
    for (const [q, ivs] of CHORD_QUALITY_TEMPLATES) {
      const expected = new Set(ivs.map(i => (root + i) % 12));
      if (expected.size === uniq.length + 1) {
        const missing = [...expected].filter(pc => !uniq.includes(pc));
        if (missing.length === 1 && uniq.every(pc => expected.has(pc))) {
          const missInt = ((missing[0] - root + 12) % 12);
          let omit = null;
          if (missInt === 7) omit = "no5";
          else if (missInt === 3 || missInt === 4) omit = "no3";
          if (omit) return name(root) + q + "(" + omit + ")";
        }
      }
    }
  }

  // 3. Try add-one
  for (const root of roots) {
    for (const [q, ivs] of CHORD_QUALITY_TEMPLATES) {
      const expected = new Set(ivs.map(i => (root + i) % 12));
      if (uniq.length === expected.size + 1 && [...expected].every(pc => uniq.includes(pc))) {
        const extra = uniq.find(pc => !expected.has(pc));
        const extInt = ((extra - root + 12) % 12);
        const addMap = { 1:"b9", 2:"add9", 3:"#9", 5:"add11", 6:"#11", 8:"b13", 9:"add6", 11:"add maj7" };
        const addName = addMap[extInt];
        if (addName) return name(root) + q + "(add " + addName.replace("add ", "") + ")";
      }
    }
  }

  // 4. Descriptive fallback
  const rootPc = preferredRoot !== undefined && preferredRoot !== null ? (((preferredRoot % 12) + 12) % 12) : uniq.sort((a,b) => a-b)[0];
  const labels = uniq
    .filter(pc => pc !== rootPc)
    .map(pc => intervalLabel(((pc - rootPc) + 12) % 12))
    .filter(l => l && !l.startsWith("?"));
  if (labels.length === 0) return name(rootPc);
  return name(rootPc) + "(" + labels.join(",") + ")";
}

// Parse a string like "C E G B" or "C4, E4, G4, B4" into pitch classes
function parsePianoNotesString(s) {
  if (!s || !s.trim()) return [];
  const tokens = s.replace(/,/g, " ").split(/\s+/).filter(Boolean);
  const pcs = [];
  for (const tok of tokens) {
    const m = tok.match(/^([A-Ga-g])([#b♯♭]?)(\d)?$/);
    if (!m) continue;
    const noteName = m[1].toUpperCase() + (m[2] || "").replace("♯", "#").replace("♭", "b");
    const pc = NOTE_PC[noteName];
    if (pc !== undefined) pcs.push(pc);
  }
  return pcs;
}

// Build an interactive 2-octave (24 key) piano keyboard SVG. Click a key to toggle.
// Key positions are absolute (0-23): C in octave 0 = 0, C in octave 1 = 12, etc.
// rootPc (optional) highlights ALL keys of that pitch class in pale blue (so user can find "home" in either octave).
// onChange(positions) fires on selection change.
function buildClickablePianoKeyboard(initialPositions, onChange, rootPc) {
  const wrap = document.createElement("div");
  wrap.className = "click-piano";
  const selected = new Set(initialPositions);
  let currentRootPc = (rootPc === undefined || rootPc === null) ? null : rootPc;

  const whiteW = 32, whiteH = 110, blackW = 20, blackH = 70;
  const W = whiteW * FE_WHITE_POSITIONS.length, H = whiteH;
  const noteName = pc => PC_SHARP[pc];

  function svg() {
    let s = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="cursor:pointer; display:block; max-width:100%; height:auto;">`;
    // White keys — selected by absolute position; root highlight applies wherever that pc appears
    for (let i = 0; i < FE_WHITE_POSITIONS.length; i++) {
      const position = FE_WHITE_POSITIONS[i];
      const pc = fePcOfPosition(position);
      const x = i * whiteW;
      const isSel = selected.has(position);
      const isRoot = (currentRootPc !== null && pc === currentRootPc);
      let fill = "#fff";
      if (isRoot && isSel) fill = "#14296b";
      else if (isRoot)     fill = "#dde6f7";
      else if (isSel)      fill = "#2c5fbf";
      const labelColor = (isSel) ? "#fff" : (isRoot ? "#14296b" : "#888");
      s += `<rect class="key" data-pos="${position}" x="${x}" y="0" width="${whiteW}" height="${whiteH}" fill="${fill}" stroke="#14161a" stroke-width="1" />`;
      s += `<text x="${x + whiteW/2}" y="${whiteH - 12}" text-anchor="middle" font-size="11" fill="${labelColor}" font-family="ui-sans-serif" pointer-events="none">${noteName(pc)}</text>`;
    }
    // Black keys
    for (const bk of FE_BLACK_KEYS) {
      const pc = fePcOfPosition(bk.pos);
      const x = (bk.whiteIdx + 1) * whiteW - blackW/2;
      const isSel = selected.has(bk.pos);
      const isRoot = (currentRootPc !== null && pc === currentRootPc);
      let fill = "#14161a";
      if (isRoot && isSel) fill = "#14296b";
      else if (isRoot)     fill = "#3b4d76";
      else if (isSel)      fill = "#2c5fbf";
      s += `<rect class="key" data-pos="${bk.pos}" x="${x}" y="0" width="${blackW}" height="${blackH}" fill="${fill}" stroke="#14161a" stroke-width="1" />`;
      s += `<text x="${x + blackW/2}" y="${blackH - 8}" text-anchor="middle" font-size="9" fill="#fff" font-family="ui-sans-serif" pointer-events="none">${noteName(pc)}</text>`;
    }
    s += `</svg>`;
    return s;
  }

  function rerender() { wrap.innerHTML = svg(); }
  rerender();

  wrap.addEventListener("click", e => {
    const k = e.target.closest(".key[data-pos]");
    if (!k) return;
    const pos = parseInt(k.getAttribute("data-pos"));
    if (selected.has(pos)) selected.delete(pos); else selected.add(pos);
    rerender();
    onChange([...selected]);
  });

  // Public API — positions are absolute key indices 0-23
  wrap.getSelectedPositions = () => [...selected];
  wrap.setSelectedPositions = (positions) => { selected.clear(); positions.forEach(p => selected.add(p)); rerender(); };
  wrap.setRootPc = (pc) => { currentRootPc = (pc === null || pc === undefined) ? null : pc; rerender(); };
  return wrap;
}

function chordNotes(chord) {
  const ivs = qualityToIntervals(chord.quality);
  const notes = ivs.map(i => ({ pc: (chord.root + i) % 12, isRoot: i === 0, isBass: false }));
  if (chord.bass !== null) {
    let already = notes.find(n => n.pc === chord.bass);
    if (already) already.isBass = true;
    else notes.unshift({ pc: chord.bass, isRoot: false, isBass: true });
  }
  return notes;
}

function pcToName(pc, preferFlat=false) {
  return (preferFlat ? PC_FLAT : PC_SHARP)[((pc % 12) + 12) % 12];
}

// Compute a Roman-numeral label for a chord in the context of a song's key.
// E.g. ("Am", "C") → "vi"; ("D7", "G") → "V7"; ("Bb", "C") → "♭VII".
// Returns "" if the chord/key can't be parsed.
function romanNumeral(chordName, keyName) {
  const k = splitChord(keyName);
  const c = splitChord(chordName);
  if (!k || !c) return "";
  const keyMinor = /^(m|min)$/.test(k.quality);
  const cMinor = /^(m|min)$/.test(c.quality);
  const cDim = /dim|°|m7b5|ø/.test(c.quality);
  const cAug = /aug|\+/.test(c.quality);
  // Diatonic scale degrees → Roman numerals (ignoring chord quality for now)
  // Major: 0=I, 2=II, 4=III, 5=IV, 7=V, 9=VI, 11=VII
  // Minor: 0=I, 2=II, 3=III, 5=IV, 7=V, 8=VI, 10=VII
  const majorPositions = {0:"I",2:"II",4:"III",5:"IV",7:"V",9:"VI",11:"VII"};
  const minorPositions = {0:"I",2:"II",3:"III",5:"IV",7:"V",8:"VI",10:"VII"};
  const semitone = ((c.root - k.root) + 12) % 12;
  const positions = keyMinor ? minorPositions : majorPositions;
  let degree = positions[semitone];
  let prefix = "";
  if (!degree) {
    // Chromatic — pick the nearest below and prefix with ♭ (or above + ♯ — preferred ♭ for jazz/pop common).
    const below = Object.keys(positions).map(Number).filter(n => n < semitone).sort((a,b)=>b-a)[0];
    if (below !== undefined) { degree = positions[below]; prefix = "♭"; }
    else return "";
  }
  // Case based on chord quality: uppercase major, lowercase minor, lowercase + ° dim
  let rn = cMinor || cDim ? degree.toLowerCase() : degree;
  if (cDim) rn += "°";
  else if (cAug) rn += "+";
  // 7th/extension suffix
  if (c.quality === "7" || c.quality === "m7") rn += "7";
  else if (c.quality === "maj7" || c.quality === "M7") rn += "M7";
  else if (c.quality === "dim7") rn += "°7";
  else if (c.quality === "m7b5") rn += "ø7";
  else if (/^9$|^m9$|^maj9$/.test(c.quality)) rn += "9";
  return prefix + rn;
}

// Re-spell a single chord name's accidentals (root and slash bass) as sharps or flats.
// "C#m7"/"Dbm7" round-trip; chords without accidentals (e.g. "G", "Am") pass through unchanged.
function convertChordAccidental(chordName, useFlat) {
  if (!chordName) return chordName;
  return chordName.replace(/(^|\/)([A-G])([#b♯♭])?/g, (m, prefix, letter, acc) => {
    if (!acc) return m;
    const norm = acc.replace("♯", "#").replace("♭", "b");
    const pc = NOTE_PC[letter + norm];
    if (pc === undefined) return m;
    return prefix + (useFlat ? PC_FLAT[pc] : PC_SHARP[pc]);
  });
}

// Mutate the song so every chord, key, and voicing key uses the requested accidental style.
function rewriteAccidentals(song, useFlat) {
  pushUndo(song);
  // Lock in the original accidental style the first time we toggle (so the ↺ reset has somewhere to go).
  if (typeof song.originalPreferFlat !== "boolean") {
    song.originalPreferFlat = !!song.preferFlat;
  }
  if (song.lyrics) {
    song.lyrics = song.lyrics.replace(/\[([^\]]+)\]/g, (m, ch) => "[" + convertChordAccidental(ch, useFlat) + "]");
  }
  if (song.key) song.key = convertChordAccidental(song.key, useFlat);
  if (song.originalKey) song.originalKey = convertChordAccidental(song.originalKey, useFlat);
  if (song.voicings) {
    const renamed = {};
    for (const [name, list] of Object.entries(song.voicings)) {
      const nn = convertChordAccidental(name, useFlat);
      renamed[nn] = (renamed[nn] || []).concat(list);
    }
    song.voicings = renamed;
  }
  if (song.positionVoicings) {
    const renamed = {};
    for (const [k, v] of Object.entries(song.positionVoicings)) {
      const at = k.lastIndexOf("@");
      if (at < 0) { renamed[k] = v; continue; }
      const nn = convertChordAccidental(k.slice(0, at), useFlat);
      renamed[nn + k.slice(at)] = v;
    }
    song.positionVoicings = renamed;
  }
  song.preferFlat = !!useFlat;
  song.updatedAt = now();
}

// ---- Transpose ----
// Shift a chord name by N semitones, preserving quality and bass note.
// `forcePreferFlat` (optional) overrides the per-chord guess so an entire song
// can be transposed in a consistent accidental style.
function transposeChord(chordName, semitones, forcePreferFlat) {
  if (!chordName || !semitones) return chordName;
  const parsed = splitChord(chordName);
  if (!parsed) return chordName;
  const useFlat = (typeof forcePreferFlat === "boolean") ? forcePreferFlat : parsed.rootStr.includes("b");
  const newRoot = pcToName(parsed.root + semitones, useFlat);
  let out = newRoot + parsed.quality;
  if (parsed.bass !== null) {
    const useFlatB = (typeof forcePreferFlat === "boolean") ? forcePreferFlat : parsed.bassStr.includes("b");
    out += "/" + pcToName(parsed.bass + semitones, useFlatB);
  }
  return out;
}
// Shift every [chord] inside a ChordPro lyric string.
function transposeLyrics(text, semitones, forcePreferFlat) {
  if (!text || !semitones) return text;
  return text.replace(/\[([^\]]+)\]/g, (_, c) => "[" + transposeChord(c, semitones, forcePreferFlat) + "]");
}
// Transpose a key signature like "G" or "F#m" or "Em".
function transposeKey(keyStr, semitones, forcePreferFlat) {
  if (!keyStr || !semitones) return keyStr;
  const parsed = splitChord(keyStr);
  if (!parsed) return keyStr;
  const useFlat = (typeof forcePreferFlat === "boolean") ? forcePreferFlat : parsed.rootStr.includes("b");
  const newRoot = pcToName(parsed.root + semitones, useFlat);
  return newRoot + parsed.quality;
}
// Transpose an entire song in place. Returns nothing — mutates `song`.
function transposeSong(song, semitones) {
  if (!semitones) return;
  // Lock in the original key the first time we transpose (so we can reset back).
  if (!song.originalKey && song.key) song.originalKey = song.key;
  // Honor the song's accidental preference so transpose stays consistent (no mid-song mix of A# and Bb).
  const pf = (typeof song.preferFlat === "boolean") ? song.preferFlat : undefined;
  song.lyrics = transposeLyrics(song.lyrics || "", semitones, pf);
  song.key = transposeKey(song.key || "", semitones, pf);
  if (song.voicings) {
    const renamed = {};
    for (const [name, vs] of Object.entries(song.voicings)) {
      renamed[transposeChord(name, semitones, pf)] = vs;
    }
    song.voicings = renamed;
  }
  if (song.positionVoicings) {
    const renamed = {};
    for (const [k, v] of Object.entries(song.positionVoicings)) {
      const at = k.lastIndexOf("@");
      if (at < 0) { renamed[k] = v; continue; }
      const nn = transposeChord(k.slice(0, at), semitones, pf);
      renamed[nn + k.slice(at)] = v;
    }
    song.positionVoicings = renamed;
  }
  song.updatedAt = now();
}
// How many semitones from current key back to the original?
function semitonesToOriginalKey(song) {
  if (!song.originalKey || !song.key || song.originalKey === song.key) return 0;
  const cur = splitChord(song.key);
  const orig = splitChord(song.originalKey);
  if (!cur || !orig) return 0;
  // Choose shortest path on the circle of fifths-ish — semitone diff
  let diff = (orig.root - cur.root + 12) % 12;
  if (diff > 6) diff -= 12;
  return diff;
}

//=============================================================
// GUITAR SHAPES
//=============================================================
const GUITAR_SHAPES = {
  "C":     { frets:[-1,3,2,0,1,0], fingers:[0,3,2,0,1,0] },
  "C#":    { frets:[-1,4,3,1,2,1], fingers:[0,3,2,1,1,1], barre:{fret:1,from:1,to:5} },

// Movable barre templates — frets relative to "barre at fret 0" (i.e. root at open E or open A).
// E-shape: root on string 0 (low E, pc 4). Barre across all 6 strings.
// A-shape: root on string 1 (A, pc 9). Low E muted; barre across strings 1–5.
// Movable barre templates — frets relative to "barre at fret 0" (i.e. root at open E or open A).
// E-shape: root on string 0 (low E, pc 4). Barre across all 6 strings.
// A-shape: root on string 1 (A, pc 9). Low E muted; barre across strings 1–5.
// Each template's notes have been verified by hand against the quality's interval spelling.
const E_SHAPE_TEMPLATES = {
  "":     [0,2,2,1,0,0],   // R 5 R 3 5 R
  "m":    [0,2,2,0,0,0],   // R 5 R b3 5 R
  "7":    [0,2,0,1,0,0],   // R 5 b7 3 5 R
  "m7":   [0,2,0,0,0,0],   // R 5 b7 b3 5 R
  "maj7": [0,2,1,1,0,0],   // R 5 7 3 5 R
  "sus4": [0,2,2,2,0,0],   // R 5 R 4 5 R
  "sus2": [0,2,4,4,0,0],   // R 5 9 R(oct) 5 R
  "6":    [0,2,2,1,2,0],   // R 5 R 3 6 R
  "m6":   [0,2,2,0,2,0],   // R 5 R b3 6 R
  "9":    [0,2,0,1,0,2],   // R 5 b7 3 5 9
  "m9":   [0,2,0,0,0,2],   // R 5 b7 b3 5 9
  "maj9": [0,2,1,1,0,2],   // R 5 7 3 5 9
  "add9": [0,2,4,1,0,0],   // R 5 9 3 5 R
  "11":   [0,2,0,1,0,1],   // R 5 b7 3 5 (high 4)
  "13":   [0,2,0,1,2,0],   // R 5 b7 3 6 R
  "7sus4":[0,2,0,2,0,0],   // R 5 b7 4 5 R
  // Diminished family — partial barre, low E muted is cleaner
  "dim":  [-1,-1,2,3,2,-1],  // (root on D string at fret 2 of A, becomes movable from there)
  "dim7": [-1,-1,2,3,2,3],   // R b3 b5 bb7
  "m7b5": [-1,-1,2,3,1,2],   // R b3 b5 b7
  "aug":  [-1,-1,2,1,1,0],   // R 3 #5 R (mute low strings)
};
const A_SHAPE_TEMPLATES = {
  "":     [-1,0,2,2,2,0],   // R 5 R 3 5
  "m":    [-1,0,2,2,1,0],
  "7":    [-1,0,2,0,2,0],
  "m7":   [-1,0,2,0,1,0],
  "maj7": [-1,0,2,1,2,0],
  "sus4": [-1,0,2,2,3,0],
  "sus2": [-1,0,2,2,0,0],
  "6":    [-1,0,2,2,2,2],
  "m6":   [-1,0,2,2,1,2],
  "9":    [-1,0,2,4,3,0],
  "m9":   [-1,0,2,4,1,0],
  "maj9": [-1,0,2,4,2,0],
  "add9": [-1,2,2,4,2,0],   // distinct from maj9 — adds 9 without the 7
  "11":   [-1,0,0,0,1,1],
  "13":   [-1,0,2,0,2,2],
  "7sus4":[-1,0,2,0,3,0],
  "aug":  [-1,0,3,2,2,1],
};

// Map a parsed chord quality string to one of the template keys above.
function qualityToShapeKey(q) {
  if (q === "" || q === "M" || q === "maj") return "";
  if (q === "m" || q === "min") return "m";
  if (q === "7") return "7";
  if (/^m7$|^min7$/.test(q)) return "m7";
  if (/^maj7$|^M7$/.test(q)) return "maj7";
  if (q === "sus" || q === "sus4") return "sus4";
  if (q === "sus2") return "sus2";
  if (q === "6") return "6";
  if (q === "m6" || q === "min6") return "m6";
  if (q === "9") return "9";
  if (q === "m9" || q === "min9") return "m9";
  if (q === "maj9" || q === "M9") return "maj9";
  if (q === "add9") return "add9";
  if (q === "11") return "11";
  if (q === "13") return "13";
  if (q === "7sus4" || q === "7sus") return "7sus4";
  if (q === "dim" || q === "°") return "dim";
  if (q === "dim7" || q === "°7") return "dim7";
  if (q === "m7b5" || q === "ø" || q === "ø7") return "m7b5";
  if (q === "aug" || q === "+" || q === "#5") return "aug";
  return null;
}

function lookupShape(chordName) {
  if (GUITAR_SHAPES[chordName]) return GUITAR_SHAPES[chordName];
  const parsed = splitChord(chordName);
  if (!parsed) return null;
  const key = qualityToShapeKey(parsed.quality);
  if (key === null) return null;

  // Try E-shape (root on low E, pc 4) and A-shape (root on A, pc 9).
  // Pick whichever puts the barre at a lower fret — easier to play, more idiomatic position.
  // Tie-break: prefer E-shape (more familiar to most players).
  const candidates = [];
  if (E_SHAPE_TEMPLATES[key]) candidates.push({ tpl: E_SHAPE_TEMPLATES[key], offset: ((parsed.root - 4) + 12) % 12, fromString: 0 });
  if (A_SHAPE_TEMPLATES[key]) candidates.push({ tpl: A_SHAPE_TEMPLATES[key], offset: ((parsed.root - 9) + 12) % 12, fromString: 1 });
  if (!candidates.length) return null;
  candidates.sort((a, b) => a.offset - b.offset);
  const pick = candidates[0];

  if (pick.offset === 0) return { frets: pick.tpl.slice(), derived: true };
  const frets = pick.tpl.map(f => f === -1 ? -1 : f + pick.offset);
  return { frets, derived: true, barre: { fret: pick.offset, from: pick.fromString, to: 5 } };
}

//=============================================================
// SVG: Guitar
//=============================================================
function svgGuitar(chordName, custom, size="md") {
  const shape = custom || lookupShape(chordName);
  if (!shape) {
    return `<div class="muted small" style="text-align:center;padding:24px 0;">No diagram for <b>${escapeHtml(chordName)}</b><br><span class="micro">Add a custom shape below.</span></div>`;
  }
  const frets = shape.frets;
  const fingers = shape.fingers || [];
  const minFret = Math.max(0, Math.min(...frets.filter(f => f > 0)) || 0);
  const useFretsFrom = (Math.max(...frets) > 4 && minFret > 0) ? minFret : 0;
  const NUM_FRETS = 5;
  const dim = size === "sm" ? { W: 110, H: 138, padTop: 24, padBot: 14, padX: 16 } :
              size === "lg" ? { W: 150, H: 180, padTop: 32, padBot: 20, padX: 22 } :
                              { W: 130, H: 160, padTop: 28, padBot: 16, padX: 18 };
  const { W, H, padTop, padBot, padX } = dim;
  const stringGap = (W - padX*2) / 5;
  const fretGap = (H - padTop - padBot) / NUM_FRETS;

  let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="display:block; max-width:100%; height:auto;">`;
  for (let s = 0; s < 6; s++) {
    const x = padX + s * stringGap;
    const f = frets[s];
    if (f === -1) {
      svg += `<text x="${x}" y="${padTop - 8}" text-anchor="middle" font-size="13" fill="#b41a1a" font-family="ui-monospace,monospace">×</text>`;
    } else if (f === 0) {
      svg += `<circle cx="${x}" cy="${padTop - 8}" r="4" fill="none" stroke="#14161a" stroke-width="1.4"/>`;
    }
  }
  for (let s = 0; s < 6; s++) {
    const x = padX + s * stringGap;
    svg += `<line x1="${x}" y1="${padTop}" x2="${x}" y2="${H - padBot}" stroke="#bbb" stroke-width="1"/>`;
  }
  for (let i = 0; i <= NUM_FRETS; i++) {
    const y = padTop + i * fretGap;
    const w = (i === 0 && useFretsFrom === 0) ? 3 : 1;
    svg += `<line x1="${padX}" y1="${y}" x2="${W - padX}" y2="${y}" stroke="#14161a" stroke-width="${w}"/>`;
  }
  if (useFretsFrom > 0) {
    svg += `<text x="${padX - 5}" y="${padTop + fretGap*0.7}" text-anchor="end" font-size="11" fill="#6b7180" font-family="ui-monospace,monospace">${useFretsFrom}fr</text>`;
  }
  if (shape.barre) {
    const b = shape.barre;
    const relFret = b.fret - useFretsFrom;
    if (relFret >= 0 && relFret < NUM_FRETS) {
      const y = padTop + (relFret - 0.5) * fretGap + fretGap;
      const x1 = padX + b.from * stringGap;
      const x2 = padX + b.to * stringGap;
      svg += `<rect x="${x1 - 7}" y="${y - 7}" width="${x2 - x1 + 14}" height="14" rx="7" fill="#14161a" opacity="0.85"/>`;
    }
  }
  for (let s = 0; s < 6; s++) {
    const f = frets[s];
    if (f > 0) {
      const relFret = f - useFretsFrom;
      if (relFret > 0 && relFret <= NUM_FRETS) {
        const x = padX + s * stringGap;
        const cy = padTop + (relFret - 0.5) * fretGap;
        svg += `<circle cx="${x}" cy="${cy}" r="6.5" fill="#14161a"/>`;
        if (fingers[s]) {
          svg += `<text x="${x}" y="${cy + 3}" text-anchor="middle" font-size="9" fill="#fff" font-family="ui-sans-serif">${fingers[s]}</text>`;
        }
      }
    }
  }
  svg += `</svg>`;
  return svg;
}

//=============================================================
// SVG: Piano (F-to-E 24-key layout)
//=============================================================
// Positions 0-23 are absolute key indices left-to-right.
// Octave 0 covers positions 0-11 (F, F#, G, G#, A, A#, B, C, C#, D, D#, E)
// Octave 1 covers positions 12-23.
// pc-of-position: position 0 = F (pc 5); pc(pos) = (5 + pos) % 12.
// position-of-pc-in-octave-0: pc 5 (F) → 0, pc 0 (C) → 7, etc.
function fePcOfPosition(pos) { return (5 + pos) % 12; }
function fePosOfPc(pc) { return (((pc - 5) % 12) + 12) % 12; }

// 14 white-key positions left-to-right
const FE_WHITE_POSITIONS = [0, 2, 4, 6, 7, 9, 11, 12, 14, 16, 18, 19, 21, 23];
// Black keys with the white-key index they sit AFTER, plus their absolute position
const FE_BLACK_KEYS = [
  { whiteIdx: 0,  pos: 1  }, // F#0
  { whiteIdx: 1,  pos: 3  }, // G#0
  { whiteIdx: 2,  pos: 5  }, // A#0
  { whiteIdx: 4,  pos: 8  }, // C#1
  { whiteIdx: 5,  pos: 10 }, // D#1
  { whiteIdx: 7,  pos: 13 }, // F#1
  { whiteIdx: 8,  pos: 15 }, // G#1
  { whiteIdx: 9,  pos: 17 }, // A#1
  { whiteIdx: 11, pos: 20 }, // C#2
  { whiteIdx: 12, pos: 22 }, // D#2
];

// Given a chord's pitch classes and root, build a single-position-per-note voicing
// stacked ascending from the root. Result: array of 0-23 positions.
function stackChordFromRoot(pcs, rootPc) {
  if (!pcs || !pcs.length) return [];
  const root = (rootPc === undefined || rootPc === null) ? pcs[0] : rootPc;
  // Sort by interval-from-root so we ascend through the chord tones
  const sorted = [...new Set(pcs.map(pc => ((pc % 12) + 12) % 12))]
    .map(pc => ({ pc, interval: ((pc - root) + 12) % 12 }))
    .sort((a, b) => a.interval - b.interval);
  const positions = [];
  let prev = -1;
  for (const { pc } of sorted) {
    let pos = fePosOfPc(pc);
    while (pos <= prev) pos += 12;
    if (pos > 23) pos = 23;
    positions.push(pos);
    prev = pos;
  }
  // Visual centering: if the lowest note (the root) lives in the bottom half of the
  // F-to-E layout (positions 0–4: F, F♯, G, G♯, A) the chord renders flush-left, which
  // looks lopsided. Bump the whole chord up an octave when (a) all notes still fit and
  // (b) the highest note isn't already crowding the right edge.
  if (positions.length && positions[0] <= 4) {
    const shifted = positions.map(p => p + 12);
    if (shifted[shifted.length - 1] <= 23) return shifted;
  }
  return positions;
}

// Backward-compat: legacy voicings stored only pitch classes 0-11.
// If incoming `notes` is all pcs (<12), convert to positions stacked from root for display.
function normalizePianoNotes(notes, rootPc) {
  if (!notes || !notes.length) return [];
  const hasOctave = notes.some(n => n >= 12);
  if (hasOctave) return notes.slice();
  // Legacy pc-only data: stack ascending from root for a sensible single-octave layout
  return stackChordFromRoot(notes, rootPc);
}

// Render the F-to-E 24-key keyboard, highlighting an explicit set of positions (0-23).
// rootPc: pitch class of the root — highlighted darker blue wherever it appears.
function svgPianoFromPcs(notesIn, rootPc, _octavesIgnored, size="md") {
  const positions = normalizePianoNotes(notesIn, rootPc);
  const positionSet = new Set(positions);
  // Slimmer white keys; all "hit" keys share the same blue. Root marked with a small dot.
  const dim = size === "sm" ? { whiteW: 14, whiteH: 76, blackW:  9, blackH: 46 } :
              size === "lg" ? { whiteW: 22, whiteH: 110, blackW: 14, blackH: 70 } :
                              { whiteW: 18, whiteH: 96, blackW: 11, blackH: 60 };
  const { whiteW, whiteH, blackW, blackH } = dim;
  const W = whiteW * FE_WHITE_POSITIONS.length, H = whiteH;
  const HIT_BLUE = "#2c5fbf";
  // Explicit width/height so SVG has intrinsic pixel size when not constrained by container.
  // Combined with max-width:100% it stays responsive in narrow contexts.
  let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="display:block; max-width:100%; height:auto;">`;
  // White keys
  for (let i = 0; i < FE_WHITE_POSITIONS.length; i++) {
    const pos = FE_WHITE_POSITIONS[i];
    const pc = fePcOfPosition(pos);
    const isHit = positionSet.has(pos);
    const isRoot = isHit && (rootPc !== undefined && rootPc !== null && pc === rootPc);
    const x = i * whiteW;
    const fill = isHit ? HIT_BLUE : "#fff";
    svg += `<rect x="${x}" y="0" width="${whiteW}" height="${whiteH}" fill="${fill}" stroke="#14161a" stroke-width="1"/>`;
    if (isHit) svg += `<text x="${x + whiteW/2}" y="${whiteH - 10}" text-anchor="middle" font-size="9" fill="#fff" font-family="ui-sans-serif" font-weight="600">${pcToName(pc)}</text>`;
    if (isRoot) {
      // Small white dot near the top of the key marks the root
      const cx = x + whiteW/2;
      const cy = 12;
      svg += `<circle cx="${cx}" cy="${cy}" r="2.6" fill="#fff"/>`;
    }
  }
  // Black keys
  for (const bk of FE_BLACK_KEYS) {
    const pc = fePcOfPosition(bk.pos);
    const isHit = positionSet.has(bk.pos);
    const isRoot = isHit && (rootPc !== undefined && rootPc !== null && pc === rootPc);
    const x = (bk.whiteIdx + 1) * whiteW - blackW/2;
    const fill = isHit ? HIT_BLUE : "#14161a";
    svg += `<rect x="${x}" y="0" width="${blackW}" height="${blackH}" fill="${fill}" stroke="#14161a" stroke-width="1"/>`;

  if (/^[A-Z][a-zA-Z ]*:?$/.test(stripped) && !isChordToken(toks[0])) return false;

    while (j < chordLine.length && chordLine[j] !== " " && chordLine[j] !== "\t") j++;

    let col = ins.col;

// The detail view always renders from the ChordPro storage; this is just for the editor.
function chordProToChordSheet(text) {

  for (const line of text.split("\n")) {
    if (!line.trim()) continue; // drop input blanks; we add our own

      blocks.push({ kind: "section", text: "[" + sec[1].trim() + "]" });
      continue;
    }
    if (!/\[[^\]]+\]/.test(line)) {
      blocks.push({ kind: "plain", text: line });
      continue;

    const parts = line.split(/(\[[^\]]+\])/g).filter(p => p.length > 0);

// shrinks to [F] (3 chars), shifting column alignment. This pass walks each line

  if (/^\s*\{[^}]+\}\s*$/.test(line)) return line;
  const parts = line.split(/(\[[^\]]+\])/g).filter(s => s.length > 0);
  let result = "";
  const pending = [];
  for (let i = 0; i < parts.length; i++) {
    const part = parts[i];
    if (/^\[[^\]]+\]$/.test(part)) {
      pending.push(part);
      continue;
    }
    if (pending.length === 0) { result += part; continue; }
    // We have pending chord(s) coming before this text part.
    const partFirstIsNonSpace = part.length > 0 && /\S/.test(part[0]);
    const resultEndsWithNonSpace = result.length > 0 && /\S/.test(result[result.length - 1]);
    if (partFirstIsNonSpace && resultEndsWithNonSpace) {
      // Mid-word: snap chord(s) back to the start of the current word.
      // If there are already chords at that word-start, insert AFTER them so order is preserved.
      const lastSpace = result.lastIndexOf(" ");
      const afterSpace = lastSpace + 1; // 0 if no prior space
      let insertAt = afterSpace;
      while (insertAt < result.length && result[insertAt] === "[") {
        const close = result.indexOf("]", insertAt);
        if (close === -1) break;
        insertAt = close + 1;
      }
      result = result.slice(0, insertAt) + pending.join("") + result.slice(insertAt) + part;
    } else {
      result += pending.join("") + part;
    }

  }

  if (pending.length) result += pending.join("");

}
function snapChordsToWordBoundaries(text) {
  return text.split("\n").map(snapChordsInLine).join("\n");
}

function parseChordSheet(text) {
  if (!text || !text.trim()) return { lyrics: "" };
  const lines = text.replace(/\r\n/g, "\n").split("\n");
  const out = [];
  let title = null, artist = null, key = null;
  const remaining = [];
  for (const ln of lines) {
    const dm = ln.match(/^\s*\{\s*(title|t|artist|a|subtitle|st|key|k)\s*:\s*([^}]+)\}\s*$/i);
    if (dm) {
      const tag = dm[1].toLowerCase(); const val = dm[2].trim();
      if (tag === "title" || tag === "t") title = val;
      else if (tag === "artist" || tag === "a" || tag === "subtitle" || tag === "st") artist = val;
      else if (tag === "key" || tag === "k") key = val;
      continue;
    }
    if (/^\s*\{[^}]+\}\s*$/.test(ln)) continue;
    remaining.push(ln);
  }
  if (!title && remaining.length) {
    const first = remaining[0].trim();
    const m = first.match(/^(.{2,80}?)\s+[-–—]\s+(.{2,80})$/);
    if (m && !isChordLine(first) && !isSectionLabel(first)) {
      title = m[1].trim(); artist = m[2].trim(); remaining.shift();
    }
  }
  let i = 0;
  while (i < remaining.length) {
    const ln = remaining[i];
    if (!ln.trim()) { out.push(""); i++; continue; }
    if (isSectionLabel(ln)) {
      const stripped = ln.trim().replace(/^[\[(]|[\])]$/g, "").replace(/:$/, "");
      out.push("{" + stripped + "}");
      i++; continue;
    }
    if (isChordLine(ln)) {
      const next = remaining[i + 1];
      // Don't merge a chord line into a tab line — render the chord line standalone instead.
      if (next !== undefined && next.trim() && !isChordLine(next) && !isSectionLabel(next) && !isTabLine(next)) {
        out.push(mergeChordsIntoLyric(ln, next));
        i += 2;
      } else {
        // Standalone chord line — preserve already-bracketed tokens, wrap bare ones
        const toks = ln.trim().split(/\s+/);
        out.push(toks.map(t => /^\[.+\]$/.test(t) ? t : "[" + t + "]").join(" "));
        i++;
      }
    } else {
      out.push(ln);
      i++;
    }
  }

  // Catches the common UG case where [ch]F[/ch] → [F] shifts column alignment.
  const cleaned = snapChordsToWordBoundaries(out.join("\n")).trim();
  return { lyrics: cleaned, title, artist, key };
}

async function lookupMusicBrainz(title, artist) {
  const q = `recording:"${title.replace(/"/g, "\\\"")}" AND artist:"${artist.replace(/"/g, "\\\"")}"`;
  const url = `https://musicbrainz.org/ws/2/recording/?query=${encodeURIComponent(q)}&fmt=json&limit=5`;

    title: r.title,
    artist: r["artist-credit"]?.map(a => a.name).join(", ") || artist,
    mbid: r.id,
  };

async function lookupLyrics(title, artist) {

  const res = await fetch(url);
  if (!res.ok) throw new Error("Lyrics request failed: " + res.status);

  if (!data || !data.lyrics) return null;
  return data.lyrics.replace(/\r\n/g, "\n").trim();

// ----- URL fetch proxy -----
// Primary: a Supabase Edge Function (`fetch-page`) we control. Far more reliable than the
// random public CORS proxies that used to be the only option.
//
// Caveats baked into reality:
//   - Cloudflare-protected sites (Ultimate Guitar, E-Chords, Songsterr) return a CF challenge
//     page even from the Edge Function, because CF blocks server-side fetches. Those still
//     need the browser extension or bookmarklet.
//   - Smaller chord/lyric sites without aggressive bot protection work fine.
//
// We keep one public-proxy fallback for the rare case the Edge Function itself is down.
const FETCH_PROXY_PRIMARY = url =>
  `https://mjgctqprbecwkdinpcbp.supabase.co/functions/v1/fetch-page?url=${encodeURIComponent(url)}`;
const FETCH_PROXY_FALLBACK = url =>
  `https://corsproxy.io/?${encodeURIComponent(url)}`;

async function fetchViaProxy(url) {
  let lastErr = null;
  for (const proxify of [FETCH_PROXY_PRIMARY, FETCH_PROXY_FALLBACK]) {
    try {
      const res = await fetch(proxify(url), { cache: "no-cache" });
      if (res.ok) {
        const txt = await res.text();
        if (txt && txt.length > 200) return txt;
        lastErr = new Error("Empty body");
      } else {
        lastErr = new Error("Proxy returned " + res.status);
      }
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error("All proxies failed");
}

function decodeHtmlEntities(s) {
  const ta = document.createElement("textarea");
  ta.innerHTML = s;
  return ta.value;
}
// Convert "[ch]Cmaj7[/ch]" → "[Cmaj7]"; "[tab]...[/tab]" → "..."
function ugMarkupToChordPro(s) {
  return s
    .replace(/\[ch\]([^\[]+)\[\/ch\]/g, (_, c) => "[" + c.trim() + "]")
    .replace(/\[\/?tab\]/g, "");
}

// Recursively search a parsed JSON for any key matching the regex; used as a robust fallback
function deepFindKey(obj, keyPattern, depth = 0) {
  if (depth > 8 || !obj || typeof obj !== "object") return null;
  for (const k of Object.keys(obj)) {
    if (keyPattern.test(k)) {
      const v = obj[k];
      if (typeof v === "string" && v.trim() && v.length < 200) return v.trim();
    }
  }
  for (const k of Object.keys(obj)) {
    const v = obj[k];
    if (v && typeof v === "object") {
      const found = deepFindKey(v, keyPattern, depth + 1);
      if (found) return found;
    }
  }
  return null;
}

function parseUltimateGuitar(html) {
  let title = null, artist = null, lyrics = null;
  // 1) og:title is the most reliable: "Sail To The Moon CHORDS by Radiohead @ Ultimate-Guitar.com"
  //    Try several formats: with type word, with " - " separator, with " by " separator.
  const og = html.match(/<meta[^>]+property=["']og:title["'][^>]+content=["']([^"']+)/i);
  if (og) {
    const t = decodeHtmlEntities(og[1]);
    let m = t.match(/^(.+?)\s+(?:Chords?|Tabs?|Bass|Ukulele|Drum|Pro|Lyrics)\s+(?:by|–|—|-)\s+([^|@\-–—]+?)(?:\s*[\|@\-–—].*)?$/i);
    if (!m) m = t.match(/^(.+?)\s+(?:by)\s+([^|@\-–—]+?)(?:\s*[\|@\-–—].*)?$/i);
    if (!m) m = t.match(/^(.+?)\s+[-–—]\s+([^|@\-–—]+?)(?:\s*[\|@\-–—].*)?$/);
    if (m) { title = m[1].trim(); artist = m[2].trim(); }
  }

  let storeMatch = html.match(/<div[^>]+class="js-store"[^>]+data-content="([^"]+)"/);
  if (storeMatch) {
    try {
      const json = JSON.parse(decodeHtmlEntities(storeMatch[1]));
      const data = json?.store?.page?.data;
      const tab = data?.tab_view?.wiki_tab?.content || data?.tab?.wiki_tab?.content;
      if (tab) lyrics = ugMarkupToChordPro(tab);
      if (!artist) artist = deepFindKey(json, /^(artist_name|artist|band|musician|performer|song_band|byArtist)$/i);
      if (!title)  title  = deepFindKey(json, /^(song_name|song_title|title|name|track_name)$/i);
    } catch (e) { console.warn("UG JSON parse failed", e); }
  }

  if (!lyrics) {
    const m = html.match(/<pre[^>]*>([\s\S]*?)<\/pre>/);
    if (m) {
      const content = decodeHtmlEntities(m[1].replace(/<[^>]+>/g, ""));
      if (/\[ch\]/.test(content)) lyrics = ugMarkupToChordPro(content);
    }

  if (!m) m = html.match(/<pre[^>]*>([\s\S]*?)<\/pre>/);

  if (og) {
    const t = decodeHtmlEntities(og[1]);
    const m = t.match(/^(.+?)\s+(?:Chords|Tab|Lyrics)?\s+(?:by|–|—|-)\s+(.+?)(?:\s*[\|@].*)?$/i);
    if (m) return { title: m[1].trim(), artist: m[2].trim() };

async function importFromUrl(url) {
  if (!/^https?:\/\//i.test(url)) throw new Error("Please paste a full URL (https://…)");
  const host = new URL(url).hostname.replace(/^www\./, "");
  const isUG = /ultimate-guitar\.com/.test(host);

  let html;
  try {
    html = await fetchViaProxy(url);
  } catch (e) {
    throw new Error("Proxy fetch failed: " + e.message + ". Use the browser extension on sites that block proxies.");
  }
  if (isCloudflareChallenge(html)) {
    throw new Error("This site is behind Cloudflare bot-protection and can't be fetched server-side. Use the browser extension — it scrapes the page in your real browser session.");
  }

  // generic page" (common on e-chords / cifras sites when they suspect a bot).
  // Heuristic: og:url's pathname has noticeably less depth than the requested URL.
  const ogUrlMatch = html.match(/<meta[^>]+property=["']og:url["'][^>]+content=["']([^"']+)/i);
  if (ogUrlMatch) {

      const ogUrl = new URL(decodeHtmlEntities(ogUrlMatch[1]));
      const reqDepth = new URL(url).pathname.replace(/\/$/, "").split("/").length;
      const ogDepth  = ogUrl.pathname.replace(/\/$/, "").split("/").length;
      if (ogDepth < reqDepth - 1) {

      }
    } catch (e) { if (e.message?.startsWith("The site served")) throw e; /* URL parse failure: ignore */ }
  }

  let parsed = null;
  if (isUG) {
    parsed = parseUltimateGuitar(html);
  } else if (/e-chords\.com$/.test(host)) {
    parsed = parseEChords(html);
  }
  if (!parsed || !parsed.lyrics) parsed = parseGenericPre(html);
  if (!parsed || !parsed.lyrics) {
    throw new Error("Couldn't find a chord chart on that page. The site may have changed its layout, or it returned a non-song page. Try the browser extension or paste-and-parse.");
  }
  if (!parsed.title || !parsed.artist) {
    const meta = parseTitleArtistFromHtml(html);
    parsed.title = parsed.title || meta.title;
    parsed.artist = parsed.artist || meta.artist;
  }
  // Last resort: pull artist from UG URL path
  if (isUG && !parsed.artist) {
    parsed.artist = artistFromUgUrl(url);
  }
  return parsed;
}

        } catch (e) {}
      }
      // Last-ditch: derive artist from /tab/<artist-slug>/... in the URL path
      if (!artist) {
        const m = location.pathname.match(/^\/tab\/([^\/]+)\//i);
        if (m) artist = m[1].replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      }
    }
    if (!lyrics && /e-chords\.com/.test(host)) {
      const pre = document.querySelector("pre#core") || document.querySelector("pre");
      if (pre) lyrics = ugToChordPro(pre.textContent);
    }
    if (!lyrics) {
      const pres = [...document.querySelectorAll("pre")]
        .filter(p => p.textContent.length > 100)
        .sort((a,b) => b.textContent.length - a.textContent.length);
      if (pres[0]) lyrics = pres[0].textContent;
    }
    if (!title) {
      title = document.querySelector("h1")?.textContent?.trim()
            || document.title.replace(/\s*[\|@\-–—].*/, "").trim();
    }
    if (!lyrics) { alert("Chordpad: couldn't find a chord chart on this page."); return; }

    const payload = btoa(unescape(encodeURIComponent(JSON.stringify({
      title, artist, lyrics, sourceUrl: location.href
    }))));
    const target = "https://chordpad.app/#new=" + payload;
    if (target.length > 500000) {
      alert("Chordpad: chart is too large for direct import. Falling back to clipboard.");
      navigator.clipboard.writeText(lyrics);
      window.open("https://chordpad.app/", "_blank");
      return;
    }
    window.open(target, "_blank");
  };
  const body = "(" + fn.toString().replace(/\s+/g, " ") + ")();";
  return "javascript:" + encodeURIComponent(body);
}

//=============================================================
// HTML helpers
//=============================================================
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"})[c]);
}
function renderLyrics(text, song) {
  const showRoman = !!(song && song.showRoman && song.key);
  const rnFor = (ch) => showRoman ? romanNumeral(ch, song.key) : "";
  if (!text) return `<div class="muted">No lyrics yet — click <em>Edit</em> to add some.</div>`;
  const rawLines = text.replace(/\r\n/g, "\n").split("\n");
  // Pre-condense: if two chord-only lines have identical chord sets, merge them
  // (skipping any blank lines in between). Each rendered line records its source raw line idx
  // and how many raw lines it represents so drag-and-drop can map back to the lyrics string.
  const lines = [];
  for (let i = 0; i < rawLines.length; i++) {
    const ln = rawLines[i];
    if (/^\s*(?:\[[^\]]+\]\s*)+$/.test(ln)) {
      const sig = ln.replace(/\s+/g, " ").trim();
      let count = 1;
      let j = i + 1;
      while (j < rawLines.length) {
        if (!rawLines[j].trim()) { j++; continue; }
        const next = rawLines[j];
        if (/^\s*(?:\[[^\]]+\]\s*)+$/.test(next) && next.replace(/\s+/g, " ").trim() === sig) {
          count++; j++;
        } else break;
      }
      lines.push({ kind: "chord-only", text: ln, count, rawIdx: i, rawSpan: j - i });
      i = j - 1;
    } else {
      lines.push({ kind: "text", text: ln, rawIdx: i, rawSpan: 1 });
    }
  }

  const out = [];
  // Per-chord-name occurrence counter so each pill carries its 0-based instance index.
  // The voicing editor uses this to scope a phrasing change to "just this G" vs "all Gs".
  const occCount = {};
  const nextOcc = (chord) => {
    const v = occCount[chord] || 0;
    occCount[chord] = v + 1;
    return v;
  };
  // Each line is wrapped in `.lyric-line` so play mode can mark the focused one with `.active`.
  // The dot marker sits inside each chord-bearing line but is only revealed via CSS on `.active`.
  const dot = `<span class="lyric-dot" aria-hidden="true">●</span>`;
  for (const line of lines) {
    if (line.kind === "chord-only") {
      const re = /\[([^\]]+)\]/g;
      let m, html = "", pillIdx = 0;
      while ((m = re.exec(line.text)) !== null) {
        const ch = m[1];
        const occ = nextOcc(ch);
        const rn = rnFor(ch);
        html += `<span class="chord-pill-inline" data-chord="${escapeHtml(ch)}" data-occ="${occ}" data-pill-idx="${pillIdx}">${escapeHtml(ch)}${rn ? `<span class="rn-tag">${escapeHtml(rn)}</span>` : ""}</span>`;
        pillIdx++;
      }
      const repHtml = line.count > 1 ? `<span class="chord-rep">× ${line.count}</span>` : "";
      out.push(`<div class="lyric-line chord-only-row has-chord" data-line-idx="${line.rawIdx}" data-line-span="${line.rawSpan}">${dot}${html}${repHtml}</div>`);
      continue;
    }
    const rawText = line.text;
    if (!rawText.trim()) { out.push(`<div class="lyric-line lyric-blank" data-line-idx="${line.rawIdx}"></div>`); continue; }
    const sec = rawText.match(/^\s*\{([^}]+)\}\s*$/);
    if (sec) {
      out.push(`<div class="lyric-line section-row" data-line-idx="${line.rawIdx}"><span class="section-label">${escapeHtml(sec[1])}</span></div>`);
      continue;
    }
    // Mixed chord + lyric line — chord pills sit absolute-positioned above each lyric segment.
    // Each chord-bearing segment gets a min-width sized to its chord name so adjacent pills don't overlap.
    let html = "";
    let hasChord = false;
    let pillIdx = 0;
    const re = /\[([^\]]+)\]([^\[]*)|([^\[]+)/g;
    let m;
    while ((m = re.exec(rawText)) !== null) {
      if (m[1] !== undefined) {
        hasChord = true;
        const chord = m[1];
        const occ = nextOcc(chord);
        const text = m[2] || "";
        const safeText = text.length === 0 ? "&nbsp;" : escapeHtml(text);
        const rn = rnFor(chord);
        // Pill is ~0.7em per char + padding/border. Floor at 2.5em for short names.
        const minW = Math.max(2.5, chord.length * 0.72 + 0.5).toFixed(2);
        html += `<span class="seg" style="min-width:${minW}em;"><span class="chord" data-chord="${escapeHtml(chord)}" data-occ="${occ}" data-pill-idx="${pillIdx}">${escapeHtml(chord)}${rn ? `<span class="rn-tag">${escapeHtml(rn)}</span>` : ""}</span>${safeText}</span>`;
        pillIdx++;
      } else {
        html += `<span class="seg">${escapeHtml(m[3])}</span>`;
      }
    }
    out.push(`<div class="lyric-line${hasChord ? " has-chord" : ""}" data-line-idx="${line.rawIdx}">${hasChord ? dot : ""}${html}</div>`);
  }
  return out.join("");
}
function extractChords(text) {
  if (!text) return [];
  const re = /\[([^\]]+)\]/g;
  const set = new Set(); let m;
  while ((m = re.exec(text)) !== null) {
    const c = m[1].trim();
    if (splitChord(c)) set.add(c);
  }
  return [...set];
}

//=============================================================
// APP STATE
//=============================================================
const state = {
  songs: [],
  selectedId: null,
  search: "",
  filterInstrument: "all",
  sort: "updated",
  editing: false,
  // Session-only undo: stack of { songId, prevJSON } snapshots taken before mutations
  undoStack: [],
};

const UNDO_MAX = 50;
function pushUndo(song) {
  if (!song) return;
  state.undoStack.push({ songId: song.id, prev: JSON.parse(JSON.stringify(song)), at: Date.now() });
  if (state.undoStack.length > UNDO_MAX) state.undoStack.shift();
}
function undoLast() {
  const entry = state.undoStack.pop();
  if (!entry) return false;
  const idx = state.songs.findIndex(s => s.id === entry.songId);
  if (idx >= 0) state.songs[idx] = entry.prev;
  saveState({ songs: state.songs });
  if (state.selectedId !== entry.songId) state.selectedId = entry.songId;
  renderList(); renderDetail();
  return true;
}

function getFiltered() {
  let list = state.songs.slice();
  if (state.filterInstrument !== "all") {
    list = list.filter(s => {
      if (state.filterInstrument === "both") return s.instruments?.length === 2;
      return (s.instruments || []).includes(state.filterInstrument);
    });
  }
  if (state.search) {
    const q = state.search.toLowerCase();
    list = list.filter(s =>
      (s.title || "").toLowerCase().includes(q) ||
      (s.artist || "").toLowerCase().includes(q) ||
      (s.lyrics || "").toLowerCase().includes(q)
    );
  }
  if (state.sort === "title") list.sort((a,b) => (a.title || "").localeCompare(b.title || ""));
  else if (state.sort === "artist") list.sort((a,b) => (a.artist || "").localeCompare(b.artist || ""));
  else list.sort((a,b) => (b.updatedAt || 0) - (a.updatedAt || 0));
  return list;
}

function renderList() {
  const ul = document.getElementById("song-list");
  const list = getFiltered();
  if (!list.length) {
    ul.innerHTML = `<li class="muted small" style="cursor:default; padding:24px;">${state.songs.length === 0 ? "No songs yet — click + New Song." : "No songs match your filter."}</li>`;
    return;
  }
  ul.innerHTML = list.map(s => `
    <li data-id="${s.id}" class="${state.selectedId === s.id ? "active" : ""}">
      <div class="artist">${escapeHtml(s.artist || "—")}</div>
      <div class="title">${escapeHtml(s.title || "Untitled")}</div>
      <div class="meta">
        ${s.key ? `<span>${escapeHtml(s.key)}</span>` : ""}
        ${s.key && (s.instruments || []).length ? `<span>·</span>` : ""}
        ${(s.instruments || []).map(i => `<span class="pill ${i}">${i}</span>`).join("")}
      </div>
    </li>
  `).join("");
  ul.querySelectorAll("li[data-id]").forEach(li => {
    li.addEventListener("click", () => selectSong(li.dataset.id));
  });
}

function selectSong(id) {
  state.selectedId = id;
  state.editing = false;
  renderList();
  renderDetail();
}

function renderDetail() {
  const el = document.getElementById("detail");
  // === Loading gates first — show preloaders instead of half-rendered states ===
  const hash = window.location.hash || "";
  const search = window.location.search || "";
  const inAuthCallback = /access_token=|refresh_token=|type=(magiclink|recovery|signup|invite)/.test(hash)
                      || /[?&]code=/.test(search);
  // Until Supabase resolves the initial session, show a clean loading shell rather
  // than flashing the marketing landing page or the editor (which would briefly show
  // a "Sign in" button instead of the user chip while the session restores).
  const stillResolvingAuth = !auth.initialized && !!auth.client;
  if (inAuthCallback && !auth.user) {
    document.body.classList.remove("landing-active");
    el.innerHTML = renderAuthCallbackLoader();
    return;
  }
  if (stillResolvingAuth) {
    document.body.classList.remove("landing-active");
    el.innerHTML = renderInitialLoader();
    return;
  }
  // Editor (incl. extension/bookmarklet imports) only opens after auth has resolved
  // so the auth chip and cloud sync are wired up before the user starts typing.
  if (state.editing) { renderEditor(el); return; }
  const song = state.songs.find(s => s.id === state.selectedId);
  // Landing page: no signed-in user, no song picked, hasn't dismissed → marketing view.
  const landingDismissed = localStorage.getItem("chordpad_landing_dismissed") === "1";
  const showLanding = !auth.user && !song && !landingDismissed;
  document.body.classList.toggle("landing-active", showLanding);
  if (showLanding) {
    el.innerHTML = renderLandingPage();
    wireLandingPage();
    return;
  }
  if (!song) {
    el.innerHTML = `

          const accChanged = (typeof song.originalPreferFlat === "boolean") && (song.originalPreferFlat !== !!song.preferFlat);
          const accResetTitle = accChanged ? `Reset accidentals to original (${song.originalPreferFlat ? "♭" : "♯"})` : "Already at original accidentals";

              </div>
              <div class="sc-pill sc-key-ctrls" title="Transpose this song">
                <button class="sc-btn transpose-btn" data-step="-1" title="Transpose down 1 semitone" aria-label="Transpose down">−</button>
                <button class="sc-btn transpose-btn" data-step="1" title="Transpose up 1 semitone" aria-label="Transpose up">+</button>
                <button class="sc-btn sc-reset transpose-btn" data-reset="1" title="${keyResetTitle}" aria-label="Reset to original key" ${keyChanged ? "" : "disabled"}>↺</button>

            <div class="sc-group">
              <div class="sc-pill sc-acc-state" title="Current accidental style">

    <div class="meta-row">

  document.getElementById("btn-play").addEventListener("click", () => openPlayMode(song));

  // Transpose ± a semitone (snapshot first so user can ↶ undo)

  el.querySelectorAll("[data-accidental-reset]").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      if (typeof song.originalPreferFlat !== "boolean") return;

      rewriteAccidentals(song, !!song.originalPreferFlat);
