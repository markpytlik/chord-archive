//=============================================================
// HOVER POPOVER  (visual phrasings, cycles through voicings)
//=============================================================
let popoverEl = null;
let popoverTimer = null;
let popoverState = null; // { chordName, song, index }

function ensurePopover() {
  if (popoverEl) return popoverEl;
  popoverEl = document.createElement("div");
  popoverEl.className = "chord-popover";
  document.body.appendChild(popoverEl);
  // Keep popover open while hovering inside it
  popoverEl.addEventListener("mouseenter", () => clearTimeout(popoverTimer));
  popoverEl.addEventListener("mouseleave", () => {
    clearTimeout(popoverTimer);
    popoverTimer = setTimeout(hidePopover, 150);
  });
  return popoverEl;
}

function renderPopover(target) {
  const pop = ensurePopover();
  if (!popoverState) return;
  const { chordName, song, index } = popoverState;
  const wantGuitar = !song?.instruments || song.instruments.includes("guitar");
  const wantPiano  = !song?.instruments || song.instruments.includes("piano");
  const voicings = wantGuitar ? getVoicings(song, chordName) : [];
  const current = voicings[index] || null;
  const total = voicings.length;
  // Guitar diagram — only render if we have a voicing for this chord (built-in or custom).
  // For simple major/minor with no user voicing, show empty state with Add CTA.
  const guitarHtml = wantGuitar
    ? `<div class="diag-mini">
        <div class="label">Guitar${current && !current.builtIn ? " · custom" : ""}</div>
        ${current
          ? svgGuitar(chordName, { frets: current.frets, fingers: current.fingers, barre: current.barre }, "sm")
          : `<div class="muted small" style="padding:18px 6px; text-align:center; min-width:110px;">No saved voicing<br><span class="micro">click <b>+ Add</b> below</span></div>`
        }
      </div>`
    : "";
  const pianoHtml = wantPiano
    ? `<div class="diag-mini"><div class="label">Piano</div>${svgPiano(chordName, 2, "sm")}</div>`
    : "";
  const both = wantGuitar && wantPiano;
  const cyclerHtml = (wantGuitar && total > 1) ? `
    <div class="pop-cycler">
      <button class="arrow" data-action="prev" ${index === 0 ? "disabled" : ""} title="Previous voicing">‹</button>
      <span class="count">${index + 1} of ${total}</span>
      <button class="arrow" data-action="next" ${index === total - 1 ? "disabled" : ""} title="Next voicing">›</button>
    </div>` : "";
  const noteHtml = (current && current.note) ? `<div class="voicing-note">${escapeHtml(current.note)}</div>` : "";
  const actionsHtml = `
    <div class="pop-actions">
      <button data-action="add" title="Add a new voicing">+ Add voicing</button>
      ${current && !current.builtIn ? `
        <button data-action="edit" title="Edit this voicing">Edit</button>
        <button data-action="delete" class="danger" title="Delete this voicing">Delete</button>
      ` : current && current.builtIn ? `<button data-action="edit-from-builtin" title="Customize this chord">Customize</button>` : ""}
    </div>`;

  pop.innerHTML = `
    <div class="pop-header">${escapeHtml(chordName)}</div>
    <div class="pop-row ${both ? "" : "single"}">
      ${guitarHtml}${pianoHtml}
    </div>
    ${cyclerHtml}
    ${noteHtml}
    ${actionsHtml}
  `;

  pop.querySelectorAll("button[data-action]").forEach(btn => {
    btn.addEventListener("click", e => {
      const action = e.currentTarget.dataset.action;
      if (action === "prev") { popoverState.index = Math.max(0, index - 1); renderPopover(target); }
      else if (action === "next") { popoverState.index = Math.min(total - 1, index + 1); renderPopover(target); }
      else if (action === "add") { hidePopover(); openVoicingEditor(chordName, song, null); }
      else if (action === "edit") { hidePopover(); openVoicingEditor(chordName, song, getUserVoicingIndex(song, chordName, current)); }
      else if (action === "edit-from-builtin") { hidePopover(); openVoicingEditor(chordName, song, null, current); }
      else if (action === "delete") {
        if (confirm(`Delete this voicing of ${chordName}?`)) {
          deleteVoicing(song, chordName, getUserVoicingIndex(song, chordName, current));
          saveState({ songs: state.songs });
          // After delete, rebuild and re-render at safe index
          const newVoicings = wantGuitar ? getVoicings(song, chordName) : [];
          popoverState.index = Math.min(index, newVoicings.length - 1);
          renderPopover(target);
        }
      }
    });
  });
}

function getUserVoicingIndex(song, chordName, voicing) {
  // Map a popover voicing back to its index in song.voicings[chordName]
  if (!song.voicings || !song.voicings[chordName]) return -1;
  return song.voicings[chordName].findIndex(v =>
    JSON.stringify(v.frets) === JSON.stringify(voicing.frets)
  );
}

function showPopover(target, chordName, song) {
  // For plain major/minor chords with no user-added voicing, skip the popover entirely.
  // The user already knows these — show only when they've explicitly saved a custom voicing.
  if (isSimpleMajorOrMinor(chordName)) {
    const v = song?.voicings?.[chordName];
    if (!v || v.length === 0) return;
  }
  popoverState = { chordName, song, index: 0 };
  const pop = ensurePopover();
  renderPopover(target);
  // Position
  const rect = target.getBoundingClientRect();
  pop.style.visibility = "hidden";
  pop.classList.add("show");
  const popRect = pop.getBoundingClientRect();
  let top = rect.bottom + 8;
  if (top + popRect.height > window.innerHeight - 8) {
    top = rect.top - popRect.height - 8;
  }
  let left = rect.left + (rect.width / 2) - (popRect.width / 2);
  left = Math.max(8, Math.min(window.innerWidth - popRect.width - 8, left));
  pop.style.top = top + "px";
  pop.style.left = left + "px";
  pop.style.visibility = "visible";
}

function hidePopover() {
  if (!popoverEl) return;
  popoverEl.classList.remove("show");
  popoverState = null;
}

function attachHoverPopover(rootEl, song) {
  rootEl.addEventListener("mouseover", e => {
    const t = e.target.closest("[data-chord]");
    if (!t) return;
    clearTimeout(popoverTimer);
    popoverTimer = setTimeout(() => showPopover(t, t.dataset.chord, song), 220);
  });
  rootEl.addEventListener("mouseout", e => {
    if (!e.target.closest("[data-chord]")) return;
    clearTimeout(popoverTimer);
    popoverTimer = setTimeout(hidePopover, 200);
  });
}

//=============================================================
// VOICING EDITOR  (add/edit a single voicing)
//=============================================================
function openVoicingEditor(chordName, song, editIndex, seedFromBuiltin) {
  const isEdit = typeof editIndex === "number" && editIndex >= 0;
  const existing = isEdit ? song.voicings?.[chordName]?.[editIndex] : null;
  const seed = existing || seedFromBuiltin || null;
  const initFrets = seed?.frets ? fretsToString(seed.frets) : "";
  const initPiano = seed?.pianoNotes ? seed.pianoNotes.map(pc => pcToName(pc)).join(" ") : "";
  const initNote = seed?.note || "";

  // Show only fields relevant to this song's instruments. If neither is set, show both.
  const wantGuitar = song?.instruments?.includes("guitar");
  const wantPiano  = song?.instruments?.includes("piano");
  const showGuitar = wantGuitar || (!wantGuitar && !wantPiano);
  const showPiano  = wantPiano  || (!wantGuitar && !wantPiano);

  const bg = document.createElement("div");
  bg.className = "modal-bg";
  bg.innerHTML = `
    <div class="modal" style="max-width:560px;">
      <h3>${isEdit ? "Edit voicing" : "Add voicing"} · <span id="ve-name">${escapeHtml(chordName)}</span></h3>
      <div class="modal-sub" id="ve-notes">${describeNotes(chordName)}</div>
      <div class="helper-msg" id="ve-detected" style="margin-bottom:10px;"></div>

      <div class="modal-form stack">
        ${showGuitar ? `
          <div>
            <label>Guitar shape <span class="muted">(low-E to high-E; <code>x</code> = muted, <code>0</code> = open)</span></label>
            <input id="ve-frets" placeholder="x32010" value="${escapeHtml(initFrets)}" />
            <div class="helper-msg" id="ve-preview-guitar" style="text-align:center;"></div>
          </div>
        ` : ""}
        ${showPiano ? `
          <div>
            <label>Piano voicing <span class="muted">(notes you actually play, e.g. <code>C E G B</code> or <code>E G B D</code>)</span></label>
            <input id="ve-piano" placeholder="C E G B" value="${escapeHtml(initPiano)}" />
            <div class="helper-msg" id="ve-preview-piano" style="text-align:center;"></div>
          </div>
        ` : ""}
        <div>
          <label>Note for this voicing <span class="muted">(optional, e.g. "rootless RH; open G ringing")</span></label>
          <input id="ve-note" placeholder="" value="${escapeHtml(initNote)}" />
        </div>
      </div>

      <div class="actions">
        <button id="ve-cancel">Cancel</button>
        ${isEdit ? `<button id="ve-delete" class="danger">Delete</button>` : ""}
        <button id="ve-save" class="primary">${isEdit ? "Save" : "Add"}</button>
      </div>
    </div>
  `;
  document.body.appendChild(bg);
  bg.addEventListener("click", e => { if (e.target === bg) bg.remove(); });

  // Live previews + chord-name detection.
  // If the user enters notes that imply a different chord, we suggest renaming.
  let resolvedName = chordName;  // mutable — may change if input implies a different chord
  const fretsInput  = showGuitar ? bg.querySelector("#ve-frets") : null;
  const pianoInput  = showPiano  ? bg.querySelector("#ve-piano") : null;
  const previewG    = showGuitar ? bg.querySelector("#ve-preview-guitar") : null;
  const previewP    = showPiano  ? bg.querySelector("#ve-preview-piano")  : null;
  const detectedEl  = bg.querySelector("#ve-detected");
  const nameEl      = bg.querySelector("#ve-name");
  const notesEl     = bg.querySelector("#ve-notes");

  function fretsToPcs(frets) {
    // Open-string pitch classes for standard tuning, low E to high E
    const open = [4, 9, 2, 7, 11, 4]; // E A D G B E
    const pcs = [];
    for (let i = 0; i < 6; i++) {
      const f = frets[i];
      if (f >= 0) pcs.push((open[i] + f) % 12);
    }
    return pcs;
  }
  function updateAll() {
    let allPcs = [];
    if (showGuitar && fretsInput) {
      const frets = stringToFrets(fretsInput.value.trim());
      if (frets) {
        previewG.innerHTML = svgGuitar(chordName, { frets }, "sm");
        previewG.className = "helper-msg";
        allPcs = allPcs.concat(fretsToPcs(frets));
      } else {
        previewG.textContent = fretsInput.value.trim() ? "Invalid shape — use 6 chars: digits or x. Example: x32010" : "";
        previewG.className = "helper-msg err";
      }
    }
    if (showPiano && pianoInput) {
      const pcs = parsePianoNotesString(pianoInput.value);
      if (pcs.length) {
        // Mini keyboard rendering — temporarily build a chord name from these notes
        const name = chordNameFromPcs(pcs) || chordName;
        previewP.innerHTML = svgPiano(name, 2, "sm");
        previewP.className = "helper-msg";
        allPcs = allPcs.concat(pcs);
      } else {
        previewP.textContent = pianoInput.value.trim() ? "Invalid notes — use note names like C E G B or C# Eb F#" : "";
        previewP.className = "helper-msg err";
      }
    }
    // Detect chord name from combined input
    const detected = chordNameFromPcs(allPcs);
    if (detected && detected !== chordName) {
      resolvedName = detected;
      detectedEl.innerHTML = `These notes look like <b>${escapeHtml(detected)}</b> — saving will rename the chord on save.`;
      detectedEl.className = "helper-msg ok";
      nameEl.textContent = detected;
      notesEl.textContent = describeNotes(detected);
    } else {
      resolvedName = chordName;
      detectedEl.textContent = "";
      detectedEl.className = "helper-msg";
      nameEl.textContent = chordName;
      notesEl.textContent = describeNotes(chordName);
    }
  }
  fretsInput?.addEventListener("input", updateAll);
  pianoInput?.addEventListener("input", updateAll);
  updateAll();

  bg.querySelector("#ve-cancel").addEventListener("click", () => bg.remove());
  bg.querySelector("#ve-save").addEventListener("click", () => {
    const voicing = { note: bg.querySelector("#ve-note").value.trim() };
    if (showGuitar && fretsInput && fretsInput.value.trim()) {
      const frets = stringToFrets(fretsInput.value.trim());
      if (!frets) { alert("Invalid guitar shape — use 6 characters (digits or 'x'). Example: x32010"); return; }
      voicing.frets = frets;
    }
    if (showPiano && pianoInput && pianoInput.value.trim()) {
      const pcs = parsePianoNotesString(pianoInput.value);
      if (!pcs.length) { alert("Invalid piano notes — use note names like 'C E G B'"); return; }
      voicing.pianoNotes = pcs;
    }
    if (!voicing.frets && !voicing.pianoNotes) {
      alert("Add at least a guitar shape or piano notes."); return;
    }
    // Save under the (possibly renamed) chord. If renamed, also rename references in lyrics.
    const targetName = resolvedName !== chordName && resolvedName ? resolvedName : chordName;
    saveVoicing(song, targetName, voicing, isEdit && targetName === chordName ? editIndex : undefined);
    if (targetName !== chordName) {
      // Rename chord in lyrics so the new name actually appears
      song.lyrics = (song.lyrics || "").replace(new RegExp("\\[" + chordName.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\]", "g"), "[" + targetName + "]");
      // Remove the old voicing if we were editing
      if (isEdit) deleteVoicing(song, chordName, editIndex);
    }
    saveState({ songs: state.songs });
    bg.remove();
    if (state.selectedId === song.id) renderDetail();
  });
  if (isEdit) {
    bg.querySelector("#ve-delete").addEventListener("click", () => {
      if (!confirm(`Delete this voicing of ${chordName}?`)) return;
      deleteVoicing(song, chordName, editIndex);
      saveState({ songs: state.songs });
      bg.remove();
    });
  }
}

//=============================================================
// CHORD MODAL (click) — manage all voicings for a chord
//=============================================================
function openChordModal(chordName, song) {
  hidePopover();
  const wantGuitar = !song?.instruments || song.instruments.includes("guitar");
  const wantPiano  = !song?.instruments || song.instruments.includes("piano");
  const voicings = wantGuitar ? getVoicings(song, chordName) : [];

  const bg = document.createElement("div");
  bg.className = "modal-bg chord-modal";
  bg.innerHTML = `
    <div class="modal" role="dialog" aria-modal="true" style="max-width:680px;">
      <h3>${escapeHtml(chordName)}</h3>
      <div class="modal-sub">${describeNotes(chordName)}</div>

      ${wantPiano ? `
        <div class="diag-card" style="margin-top:12px;">
          <h4>Piano</h4>
          <div class="canvas">${svgPiano(chordName)}</div>
        </div>
      ` : ""}

      ${wantGuitar ? `
        <div style="display:flex; align-items:center; justify-content:space-between; margin: 18px 0 10px;">
          <h4 style="margin:0; font-size:11px; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; font-weight:600;">Guitar voicings</h4>
          <button id="cm-add" class="primary" style="font-size:13px; padding:5px 12px;">+ Add voicing</button>
        </div>
        ${voicings.length === 0 ? `
          <div class="muted small" style="text-align:center; padding:24px 0; background:var(--panel-2); border-radius:var(--radius);">
            No voicings saved for ${escapeHtml(chordName)}.<br>
            <span class="micro">Click <b>+ Add voicing</b> to save a custom shape.</span>
          </div>
        ` : `
          <div id="cm-voicings" class="diag-grid" style="grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));">
            ${voicings.map((v, i) => `
              <div class="diag-card" data-vidx="${i}" data-builtin="${v.builtIn}">
                <h4>${v.builtIn ? "Built-in" : "Voicing " + i}</h4>
                <div class="canvas">${svgGuitar(chordName, { frets: v.frets, fingers: v.fingers, barre: v.barre }, "sm")}</div>
                <div class="meta">${fretsToString(v.frets)}</div>
                ${v.note ? `<div class="meta" style="margin-top:6px; color:var(--ink-soft); font-family:var(--sans); font-size:12px;">${escapeHtml(v.note)}</div>` : ""}
                ${!v.builtIn ? `
                  <div style="display:flex; gap:4px; justify-content:center; margin-top:8px;">
                    <button class="ghost" data-vaction="edit" style="font-size:11.5px; padding:3px 8px;">Edit</button>
                    <button class="danger" data-vaction="delete" style="font-size:11.5px; padding:3px 8px;">Delete</button>
                  </div>
                ` : ""}
              </div>
            `).join("")}
          </div>
        `}
      ` : ""}

      <div class="actions">
        <button id="cm-close">Close</button>
      </div>
    </div>
  `;
  document.body.appendChild(bg);
  bg.addEventListener("click", e => { if (e.target === bg) bg.remove(); });
  bg.querySelector("#cm-close").addEventListener("click", () => bg.remove());

  if (wantGuitar) {
    bg.querySelector("#cm-add").addEventListener("click", () => {
      bg.remove();
      openVoicingEditor(chordName, song, null);
    });
    bg.querySelectorAll("[data-vaction]").forEach(btn => {
      btn.addEventListener("click", e => {
        const card = e.currentTarget.closest("[data-vidx]");
        const i = parseInt(card.dataset.vidx);
        const v = voicings[i];
        const userIdx = getUserVoicingIndex(song, chordName, v);
        const action = e.currentTarget.dataset.vaction;
        if (action === "edit") {
          bg.remove();
          openVoicingEditor(chordName, song, userIdx);
        } else if (action === "delete") {
          if (confirm(`Delete this voicing of ${chordName}?`)) {
            deleteVoicing(song, chordName, userIdx);
            saveState({ songs: state.songs });
            bg.remove();
            openChordModal(chordName, song);
          }
        }
      });
    });
  }
}
function fretsToString(frets) {
  return frets.map(f => f === -1 ? "x" : String(f)).join("");
}
function stringToFrets(s) {
  if (!s) return null;
  const cleaned = s.toLowerCase().replace(/\s+/g, "");
  if (cleaned.length === 6 && /^[x0-9]{6}$/.test(cleaned)) {
    return [...cleaned].map(c => c === "x" ? -1 : parseInt(c));
  }
  const parts = s.toLowerCase().split(/\s+/).filter(Boolean);
  if (parts.length === 6 && parts.every(p => p === "x" || /^\d+$/.test(p))) {
    return parts.map(p => p === "x" ? -1 : parseInt(p));
  }
  return null;
}
function describeNotes(chordName) {
  const c = splitChord(chordName);
  if (!c) return "—";
  const notes = chordNotes(c);
  const usesFlat = /b/.test(c.rootStr);
  return notes.map(n => pcToName(n.pc, usesFlat) + (n.isRoot ? " (root)" : "") + (n.isBass ? " (bass)" : "")).join("  ·  ");
}

//=============================================================
// IMPORT / EXPORT
//=============================================================
function exportJson() {
  const blob = new Blob([JSON.stringify({ version: SCHEMA_VERSION, exportedAt: new Date().toISOString(), songs: state.songs }, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "chord-archive.json";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function importJsonFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data.songs)) throw new Error("No songs array in JSON");
      if (!confirm(`Import ${data.songs.length} song(s)? This will merge with your existing collection.`)) return;
      const map = new Map(state.songs.map(s => [s.id, s]));
      for (const s of data.songs) {
        const existing = map.get(s.id);
        if (!existing || (s.updatedAt || 0) > (existing.updatedAt || 0)) map.set(s.id, s);
      }
      state.songs = [...map.values()];
      saveState({ songs: state.songs });
      renderList(); renderDetail();
    } catch (e) { alert("Import failed: " + e.message); }
  };
  reader.readAsText(file);
}

//=============================================================
// INIT
//=============================================================
// Decode a #new=<base64> hash payload from the extension/bookmarklet.
// Returns a partial song object or null.
function consumeImportHash() {
  const h = location.hash;
  if (!h.startsWith("#new=")) return null;
  try {
    const raw = decodeURIComponent(escape(atob(h.slice(5))));
    const payload = JSON.parse(raw);
    // Always run the chord-sheet parser — handles inline ChordPro, chord-line-above-lyrics, and ChordPro directives.
    const parsed = parseChordSheet(payload.lyrics || "");
    // Autodetect key from chord set if not provided
    let key = payload.key || parsed.key || "";
    if (!key) {
      const chords = extractChords(parsed.lyrics || payload.lyrics || "");
      const detected = detectKey(chords);
      if (detected) key = detected;
    }
    const song = Object.assign(blankSong(), {
      title: cleanScrapedTitle(payload.title || parsed.title || ""),
      artist: cleanScrapedTitle(payload.artist || parsed.artist || ""),
      key,
      lyrics: parsed.lyrics || payload.lyrics || "",
      sourceUrl: payload.sourceUrl || "",
    });
    // Clear the hash so reload doesn't double-create
    history.replaceState(null, "", location.pathname + location.search);
    return song;
  } catch (e) {
    console.warn("Failed to parse #new= payload:", e);
    return null;
  }
}

async function init() {
  // Show the app version in the brand
  const v = document.getElementById("brand-version");
  if (v) v.textContent = "v" + APP_VERSION;

  const persisted = loadState();
  state.songs = persisted.songs || [];
  if (state.songs.length === 0) {
    const seed = await fetchSeed();
    if (seed && Array.isArray(seed.songs)) {
      state.songs = seed.songs;
      saveState({ songs: state.songs });
    }
  }

  // Direct-import from extension/bookmarklet via URL hash
  const imported = consumeImportHash();
  if (imported) {
    state.editing = imported;  // open editor with pre-filled values
  }

  document.getElementById("btn-new").addEventListener("click", () => {
    state.editing = "new"; renderDetail();
  });

  // Header URL import — fetch via proxy, fall back to bookmarklet on CF block
  async function headerImportUrl() {
    const url = document.getElementById("header-url").value.trim();
    if (!url) return;
    const btn = document.getElementById("header-fetch");
    const orig = btn.textContent;
    btn.disabled = true; btn.textContent = "Fetching…";
    try {
      const result = await importFromUrl(url);
      // Build a draft song and open the editor
      const parsed = parseChordSheet(result.lyrics || "");
      const chords = extractChords(parsed.lyrics || "");
      const detected = detectKey(chords);
      const draft = Object.assign(blankSong(), {
        title: cleanScrapedTitle(result.title || parsed.title || ""),
        artist: cleanScrapedTitle(result.artist || parsed.artist || ""),
        key: parsed.key || detected || "",
        lyrics: parsed.lyrics || "",
        sourceUrl: url,
      });
      state.editing = draft;
      document.getElementById("header-url").value = "";
      renderDetail();
    } catch (e) {
      const useBookmarklet = confirm("Couldn't fetch that URL automatically (most likely Cloudflare bot protection):\n\n" + e.message + "\n\nWant to see the bookmarklet — a one-click button you put in your bookmarks bar that bypasses this?");
      if (useBookmarklet) {
        state.editing = "new"; renderDetail();
        setTimeout(() => openBookmarkletModal(), 50);
      }
    } finally {
      btn.disabled = false; btn.textContent = orig;
    }
  }
  document.getElementById("header-fetch").addEventListener("click", headerImportUrl);
  document.getElementById("header-url").addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); headerImportUrl(); }
  });

  // Kebab menu
  const menuBtn = document.getElementById("btn-menu");
  const menuPop = document.getElementById("menu-pop");
  menuBtn.addEventListener("click", e => {
    e.stopPropagation();
    menuPop.classList.toggle("show");
  });
  document.addEventListener("click", e => {
    if (!menuPop.contains(e.target) && e.target !== menuBtn) menuPop.classList.remove("show");
  });
  document.getElementById("btn-bookmarklet-shortcut").addEventListener("click", () => {
    menuPop.classList.remove("show");
    state.editing = "new"; renderDetail();
    setTimeout(() => openBookmarkletModal(), 50);
  });

  document.getElementById("btn-export").addEventListener("click", () => { menuPop.classList.remove("show"); exportJson(); });
  document.getElementById("btn-import").addEventListener("click", () => { menuPop.classList.remove("show"); document.getElementById("import-file").click(); });
  document.getElementById("import-file").addEventListener("change", e => {
    const f = e.target.files[0]; if (f) importJsonFile(f); e.target.value = "";
  });
  document.getElementById("search").addEventListener("input", e => { state.search = e.target.value; renderList(); });
  document.getElementById("filter-instrument").addEventListener("change", e => { state.filterInstrument = e.target.value; renderList(); });
  document.getElementById("sort").addEventListener("change", e => { state.sort = e.target.value; renderList(); });
  renderList();
  renderDetail();
}
init();
</script>
