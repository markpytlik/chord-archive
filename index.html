<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="apple-touch-icon" href="favicon.svg" />
<meta name="theme-color" content="#b14a2c" />
<!-- Block search engines and most well-behaved AI/training crawlers from indexing or scraping. -->
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet" />
<meta name="GPTBot" content="noindex, nofollow" />
<meta name="ClaudeBot" content="noindex, nofollow" />
<meta name="referrer" content="no-referrer" />
<title>Chordpad</title>
<style>
  /* ====================== Reset & Tokens ====================== */
  :root {
    --bg: #fbfaf7;
    --panel: #ffffff;
    --panel-2: #f6f4ee;
    --ink: #14161a;
    --ink-soft: #2c2f36;
    --muted: #6b7180;
    --line: #e7e3d8;
    --line-soft: #f0ede4;
    --accent: #b14a2c;
    --accent-soft: #f7e4dc;
    --accent-deep: #8a3819;
    --chord: #1e3a8a;
    --chord-soft: #e7edfa;
    --chord-bg: #f3f6fc;
    --good: #15803d;
    --good-soft: #e6f3eb;
    --warn: #92400e;
    --warn-soft: #fdf3e0;
    --shadow-sm: 0 1px 2px rgba(20, 22, 26, .04);
    --shadow-md: 0 6px 24px rgba(20, 22, 26, .07), 0 2px 6px rgba(20, 22, 26, .04);
    --shadow-lg: 0 24px 60px rgba(20, 22, 26, .12);
    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --serif: "Iowan Old Style", "Charter", "Source Serif Pro", Georgia, "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--accent-soft); color: var(--accent-deep); }

  /* ====================== Controls ====================== */
  button {
    font: inherit; cursor: pointer; border: 1px solid var(--line);
    background: var(--panel); color: var(--ink);
    padding: 7px 14px; border-radius: var(--radius-sm);
    transition: background .12s ease, border-color .12s ease, transform .04s;
    letter-spacing: -.01em;
  }
  button:hover { background: var(--panel-2); border-color: #d8d3c4; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { background: var(--accent-deep); border-color: var(--accent-deep); }
  button.ghost { background: transparent; border-color: transparent; color: var(--muted); }
  button.ghost:hover { background: var(--panel-2); color: var(--ink); }
  button.danger { color: #b41a1a; border-color: #ebd2d2; }
  button.danger:hover { background: #fceeee; border-color: #e0bcbc; }
  button.subtle { background: var(--panel-2); border-color: transparent; }

  input, select, textarea {
    font: inherit; color: var(--ink);
    background: var(--panel); border: 1px solid var(--line);
    padding: 8px 12px; border-radius: var(--radius-sm);
    width: 100%;
    transition: border-color .12s ease, box-shadow .12s ease;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  textarea { font-family: var(--mono); font-size: 14px; resize: vertical; line-height: 1.55; }
  label {
    font-size: 12px;
    color: var(--muted);
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
    letter-spacing: .02em;
    text-transform: uppercase;
  }
  .row { display: flex; gap: 10px; align-items: center; }
  .stack > * + * { margin-top: 14px; }

  .pill {
    display: inline-flex; align-items: center;
    padding: 2px 9px; border-radius: 999px;
    font-size: 11px; font-weight: 500;
    letter-spacing: .02em;
    background: var(--panel-2); color: var(--muted);
    border: 1px solid var(--line);
    margin-right: 5px;
  }
  .pill.guitar { background: var(--good-soft); color: var(--good); border-color: #c8dec8; }
  .pill.piano  { background: #ece4f5; color: #5a3eb1; border-color: #d3c8e0; }
  .pill.accent { background: var(--accent-soft); color: var(--accent-deep); border-color: #ecccc0; }
  .pill.chord-pill { background: var(--chord-soft); color: var(--chord); border-color: #cdd9ed; cursor: pointer; }
  .pill.chord-pill:hover { background: #d4dff5; }

  .muted { color: var(--muted); }
  .hidden { display: none !important; }
  .small { font-size: 13px; }
  .micro { font-size: 11px; }

  /* ====================== Header ====================== */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 26px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 5;
  }
  header .brand {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -.01em;
    color: var(--ink);
  }
  header .brand .accent { color: var(--accent); font-style: italic; font-size: 1.2em; }
  header .brand .glyph { color: var(--accent); margin-right: 4px; }
  header .brand-version {
    font-family: var(--mono);
    font-size: 10px;
    font-style: normal;
    font-weight: 500;
    color: var(--muted);
    background: var(--panel-2);
    padding: 1px 6px;
    border-radius: 999px;
    margin-left: 8px;
    vertical-align: 1px;
    letter-spacing: 0;
  }
  header .grow { flex: 1; }
  header input.search {
    max-width: 280px; padding: 8px 14px;
    background: var(--panel-2); border-color: transparent;
  }
  header input.search:focus { background: var(--panel); border-color: var(--accent); }
  header .header-url-input {
    flex: 1 1 320px; max-width: 460px;
    padding: 8px 14px;
    background: var(--panel-2); border-color: transparent;
  }
  header .header-url-input:focus { background: var(--panel); border-color: var(--chord); }
  header .header-menu { position: relative; display: inline-block; }
  header .header-menu-pop {
    position: absolute; right: 0; top: calc(100% + 4px);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    padding: 4px;
    display: none;
    z-index: 8;
    min-width: 200px;
  }
  header .header-menu:focus-within .header-menu-pop,
  header .header-menu-pop.show { display: block; }
  header .header-menu-pop button {
    width: 100%; text-align: left;
    background: transparent; border: 0;
    padding: 8px 12px; font-size: 13px;
    border-radius: var(--radius-sm);
    color: var(--ink-soft);
  }
  header .header-menu-pop button:hover {
    background: var(--panel-2); color: var(--ink);
  }

  /* ====================== Layout ====================== */
  main {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 60px);
  }
  aside {
    border-right: 1px solid var(--line);
    background: var(--panel);
    overflow-y: auto;
  }
  aside .filter-bar {
    padding: 12px 18px; border-bottom: 1px solid var(--line-soft);
    display: flex; gap: 8px; align-items: center;
    background: var(--panel); position: sticky; top: 0; z-index: 1;
  }
  aside .filter-bar select {
    padding: 5px 10px; font-size: 12px;
    background: var(--panel-2); border-color: transparent; width: auto;
  }

  .song-list { list-style: none; margin: 0; padding: 0; }
  .song-list li {
    padding: 14px 22px;
    border-bottom: 1px solid var(--line-soft);
    cursor: pointer;
    transition: background .1s ease;
  }
  .song-list li:hover { background: var(--panel-2); }
  .song-list li.active { background: var(--accent-soft); }
  .song-list li.active .artist { color: var(--accent-deep); }
  .song-list .artist {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .04em;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .song-list .title {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 18px;
    line-height: 1.2;
    color: var(--ink);
  }
  .song-list .meta {
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
    display: flex; gap: 6px; align-items: center;
  }

  /* ====================== Detail ====================== */
  section.detail {
    overflow-y: auto;
    padding: 40px 56px 100px;
    max-width: 100%;
  }
  .empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--muted); text-align: center; padding: 32px;
    font-family: var(--serif);
  }
  .empty h2 {
    font-family: var(--serif);
    font-weight: 500;
    color: var(--ink); margin-bottom: 12px;
    font-size: 28px;
    letter-spacing: -.01em;
  }
  .empty p { max-width: 460px; line-height: 1.6; font-family: var(--sans); }

  .detail-head {
    display: flex; align-items: flex-start; gap: 16px;
    margin-bottom: 6px; padding-bottom: 18px;
    border-bottom: 1px solid var(--line-soft);
  }
  .detail-head .title-block { flex: 1; min-width: 0; }
  .detail-head .artist {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .detail-head h1 {
    margin: 0;
    font-family: var(--serif);
    font-weight: 500;
    font-size: 36px;
    line-height: 1.1;
    letter-spacing: -.015em;
    color: var(--ink);
  }
  /* === Song-controls toolbar v5 — STATE and CONTROLS as separate adjacent pills.
     Each feature (Key, Accidentals, Analysis) is two pills with a small gap.
     State pills have fixed widths so changing the value never shifts adjacent pills. === */
  .song-controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 14px; /* gap BETWEEN feature groups */
    margin-top: 12px;
    font-family: var(--sans);
    line-height: 1;
  }
  .sc-group {
    display: inline-flex;
    align-items: center;
    gap: 4px; /* gap WITHIN a feature group (state ↔ controls) */
  }
  .sc-pill {
    display: inline-flex;
    align-items: center;
    height: 26px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .02em;
    box-sizing: border-box;
  }
  .sc-pill .sc-cap {
    display: inline-flex; align-items: center;
    padding: 0 8px 0 11px;
    text-transform: uppercase;
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: .12em;
    opacity: .75;
  }
  .sc-pill .sc-value {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 0 11px 0 0;
    font-family: var(--serif);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0;
  }
  .sc-pill .sc-btn {
    background: transparent;
    border: 0;
    width: 28px;
    height: 100%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    color: inherit;
    font-family: var(--sans);
    transition: background .12s;
    line-height: 1;
  }
  .sc-pill .sc-btn:not(:last-child) { border-right: 1px solid currentColor; }
  .sc-pill .sc-btn:hover:not(:disabled) { background: rgba(255,255,255,.4); }
  .sc-pill .sc-btn:disabled { opacity: .3; cursor: default; }

  /* === Key (warm rust) === */
  .sc-pill.sc-key-state, .sc-pill.sc-key-ctrls {
    background: #f5e3da;
    color: var(--accent-deep);
    border: 1px solid #e8c8b8;
  }
  .sc-pill.sc-key-state {
    /* fixed-width value cell so transposing Em → A♭m7 doesn't shift the layout */
    min-width: 124px;
  }
  .sc-pill.sc-key-state .sc-value { min-width: 0; }
  .sc-pill.sc-key-ctrls .sc-btn { border-right-color: rgba(138, 56, 25, .18); }
  .sc-pill.sc-key-ctrls .sc-btn:hover:not(:disabled) { background: rgba(177, 74, 44, .14); }

  /* === Accidentals (cool blue) === */
  .sc-pill.sc-acc-state, .sc-pill.sc-acc-ctrls {
    background: #e0e9f5;
    color: #1f4a99;
    border: 1px solid #c9d6ec;
  }
  .sc-pill.sc-acc-state {
    min-width: 124px;
  }
  .sc-pill.sc-acc-state .sc-value {
    font-family: var(--serif); font-size: 18px; font-weight: 700;
  }
  .sc-pill.sc-acc-ctrls .sc-seg-row {
    display: inline-flex; align-items: stretch;
    padding: 0 2px;
  }
  .sc-pill.sc-acc-ctrls .sc-seg {
    background: transparent;
    border: 0;
    padding: 0;
    width: 26px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    color: #1f4a99;
    border-radius: 999px;
    line-height: 1;
    margin: 0 1px;
    transition: background .12s, color .12s;
  }
  .sc-pill.sc-acc-ctrls .sc-seg:hover:not([aria-pressed="true"]) { background: rgba(31, 74, 153, .12); }
  .sc-pill.sc-acc-ctrls .sc-seg[aria-pressed="true"] {
    background: #1f4a99;
    color: #fff;
  }
  .sc-pill.sc-acc-ctrls .sc-btn { border-right-color: rgba(31, 74, 153, .18); }
  .sc-pill.sc-acc-ctrls .sc-btn:hover:not(:disabled) { background: rgba(31, 74, 153, .14); }

  /* === Analysis (green) === */
  .sc-pill.sc-analysis-state, .sc-pill.sc-analysis-ctrls {
    background: #eef4ee;
    color: #2d6a3d;
    border: 1px solid #cee2d2;
  }
  .sc-pill.sc-analysis-state {
    min-width: 156px;
    transition: background .12s, color .12s, border-color .12s;
  }
  .sc-pill.sc-analysis-state[data-on="true"] {
    background: #2d6a3d;
    color: #fff;
    border-color: #2d6a3d;
  }
  .sc-pill.sc-analysis-state .sc-value {
    font-family: var(--sans); font-size: 11.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .08em;
  }
  .sc-pill.sc-analysis-ctrls {
    cursor: pointer;
    transition: background .12s;
  }
  .sc-pill.sc-analysis-ctrls:hover { background: #e2eee5; }
  .sc-pill.sc-analysis-ctrls .sc-toggle-btn {
    background: transparent; border: 0;
    padding: 0 14px; height: 100%;
    font: inherit; cursor: pointer; color: inherit;
    font-size: 11.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .08em;
  }
  /* (Old .rn-pill inside-h1 styles removed — Roman toggle now lives in .song-controls.) */
  /* Inline Roman-numeral tag attached under each chord pill */
  .lyrics .chord-pill-inline .rn-tag,
  .lyrics .seg .chord .rn-tag {
    display: block;
    font-family: var(--serif);
    font-size: 10px;
    font-weight: 500;
    color: #2d6a3d;
    margin-top: 1px;
    line-height: 1;
    letter-spacing: .02em;
    text-transform: none;
  }
  .lyrics .seg .chord .rn-tag { position: absolute; left: 0; top: 100%; margin-top: 3px; }
  /* When Roman numerals are showing, give chord pills more vertical breathing room
     so the rn-tag below the pill doesn't crowd the lyric line. */
  .lyrics.show-roman .seg { padding-top: 2.55em; }
  .lyrics.show-roman .chord-only-row { line-height: 1.85; margin-bottom: .45em; }
  .lyrics.show-roman .chord-pill-inline { margin-bottom: 6px; }
  .detail-head .title-block { min-width: 0; }
  .detail-head h1 .source-corner {
    display: inline-block;
    vertical-align: top;
    margin-left: 6px;
    margin-top: 2px;
    color: var(--muted);
    font-size: 16px;
    line-height: 1;
    text-decoration: none;
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    transition: color .12s, background .12s, transform .12s;
  }
  .detail-head h1 .source-corner:hover {
    color: var(--accent);
    background: var(--accent-soft);
    transform: translate(1px, -1px);
  }
  .detail-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .meta-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin: 16px 0 28px;
  }

  /* ====================== Lyrics view ====================== */
  .lyrics {
    font-family: var(--mono);
    font-size: 15px; line-height: 1.45;
    background: var(--panel);
    padding: 28px 30px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    white-space: pre-wrap;
    word-wrap: break-word;
    box-shadow: var(--shadow-sm);
  }
  .lyrics .seg {
    display: inline-block; position: relative;
    padding-top: 1.7em; vertical-align: baseline;
  }
  /* Chord-bearing segments need enough horizontal room for the pill so adjacent chords don't overlap */
  .lyrics .seg:has(.chord) {
    min-width: 2.5em;
  }
  .lyrics .seg .chord {
    position: absolute; top: 0; left: 0;
    color: #1a1a1a; font-weight: 700;
    background: #ededeb;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 12.5px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .1s, transform .1s, box-shadow .1s;
    user-select: none;
    font-family: var(--mono);
  }
  .lyrics .seg .chord:hover {
    background: #dcdbd6; transform: translateY(-1px);
    box-shadow: 0 2px 6px rgba(0, 0, 0, .08);
  }
  /* Drag-and-drop visuals */
  .lyrics .chord.dragging,
  .lyrics .chord-pill-inline.dragging {
    opacity: .35;
  }
  .lyrics .lyric-line.drop-target {
    background: rgba(177, 74, 44, .08);
    border-radius: 4px;
    box-shadow: inset 0 0 0 1px rgba(177, 74, 44, .25);
  }
  .lyrics .chord, .lyrics .chord-pill-inline { cursor: grab; }
  .lyrics .chord:active, .lyrics .chord-pill-inline:active { cursor: grabbing; }
  /* Vertical drop indicator that tracks the cursor during chord drag */
  .chord-drop-indicator {
    position: absolute;
    width: 2px;
    background: var(--accent);
    border-radius: 1px;
    pointer-events: none;
    display: none;
    z-index: 5;
    box-shadow: 0 0 0 1px rgba(177, 74, 44, .25);
  }
  .lyrics { position: relative; }
  .lyrics .section-label {
    color: var(--accent);
    font-weight: 700;
    font-style: normal;
    margin-top: 1.6em;
    display: block;
    letter-spacing: .12em;
    text-transform: uppercase;
    font-size: 11px;
    font-family: var(--sans);
  }
  .lyrics .section-label::before { content: "— "; opacity: .5; }
  .lyrics .section-label::after  { content: " —"; opacity: .5; }
  .lyrics .section-label:first-child { margin-top: 0; }
  /* Chord-only lines (intros/outros) — block-level row of inline pills, no absolute positioning */
  .lyrics .chord-only-row {
    display: block;
    line-height: 1.6;
    margin: 0 0 .25em 0;
    padding: 0;
  }
  .lyrics .chord-pill-inline {
    /* Independent class — no overlap with .lyrics .seg .chord (which is absolute-positioned). */
    position: static !important;
    top: auto !important;
    left: auto !important;
    display: inline-block;
    margin-right: 6px;
    color: #1a1a1a;
    background: #ededeb;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
    font-family: var(--mono);
    transition: background .1s, transform .1s;
  }
  .lyrics .chord-pill-inline:hover {
    background: #dcdbd6; transform: translateY(-1px);
  }
  .lyrics .chord-rep {
    display: inline-block;
    margin-left: 8px;
    color: var(--accent);
    font-size: 12.5px;
    font-weight: 600;
    font-style: italic;
    font-family: var(--serif);
  }

  /* ====================== Notes & chord index ====================== */
  .info-block {
    margin-top: 22px; padding: 18px 22px;
    background: var(--warn-soft); border: 1px solid #f0d9b3; border-radius: var(--radius);
    line-height: 1.6;
  }
  .info-block.chords { background: var(--chord-bg); border-color: #cfd9ed; }
  .info-block h4 {
    margin: 0 0 8px;
    font-size: 11px;
    color: var(--warn);
    letter-spacing: .12em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .info-block.chords h4 { color: var(--chord); }
  .info-block .body { white-space: pre-wrap; color: var(--ink-soft); }

  /* ====================== Hover popover ====================== */
  .chord-popover {
    position: fixed;
    z-index: 30;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    padding: 18px 22px 14px;
    min-width: 420px;
    max-width: 820px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity .12s ease, transform .12s ease;
    pointer-events: none;
  }
  .chord-popover.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .chord-popover .pop-header {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    text-align: center;
    letter-spacing: -.01em;
    margin-bottom: 10px;
  }
  .chord-popover .pop-header-sub {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 400;
    color: var(--muted);
    margin-left: 2px;
  }
  .chord-popover .pop-row {
    display: flex; gap: 14px; align-items: flex-start; justify-content: center;
  }
  .chord-popover .pop-row.single { justify-content: center; }
  .chord-popover .diag-mini { text-align: center; }
  .chord-popover .diag-mini .label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 6px;
  }
  .chord-popover .pop-cycler {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin-top: 8px;
    color: var(--muted);
    font-size: 12.5px;
  }
  .chord-popover .pop-cycler .arrow {
    cursor: pointer;
    background: transparent; border: 0; padding: 4px 8px;
    color: var(--muted); font-size: 16px; line-height: 1;
    border-radius: 4px;
  }
  .chord-popover .pop-cycler .arrow:hover:not(:disabled) {
    color: var(--ink); background: var(--panel-2);
  }
  .chord-popover .pop-cycler .arrow:disabled { opacity: 0.3; cursor: default; }
  .chord-popover .pop-cycler .count {
    min-width: 50px; text-align: center; font-variant-numeric: tabular-nums;
  }
  .chord-popover .pop-actions {
    display: flex; gap: 4px; justify-content: center; margin-top: 8px;
    padding-top: 10px; border-top: 1px solid var(--line-soft);
  }
  .chord-popover .pop-actions button {
    background: transparent; border: 0; color: var(--muted);
    padding: 4px 8px; font-size: 11.5px; cursor: pointer; border-radius: 4px;
  }
  .chord-popover .pop-actions button:hover {
    background: var(--panel-2); color: var(--ink);
  }
  .chord-popover .pop-actions button.danger:hover { color: #b41a1a; background: #fceeed; }
  .chord-popover .pop-actions button.pin-toggle.active { background: var(--accent-soft); color: var(--accent-deep); border-color: var(--accent-soft); }
  .chord-popover .voicing-note {
    margin-top: 8px;
    padding: 7px 11px;
    background: var(--warn-soft);
    border-left: 3px solid #f0d9b3;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.4;
  }

  /* ====================== Editor ====================== */
  .editor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px 16px;
  }
  .editor-grid .full { grid-column: 1 / -1; }
  .editor-tools {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
  }
  .editor-tools button { font-size: 13px; padding: 5px 11px; }
  .editor-tools button.prominent {
    background: var(--chord-bg);
    border-color: #cdd9ed;
    color: var(--chord);
    font-weight: 600;
  }
  .editor-tools button.prominent:hover {
    background: #d8e1f5; border-color: #a9bde0;
  }
  .helper-msg {
    color: var(--muted); font-size: 12px;
    margin-top: 6px; min-height: 18px;
    transition: color .1s;
  }
  .helper-msg.ok { color: var(--good); }
  .helper-msg.err { color: #b41a1a; }
  .helper-msg.busy { color: var(--accent); }

  /* Instrument toggle buttons (replace plain checkboxes) */
  .instrument-toggles {
    display: inline-flex; gap: 6px; padding-top: 4px;
  }
  .instrument-toggles .pill-btn {
    cursor: pointer;
    user-select: none;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    background: var(--panel);
    color: var(--muted);
    border: 1px solid var(--line);
    transition: all .12s ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .instrument-toggles .pill-btn:hover {
    background: var(--panel-2);
    color: var(--ink);
  }
  .instrument-toggles .pill-btn.on {
    background: var(--accent-soft);
    color: var(--accent-deep);
    border-color: #ecccc0;
  }
  .instrument-toggles .pill-btn.on::before {
    content: "✓";
    font-weight: 700;
    color: var(--accent);
  }
  .instrument-toggles input[type=checkbox] {
    position: absolute; opacity: 0; pointer-events: none;
  }

  /* Import-from-URL strip */
  .url-import {
    display: flex; gap: 8px; align-items: center;
    background: var(--chord-bg); border: 1px solid #d8e0f0;
    padding: 10px 14px; border-radius: var(--radius);
    margin-bottom: 14px;
  }
  .url-import input { flex: 1; background: var(--panel); }
  .url-import .label {
    font-size: 11px; color: var(--chord); font-weight: 600;
    text-transform: uppercase; letter-spacing: .08em;
    flex-shrink: 0; padding-right: 6px;
  }

  /* ====================== Branded loader (auth init / magic link callback) ====================== */
  .cp-loader {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh;
    gap: 18px;
    color: var(--ink);
    text-align: center;
  }
  .cp-loader .cp-loader-mark {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -.01em;
  }
  .cp-loader .cp-loader-mark .cp-glyph,
  .cp-loader .cp-loader-mark .cp-accent {
    color: var(--accent);
  }
  .cp-loader .cp-loader-mark .cp-accent {
    font-style: italic;
  }
  .cp-loader .cp-spinner {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2.5px solid var(--accent-soft);
    border-top-color: var(--accent);
    animation: cp-spin .8s linear infinite;
  }
  @keyframes cp-spin { to { transform: rotate(360deg); } }
  .cp-loader .cp-loader-msg {
    font-size: 15px;
    font-family: var(--sans);
    color: var(--ink-soft);
    letter-spacing: .01em;
  }
  .cp-loader .cp-loader-hint {
    font-size: 12.5px; color: var(--muted); margin-top: -8px;
  }

  /* ====================== Practice mode overlay ====================== */
  .practice-overlay {
    position: fixed; inset: 0; z-index: 50;
    background: var(--bg);
    display: flex; align-items: stretch; justify-content: center;
    animation: fadein .15s ease;
  }
  .practice-shell {
    width: 100%; max-width: 920px;
    display: flex; flex-direction: column;
    padding: 28px 32px;
  }
  .practice-head {
    display: flex; align-items: center; gap: 14px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
  }
  .practice-head .practice-title {
    flex: 1; margin: 0;
    font-family: var(--serif);
    font-size: 22px; font-weight: 500;
    letter-spacing: -.01em;
    color: var(--ink);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .practice-head .practice-back {
    background: transparent; border: 1px solid var(--line);
    border-radius: 999px; padding: 5px 14px;
    font: inherit; cursor: pointer; color: var(--ink-soft);
    font-size: 13px;
  }
  .practice-head .practice-back:hover { background: var(--panel-2); color: var(--ink); }
  .practice-head .practice-count {
    font-family: var(--mono); font-size: 13px;
    color: var(--ink-soft); padding: 0 4px;
    letter-spacing: .02em;
  }
  .practice-head .practice-close {
    background: transparent; border: 0;
    font-size: 22px; line-height: 1; cursor: pointer;
    color: var(--ink-soft); padding: 4px 8px;
    border-radius: 6px;
  }
  .practice-head .practice-close:hover { background: var(--panel-2); color: var(--ink); }

  .practice-body {
    flex: 1;
    padding: 32px 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
  }
  .practice-sub {
    font-size: 13px; color: var(--ink-soft);
    text-transform: uppercase; letter-spacing: .08em; font-weight: 600;
    align-self: flex-start; margin-bottom: -4px;
  }
  .practice-drills {
    width: 100%;
    display: grid; gap: 10px;
  }
  .practice-drill {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 18px 20px;
    text-align: left; cursor: pointer;
    font: inherit; color: var(--ink);
    display: flex; align-items: center; justify-content: space-between;
    transition: background .12s, border-color .12s, transform .12s;
  }
  .practice-drill:hover {
    background: var(--accent-soft);
    border-color: #ecccc0;
    transform: translateY(-1px);
  }
  .practice-drill .pd-name {
    font-family: var(--serif); font-size: 17px; font-weight: 500;
    letter-spacing: -.005em;
  }
  .practice-drill .pd-arrow {
    color: var(--accent); font-size: 18px; opacity: .6;
  }
  .practice-drill:hover .pd-arrow { opacity: 1; }

  .practice-step .practice-prompt-big {
    font-family: var(--serif); font-size: 44px; font-weight: 500;
    letter-spacing: -.015em; color: var(--ink);
    text-align: center; line-height: 1.15;
  }
  .practice-step .practice-detail {
    font-family: var(--mono); font-size: 16px; color: var(--ink-soft);
    text-align: center; letter-spacing: .04em;
  }
  .practice-step .practice-piano {
    margin: 14px 0 8px;
    /* Constrain width so it scales nicely */
    max-width: 760px; width: 100%;
    display: flex; justify-content: center;
  }
  .practice-step .practice-piano svg {
    max-width: 100%; height: auto;
  }
  .practice-step .practice-nav {
    display: flex; gap: 10px; margin-top: 10px;
  }
  .practice-step .practice-nav button {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 999px; padding: 9px 22px;
    font: inherit; font-weight: 600; cursor: pointer; color: var(--ink);
    transition: background .12s, border-color .12s;
    min-width: 110px;
  }
  .practice-step .practice-nav button:hover:not(:disabled) {
    background: var(--accent-soft); border-color: #ecccc0; color: var(--accent-deep);
  }
  .practice-step .practice-nav button:disabled { opacity: .35; cursor: default; }
  .practice-step .practice-nav .practice-next:not(:disabled) {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .practice-step .practice-nav .practice-next:not(:disabled):hover {
    background: var(--accent-deep); border-color: var(--accent-deep);
  }
  .practice-hint {
    font-size: 12px; color: var(--muted);
    letter-spacing: .02em;
  }

  /* ====================== Modal ====================== */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(20, 16, 12, .42);
    display: flex; align-items: center; justify-content: center;
    z-index: 20; padding: 24px;
    animation: fadein .15s ease;
  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--panel);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    padding: 28px;
    width: 100%; max-width: 720px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal h3 {
    margin: 0 0 4px;
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -.01em;
  }
  .modal .modal-sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 18px;
  }
  .modal .actions {
    display: flex; gap: 8px; justify-content: flex-end;
    margin-top: 20px; padding-top: 16px;
    border-top: 1px solid var(--line-soft);
  }
  .modal-bg.chord-modal .modal { max-width: 600px; }

  /* Aligned guitar/piano cards in chord modal */
  .diag-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 4px;
  }
  .diag-card {
    display: flex; flex-direction: column;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
  }
  .diag-card h4 {
    margin: 0 0 10px;
    font-size: 11px; color: var(--muted);
    letter-spacing: .12em; text-transform: uppercase;
    font-weight: 600;
    text-align: center;
  }
  .diag-card .badge {
    color: var(--accent);
    margin-left: 4px;
    text-transform: none;
    font-size: 10px;
    letter-spacing: .04em;
  }
  .diag-card .canvas {
    flex: 1; display: flex; align-items: center; justify-content: center;
    min-height: 170px;
  }
  .diag-card .meta {
    font-size: 11px; color: var(--muted);
    text-align: center; margin-top: 10px;
    font-family: var(--mono);
  }
  .diag-card.no-show { opacity: .35; }

  .voicing-strip {
    margin-top: 16px; padding: 12px 14px;
    background: var(--warn-soft); border-left: 3px solid #f0d9b3;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 13.5px; line-height: 1.5; color: var(--ink-soft);
  }
  .voicing-strip b { color: var(--warn); }

  .modal-form { margin-top: 18px; }
  .modal-form label { margin-top: 4px; }
  .modal-form .row { gap: 8px; }
  .modal-form .row button { flex: 0 0 auto; }
  .modal-form code {
    font-family: var(--mono); font-size: 11.5px;
    background: var(--panel-2); padding: 1px 5px; border-radius: 3px;
  }

  code, kbd {
    font-family: var(--mono); font-size: 12px;
    background: var(--panel-2);
    padding: 1px 5px; border-radius: 3px;
  }

  /* ====================== Play mode (white background, dark text) ====================== */
  .play-mode {
    position: fixed; inset: 0; z-index: 50;
    background: #ffffff;
    color: #14161a;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .play-mode .play-controls {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 14px;
    padding: 14px 28px;
    background: #fafaf7;
    border-bottom: 1px solid var(--line);
  }
  /* Scrub slider — slim full-width row that lets the user drag through the song's scroll position */
  .play-mode .play-scrub {
    flex: 0 0 auto;
    padding: 4px 28px 6px;
    background: #fafaf7;
    border-bottom: 1px solid var(--line);
  }
  .play-mode .play-scrub input[type=range] {
    width: 100%;
    accent-color: var(--accent);
    background: transparent;
    border: 0;
    margin: 0;
  }
  .play-mode .play-title {
    flex: 1; min-width: 0;
    font-family: var(--serif);
    font-size: 18px;
    color: var(--ink);
  }
  .play-mode .play-title .artist {
    color: var(--muted); font-size: 12px;
    text-transform: uppercase; letter-spacing: .08em; font-family: var(--sans);
    margin-bottom: 2px;
  }
  .play-mode button {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 7px 14px; border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }
  .play-mode button:hover { background: var(--panel-2); }
  .play-mode button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .play-mode button.primary:hover { background: var(--accent-deep); border-color: var(--accent-deep); }
  .play-mode .speed-controls {
    display: inline-flex; align-items: center; gap: 8px;
  }
  .play-mode .speed-controls input[type=range] {
    width: 160px; accent-color: var(--accent);
    background: transparent; border: 0; padding: 0;
  }
  .play-mode .speed-controls .speed-label {
    font-size: 11px; color: var(--muted);
    font-family: var(--mono);
    width: 64px; text-align: right;
  }
  .play-mode .play-content {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 32px 14% 50vh;
    scroll-behavior: auto;
  }
  .play-mode .play-content::-webkit-scrollbar { width: 6px; }
  .play-mode .play-content::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  .play-mode .lyrics-large {
    font-family: var(--mono);
    font-size: 24px;
    line-height: 1.7;
    color: var(--ink);
    white-space: pre-wrap;
    max-width: 980px;
    margin: 0 auto;
  }
  .play-mode .lyrics-large .seg {
    display: inline-block; position: relative;
    padding-top: 1.7em; vertical-align: baseline;
  }
  .play-mode .lyrics-large .seg:has(.chord) { min-width: 3em; }
  .play-mode .lyrics-large .seg .chord {
    position: absolute; top: 0; left: 0;
    color: #1a1a1a;
    background: #ededeb;
    border: 1px solid transparent;
    border-radius: 5px;
    padding: 1px 7px;
    font-size: 17px;
    font-weight: 700;
    font-family: var(--mono);
    white-space: nowrap;
  }
  .play-mode .lyrics-large .chord-only-row {
    display: block;
    margin: .3em 0 1em;
  }
  .play-mode .lyrics-large .chord-pill-inline {
    display: inline-block;
    margin-right: 14px;
    color: #1a1a1a;
    background: #ededeb;
    border: 1px solid transparent;
    border-radius: 5px;
    padding: 2px 10px;
    font-size: 20px;
    font-weight: 700;
    font-family: var(--mono);
  }
  .play-mode .lyrics-large .chord-rep {
    margin-left: 14px;
    color: var(--accent);
    font-size: 20px;
    font-weight: 600;
    font-style: italic;
    font-family: var(--serif);
  }
  .play-mode .lyrics-large .section-label {
    color: var(--accent);
    font-weight: 700;
    font-style: normal;
    margin-top: 1.4em;
    display: block;
    letter-spacing: .15em;
    text-transform: uppercase;
    font-size: 14px;
    font-family: var(--sans);
  }
  .play-mode .lyrics-large .section-label::before { content: "— "; opacity: .5; }
  .play-mode .lyrics-large .section-label::after  { content: " —"; opacity: .5; }
  /* Line wrappers — block layout; blank rows get explicit height since we no longer rely on \n + pre-wrap */
  .lyric-line { display: block; }
  .lyric-blank { min-height: 1em; }
  /* PRINT — hide app chrome, render the chord chart cleanly on paper. */
  @media print {
    @page { margin: 0.6in; }
    body { background: #fff !important; }
    aside, header, .detail-actions, .meta-row, .info-block, .chord-popover, .chord-modal, .modal-bg, .play-mode { display: none !important; }
    main, .detail { display: block !important; max-width: none !important; padding: 0 !important; }
    .song-controls { display: none !important; }
    .detail-head .source-corner { display: none !important; }
    .detail-head h1 { font-size: 24pt; }
    .detail-head .artist { font-size: 11pt; }
    .lyrics { font-size: 11pt; line-height: 1.6; }
    .lyrics .seg .chord, .lyrics .chord-pill-inline { color: #000 !important; background: transparent !important; border: 0 !important; font-weight: 700; }
    .lyrics .section-label { color: #000 !important; }
    .lyric-dot { display: none !important; }
  }

  /* Active-line marker — bold, eye-catching dot that sits in the gutter on whichever line you're playing.
     Big enough to spot in peripheral vision while watching the chord shapes; pulses softly. */
  .lyric-dot { display: none; }
  .play-mode .lyrics-large .lyric-line.has-chord.active .lyric-dot {
    display: inline-block;
    color: var(--accent);
    font-size: 28px;
    line-height: 1;
    margin-right: 18px;
    margin-left: -44px;
    opacity: 1;
    vertical-align: middle;
    transform: translateY(-2px);
    text-shadow: 0 0 12px rgba(177, 74, 44, .35);
    animation: lyric-dot-pulse 1.6s ease-in-out infinite;
  }
  @keyframes lyric-dot-pulse {
    0%, 100% { opacity: 1; transform: translateY(-2px) scale(1); }
    50%      { opacity: .65; transform: translateY(-2px) scale(.85); }
  }
  /* Next-line preview in play mode — the line after the active one is highlighted softer so
     the musician sees what chords are coming up. */
  .play-mode .lyrics-large .lyric-line.active-next {
    opacity: 1;
    background: rgba(177, 74, 44, 0.045);
    border-radius: 6px;
  }
  .play-mode .lyrics-large .lyric-line.active-next .chord,
  .play-mode .lyrics-large .lyric-line.active-next .chord-pill-inline {
    background: #f5e3da;
    color: #8a3819;
  }
  .play-mode .lyrics-large .lyric-line.active {
    background: rgba(177, 74, 44, 0.10);
    border-radius: 6px;
  }
  /* Shape panel — its OWN row above the scrolling lyrics, so it never visually covers lyrics text.
     Height is user-resizable via the bottom drag handle (defaults set in JS at 220px). */
  .play-mode .play-shape-panel {
    flex: 0 0 auto;
    position: relative;
    background: #fafaf7;
    border-bottom: 1px solid var(--line);
    padding: 18px 14% 22px 14%;
    display: flex;
    align-items: flex-start;
    gap: 28px;
    overflow: hidden;
    min-height: 100px;
  }
  .play-mode .play-shape-panel .play-shape-name {
    font-family: var(--serif);
    font-size: 38px;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -.01em;
    flex: 0 0 auto;
    min-width: 90px;
    padding-top: 10px;
  }
  .play-mode .play-shape-panel .play-shape-diagram {
    display: flex;
    align-items: stretch;
    flex-wrap: nowrap;
    gap: 22px;
    flex: 1 1 auto;
    height: 100%;
    overflow: hidden;
    align-content: stretch;
  }
  .play-mode .play-shape-panel .play-shape-diagram .shape-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex: 1 1 0;
    min-width: 0;
    height: 100%;
    overflow: hidden;
  }

<script>
//=============================================================
// VERSION
//=============================================================
// App version — bumped on every meaningful push so Mark can verify deploys.
// Displayed next to the brand in the header.
const APP_VERSION = "4.5.5";

//=============================================================
// STORAGE
//=============================================================
const STORE_KEY = "chordarchive_v1";
const SCHEMA_VERSION = 2;

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.warn(e); }
  return { version: SCHEMA_VERSION, songs: [] };
}
function saveState(s) {
  s.version = SCHEMA_VERSION;
  localStorage.setItem(STORE_KEY, JSON.stringify(s));
  // If signed in, also push to cloud (fire-and-forget; localStorage is the offline mirror).
  if (auth.user && auth.client) {
    cloudSyncOut(s.songs);
  }
}

//=============================================================
// AUTH + CLOUD SYNC (Supabase)
//=============================================================
const SUPABASE_URL = "https://mjgctqprbecwkdinpcbp.supabase.co";
const SUPABASE_KEY = "sb_publishable_qUqhxr3NQ6OW-7Wd287RtQ_YM9QkcXE";

const auth = {
  client: null,
  user: null,        // { id, email } when signed in
  initialized: false,
  // Track which song IDs we've already synced to cloud this session, to avoid storms
  knownIds: new Set(),
};

function initAuth() {
  if (typeof window.supabase === "undefined") {
    console.warn("Supabase SDK not loaded — running in localStorage-only mode");
    return;
  }
  auth.client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      // Disable Supabase's cross-tab navigator.locks coordination. With multiple
      // chordpad.app tabs open (e.g., extension opens a new tab while the original
      // is still alive), a stuck refresh in one tab would block ALL queries in the
      // other. The trade-off is harmless here: two tabs may both attempt a refresh
      // briefly. Without this override, "Saving…" hung forever for some users.
      lock: async (_key, _acquireTimeout, fn) => fn(),
    },
  });
  // Defensive: if the persisted refresh token is dead, Supabase's auto-refresh
  // hangs and so does every subsequent query (including getSession). Race a quick
  // session probe against a 5s timeout — if it loses, force-sign-out so the user
  // can sign back in cleanly instead of staring at a frozen "Saving…" indicator.
  // Diagnostic only — don't auto-purge on timeout. Earlier auto-purge was kicking
  // out users whose getSession() simply took 5+ seconds to resolve (e.g. extension
  // opens a new tab and the SDK takes its time). Surface a visible reconnect
  // option via the sync indicator instead; never destroy a session preemptively.
  Promise.race([
    auth.client.auth.getSession(),
    new Promise((_, rej) => setTimeout(() => rej(new Error("getSession >10s")), 10000)),
  ]).catch((e) => {
    if (auth.initialized) return; // it actually resolved later — false alarm
    console.warn("[auth] session probe took longer than 10s; not auto-purging", e);
    setSyncStatus("error", "Session is slow to load. Click to reconnect if it stays stuck.");
  });
  // Safety net: if Supabase never fires INITIAL_SESSION (rare SDK hiccup), don't
  // leave the loader spinning forever. After 3s, mark initialized and continue.
  setTimeout(() => {
    if (!auth.initialized) {
      auth.initialized = true;
      renderAuthArea();
      renderDetail();
    }
  }, 3000);
  // Auth events Supabase emits — handled differently to avoid sign-in/sign-out flapping:
  //   INITIAL_SESSION  — once on listener attach. Real source of truth on page load.
  //   SIGNED_IN        — explicit sign-in (new session).
  //   SIGNED_OUT       — explicit sign-out.
  //   TOKEN_REFRESHED  — token auto-refresh; session unchanged. NEVER re-fetch songs.
  //   USER_UPDATED     — metadata change; treat like TOKEN_REFRESHED.
  //   PASSWORD_RECOVERY — user lands from a reset email; open the recovery modal.
  //
  // Earlier impl re-fetched songs and re-rendered on EVERY event including
  // TOKEN_REFRESHED, and treated any null session as a sign-out (wiping
  // localStorage). That caused the visible flapping between signed-in / signed-out
  // states whenever Supabase emitted a transient state change.
  auth.client.auth.onAuthStateChange(async (event, session) => {
    // Quiet events — just keep auth.user fresh, do nothing else.
    if (event === "TOKEN_REFRESHED" || event === "USER_UPDATED") {
      if (session) auth.user = { id: session.user.id, email: session.user.email };
      return;
    }

    // Password recovery: open modal, clear hash, run sign-in once.
    if (event === "PASSWORD_RECOVERY" && session) {
      auth.user = { id: session.user.id, email: session.user.email };
      openPasswordRecoveryModal();
      if (window.history.replaceState) {
        window.history.replaceState(null, "", window.location.pathname + window.location.search);
      }
      await runOnSignInOnce();
      renderAuthArea();
      return;
    }

    // Initial / explicit sign-in.
    if (event === "INITIAL_SESSION" || event === "SIGNED_IN") {
      auth.initialized = true;
      if (session) {
        const wasSignedIn = !!auth.user;
        auth.user = { id: session.user.id, email: session.user.email };
        // Update the chip & clear the loader IMMEDIATELY so the user sees the signed-in
        // state during cloud fetch, not "Sign in" + loader for several seconds.
        renderAuthArea();
        renderDetail();
        if (!wasSignedIn) {
          await runOnSignInOnce(); // refreshes list/detail when cloud songs arrive
        }
      } else if (event === "INITIAL_SESSION") {
        // Guest mode (no session). Clear the loader by re-rendering the detail panel.
        if (auth.user) { auth.user = null; onSignOut(); }
        renderAuthArea();
        renderDetail();
      }
      return;
    }

    // Explicit sign-out only — never wipe local state on a transient null session.
    if (event === "SIGNED_OUT") {
      if (auth.user) { auth.user = null; onSignOut(); }
      renderAuthArea();
      renderDetail();
      return;
    }
  });
}

// Prevent concurrent cloud fetches when both INITIAL_SESSION and SIGNED_IN fire close together.
let _onSignInPromise = null;
function runOnSignInOnce() {
  if (_onSignInPromise) return _onSignInPromise;
  _onSignInPromise = onSignIn().finally(() => { _onSignInPromise = null; });
  return _onSignInPromise;
}

// On sign-in: fetch this user's cloud library and replace the local view.
// First-time sign-in (no cloud rows yet) seeds the cloud with whatever local songs exist
// (typically the seed library or anything the user added as a guest).
async function onSignIn() {
  if (!auth.client || !auth.user) return;
  let res;
  // Bound the SELECT — without a timeout, a wedged Supabase client (e.g. from a
  // sibling tab refreshing the persisted session mid-init) silently leaves
  // auth.knownIds empty and state.songs still showing only the localStorage cache,
  // which then snowballs into every subsequent cloudSyncOut also hanging.
  for (let attempt = 1; attempt <= 2; attempt++) {
    try {
      res = await withTimeout(
        auth.client.from("songs").select("data, updated_at"),
        10000,
        "songs select"
      );
      break;
    } catch (e) {
      console.warn("[onSignIn] cloud fetch attempt", attempt, "failed:", e);
      const isTimeout = /timed out/i.test(e?.message || "");
      if (isTimeout && attempt === 1) {
        // Watchdog: replace wedged client and retry once.
        await recreateAuthClient();
        continue;
      }
      setSyncStatus("error", e?.message || "Couldn't load your library — click to reconnect.");
      return;
    }
  }
  const { data, error } = res;
  if (error) { console.warn("Cloud fetch failed:", error); setSyncStatus("error", error.message || "Couldn't load your library"); return; }
  if (data && data.length) {
    state.songs = data.map(r => r.data);
    auth.knownIds = new Set(state.songs.map(s => s.id));
  } else {
    // First sign-in — push USER-ADDED local songs (not the public seed library) as starter content.
    const userAdded = state.songs.filter(s => !String(s.id || "").startsWith("seed-"));
    if (userAdded.length) {
      const rows = userAdded.map(song => ({ id: song.id, user_id: auth.user.id, data: song, updated_at: new Date(song.updatedAt || Date.now()).toISOString() }));
      const { error: upErr } = await auth.client.from("songs").upsert(rows);
      if (upErr) console.warn("Cloud seed-from-local failed:", upErr);
      state.songs = userAdded;
      auth.knownIds = new Set(userAdded.map(s => s.id));
    } else {
      state.songs = [];
      auth.knownIds = new Set();
    }
  }
  saveState({ songs: state.songs }); // mirror to localStorage cache
  renderList(); renderDetail();
}

// On sign-out: clear the offline cache (so a shared browser doesn't leak the previous user's
// library) and restore the public seed library as the guest view.
function onSignOut() {
  auth.knownIds = new Set();
  state.selectedId = null;
  state.editing = false;
  state.undoStack = [];
  localStorage.removeItem(STORE_KEY);
  state.songs = [];
  fetchSeed().then(seed => {
    if (seed && Array.isArray(seed.songs)) state.songs = seed.songs;
    renderList(); renderDetail();
  });
}

// Push the full song list to cloud — upserts new/changed, deletes anything that's been removed locally.
let cloudSyncTimer = null;
function setSyncStatus(state, detail) {
  // state: "idle" | "syncing" | "synced" | "error" | "offline"
  auth.syncStatus = state;
  auth.syncDetail = detail || "";
  renderSyncIndicator();
}
function renderSyncIndicator() {
  const el = document.getElementById("sync-indicator");
  if (!el) return;
  if (!auth.user) { el.textContent = ""; el.className = "sync-indicator"; el.title = ""; el.onclick = null; return; }
  const s = auth.syncStatus || "idle";
  const map = {
    idle:    { txt: "",                 cls: "sync-indicator",         tip: "" },
    syncing: { txt: "↻ Saving…",        cls: "sync-indicator syncing", tip: "Saving to your cloud library" },
    synced:  { txt: "✓ Saved to cloud", cls: "sync-indicator synced",  tip: "All changes saved to your cloud library" },
    error:   { txt: "⚠ Connection problem · Reconnect", cls: "sync-indicator error", tip: "Cloud connection problem: " + (auth.syncDetail || "unknown error") + ". Click to clear the session and sign back in. Your songs are safe locally." },
    offline: { txt: "Offline",          cls: "sync-indicator offline", tip: "No network — changes saved locally and will sync when you're back online" },
  };
  el.onclick = (s === "error")
    ? () => { if (confirm("Reconnect to the cloud? You'll be signed out and can sign back in. Your local songs won't be lost.")) forceSessionPurgeAndReload(); }
    : null;
  const m = map[s] || map.idle;
  el.textContent = m.txt;
  el.className = m.cls;
  el.title = m.tip;
}
window.addEventListener("offline", () => { if (auth.user) setSyncStatus("offline"); });
window.addEventListener("online",  () => { if (auth.user && auth.syncStatus === "offline") setSyncStatus("idle"); });
// Race a promise against a wall-clock timeout. The timeout rejects with a
// distinctive error so we can tell "request hung" from "request errored".
function withTimeout(promise, ms, label) {
  let timer;
  return Promise.race([
    promise,
    new Promise((_, reject) => {
      timer = setTimeout(() => reject(new Error(`${label} timed out after ${ms}ms`)), ms);
    }),
  ]).finally(() => clearTimeout(timer));
}

async function cloudSyncOut(songs) {
  if (!auth.client) { console.warn("[cloudSyncOut] no auth.client"); return; }
  if (!auth.user)   { console.warn("[cloudSyncOut] no auth.user");   return; }
  if (typeof navigator !== "undefined" && navigator.onLine === false) {
    setSyncStatus("offline");
    return;
  }
  setSyncStatus("syncing");
  console.log("[cloudSyncOut] queueing sync; songs=", songs.length, "userId=", auth.user.id);
  // Debounce — coalesce rapid mutations into a single round trip.
  clearTimeout(cloudSyncTimer);
  cloudSyncTimer = setTimeout(async () => {
    // Defensive: only push songs with a valid id. Songs without ids will fail
    // upsert with a cryptic message — drop them and log so we know.
    const validSongs = songs.filter(s => s && s.id);
    if (validSongs.length !== songs.length) {
      console.warn("[cloudSyncOut] skipping", songs.length - validSongs.length, "songs without an id");
    }
    const rows = validSongs.map(song => ({
      id: song.id,
      user_id: auth.user.id,
      data: song,
      updated_at: new Date(song.updatedAt || Date.now()).toISOString(),
    }));

    // Try once; if a hang trips withTimeout, the SDK is likely wedged. Recreate
    // the client and retry once before surfacing the error.
    for (let attempt = 1; attempt <= 2; attempt++) {
      try {
        console.log("[cloudSyncOut] upserting", rows.length, "rows (attempt", attempt + ")");
        if (rows.length) {
          const { error } = await withTimeout(
            auth.client.from("songs").upsert(rows),
            15000,
            "songs upsert"
          );
          if (error) { console.error("[cloudSyncOut] upsert error", error); throw error; }
        }
        const currentIds = new Set(validSongs.map(s => s.id));
        const removed = [...auth.knownIds].filter(id => !currentIds.has(id));
        if (removed.length) {
          const { error } = await withTimeout(
            auth.client.from("songs").delete().in("id", removed),
            15000,
            "songs delete"
          );
          if (error) { console.error("[cloudSyncOut] delete error", error); throw error; }
        }
        auth.knownIds = currentIds;
        console.log("[cloudSyncOut] sync complete");
        setSyncStatus("synced");
        setTimeout(() => { if (auth.syncStatus === "synced") setSyncStatus("idle"); }, 2400);
        return;
      } catch (e) {
        console.error("[cloudSyncOut] attempt", attempt, "FAILED", e);
        const detail = e?.message || e?.error_description || e?.hint || String(e);
        const isTimeout = /timed out/i.test(detail);
        if (isTimeout && attempt === 1) {
          // Watchdog: the live client is wedged. Replace with a fresh one and retry.
          await recreateAuthClient();
          continue;
        }
        // Don't auto-sign-out on timeouts — that surprised the user when a single
        // hung save kicked them out mid-edit. Just surface the error; the indicator
        // exposes a "Reconnect" link the user can click if it persists.
        setSyncStatus("error", isTimeout ? "Save timed out. Click the indicator to reconnect." : detail);
        return;
      }
    }
  }, 600);
}

// Bulletproof recovery for a wedged Supabase session: skip signOut() (which can
// also hang), wipe its localStorage entries directly, and reload.
function forceSessionPurgeAndReload() {
  try {
    Object.keys(localStorage)
      .filter(k => k.startsWith("sb-") || k.startsWith("supabase."))
      .forEach(k => localStorage.removeItem(k));
  } catch (_) {}
  // Tiny delay so the user sees the error indicator update before the reload.
  setTimeout(() => location.reload(), 300);
}

// Watchdog: replace auth.client with a fresh instance, rehydrating the session
// from localStorage. Used when the live client wedges (every method hangs even
// though the network and token are healthy). A fresh instance comes up in <1s
// and lets the failed call retry without a full page reload. Returns true if
// the new client was rehydrated with a session, false otherwise.
let _recreatePromise = null;
function recreateAuthClient() {
  // Coalesce concurrent watchdog triggers (cloudSyncOut + onSignIn could both fire).
  if (_recreatePromise) return _recreatePromise;
  _recreatePromise = (async () => {
    console.warn("[auth] recreating Supabase client (suspected wedge)");
    if (typeof window.supabase === "undefined") return false;
    auth.client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        lock: async (_k, _t, fn) => fn(),
      },
    });
    const sbKey = Object.keys(localStorage).find(k => k.startsWith("sb-") && k.endsWith("-auth-token"));
    if (!sbKey) return false;
    let sess = null;
    try { sess = JSON.parse(localStorage.getItem(sbKey)); } catch (_) {}
    if (!sess?.access_token || !sess?.refresh_token) return false;
    try {
      await withTimeout(
        auth.client.auth.setSession({ access_token: sess.access_token, refresh_token: sess.refresh_token }),
        5000,
        "watchdog setSession"
      );
      return true;
    } catch (e) {
      console.warn("[auth] watchdog setSession failed:", e);
      return false;
    }
  })().finally(() => { _recreatePromise = null; });
  return _recreatePromise;
}

async function doAuth(mode, bg) {
  const email = bg.querySelector("#auth-email").value.trim();
  const passInput = bg.querySelector("#auth-password");
  const password = passInput ? passInput.value : "";
  if (!email) { setAuthMsg(bg, "err", "Type your email first."); return; }

  try {
    if (mode === "signup") {
      if (!password) { setAuthMsg(bg, "err", "Pick a password (at least 6 characters)."); return; }
      setAuthMsg(bg, "busy", "Creating account…");
      const { data, error } = await auth.client.auth.signUp({ email, password, options: { emailRedirectTo: window.location.origin } });
      if (error) throw error;
      if (data.user && !data.session) {
        setAuthMsg(bg, "ok", "Check your inbox — we sent a confirmation link to verify your email.");
      } else {
        setAuthMsg(bg, "ok", "Account created. Loading your library…");
        setTimeout(() => bg.remove(), 600);
      }
    } else if (mode === "password") {
      if (!password) { setAuthMsg(bg, "err", "Enter your password."); return; }
      setAuthMsg(bg, "busy", "Signing in…");
      const { error } = await auth.client.auth.signInWithPassword({ email, password });
      if (error) throw error;
      setAuthMsg(bg, "ok", "Signed in. Loading your library…");
      setTimeout(() => bg.remove(), 600);
    } else {
      // mode === "signin" — magic link is the default path
      setAuthMsg(bg, "busy", "Sending sign-in link…");
      const { error } = await auth.client.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.origin } });
      if (error) throw error;
      setAuthMsg(bg, "ok", `Sent a sign-in link to ${email}. Click the link in your inbox to sign in.`);
    }
  } catch (e) {
    setAuthMsg(bg, "err", e.message || "Something went wrong.");
  }
}
