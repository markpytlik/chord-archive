<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Chord Archive</title>
<style>
  :root {
    --bg: #fbfaf7;
    --panel: #ffffff;
    --ink: #14161a;
    --muted: #6b7180;
    --line: #e7e3d8;
    --accent: #b14a2c;
    --accent-soft: #f7e4dc;
    --accent-deep: #8a3819;
    --good: #15803d;
    --good-soft: #e6f3eb;
    --serif: "Iowan Old Style", "Charter", "Source Serif Pro", Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 320px;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.45;
  }
  .head {
    padding: 14px 16px 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .brand {
    font-family: var(--serif);
    font-size: 18px;
    letter-spacing: -.01em;
  }
  .brand .glyph { color: var(--accent); margin-right: 4px; }
  .brand .accent { color: var(--accent); font-style: italic; }
  .body { padding: 14px 16px; }
  .target {
    font-size: 12px; color: var(--muted);
    word-break: break-all;
    margin-bottom: 12px;
    line-height: 1.4;
  }
  .target b { color: var(--ink); font-weight: 600; }
  button {
    font: inherit; cursor: pointer;
    background: var(--accent); color: #fff;
    border: 1px solid var(--accent);
    padding: 9px 14px; border-radius: 6px;
    width: 100%;
    font-weight: 600;
    transition: background .12s ease;
  }
  button:hover { background: var(--accent-deep); border-color: var(--accent-deep); }
  button:disabled { background: #c5beac; border-color: #c5beac; cursor: default; }
  .secondary {
    background: transparent; color: var(--ink);
    border-color: var(--line);
    font-weight: 500;
    margin-top: 8px;
  }
  .secondary:hover { background: #f0ece4; }
  .status {
    margin-top: 12px;
    padding: 9px 12px;
    border-radius: 6px;
    font-size: 12.5px;
    line-height: 1.45;
    display: none;
  }
  .status.show { display: block; }
  .status.ok  { background: var(--good-soft); color: var(--good); border: 1px solid #c8dec8; }
  .status.err { background: #fceeed; color: #b41a1a; border: 1px solid #ebd2d2; }
  .status.busy { background: var(--accent-soft); color: var(--accent-deep); border: 1px solid #ecccc0; }
  .opts {
    margin-top: 14px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .opts input { accent-color: var(--accent); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .foot {
    border-top: 1px solid var(--line);
    padding: 10px 16px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<div class="head">
  <div class="brand"><span class="glyph">♪</span> Chord <span class="accent">Archive</span></div>
</div>

<div class="body">
  <div class="target" id="target">Looking at: <b id="hostname">…</b></div>
  <button id="grab">♪ Grab chords from this page</button>
  <button id="open" class="secondary">Open Chord Archive</button>
  <label class="opts"><input type="checkbox" id="autoOpen" checked /> Open Chord Archive after grab</label>
  <div class="status" id="status"></div>
</div>

<div class="foot">
  v1.0.0 · <a href="https://songs.markpytlik.com/" target="_blank">songs.markpytlik.com</a>
</div>

<script src="popup.js"></script>
</body>
</html>
